<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>7b · Existing AP — Adding Second Student – Horizon Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{'hz-indigo':'#2D1FA3','hz-accent':'#645CDC','hz-cloud':'#EEF0FF','hz-teal':'#0D7A55','hz-teal-bg':'#E1F5EE','hz-bg':'#F4F5FF','hz-text':'#1A1060','hz-muted':'#57548D','hz-hint':'#6B6899','hz-border':'rgba(100,92,220,0.14)','hz-danger':'#E24B4A'},fontFamily:{sans:["'Plus Jakarta Sans'",'system-ui','sans-serif']},borderRadius:{'hz':'18px','hz-sm':'12px','hz-pill':'99px'}}}}
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-hz-bg">
<div id="root"></div>
<script type="text/babel">

const EXISTING_STUDENT = {name:'Emma Davis', balance:5200, installments:9, freq:'Monthly', pmt:578};
const NEW_STUDENT      = {name:'Ryan Davis',  balance:4800};
const AP_FIRST         = 'Linda';
const AP_LAST          = 'Davis';
const SCHOOL           = 'Ridgemont University';
const INS_NEW          = 288;
const NELNET_FEE       = 25;
const DOWN_MIN_NEW     = Math.round(NEW_STUDENT.balance * 0.05);

const fmt = n=>'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

const Shell=({children,step,total,onBack,showBack=true})=>(
  <div className="min-h-screen bg-hz-bg flex flex-col items-center py-8 px-4">
    <div className="w-full max-w-sm">
      <div className="flex items-center justify-between mb-6">
        {showBack?<button onClick={onBack} className="text-hz-accent text-sm font-semibold">← Back</button>
          :<a href="index.html" className="text-hz-accent text-sm font-semibold">⌂ Home</a>}
        <span className="text-xs text-hz-hint">{SCHOOL}</span>
      </div>
      {total>0&&<div className="mb-6"><div className="text-xs text-hz-hint mb-1.5">Step {step} of {total}</div>
        <div className="h-1 bg-hz-cloud rounded-full overflow-hidden"><div className="h-full bg-hz-accent rounded-full transition-all duration-500" style={{width:`${(step/total)*100}%`}}/></div></div>}
      {children}
    </div>
  </div>
);
const Btn=({children,onClick,variant='primary',disabled=false,className=''})=>{
  const v={primary:'bg-hz-indigo text-white',ghost:'bg-hz-cloud text-hz-indigo',teal:'bg-hz-teal text-white'};
  return <button onClick={onClick} disabled={disabled} className={`w-full py-3.5 rounded-hz-pill font-semibold text-[15px] hover:opacity-90 active:scale-[0.97] transition-all ${v[variant]} ${disabled?'opacity-40 cursor-not-allowed':''} ${className}`}>{children}</button>;
};
const Card=({children,className=''})=><div className={`bg-white rounded-hz border border-hz-border shadow-sm ${className}`}>{children}</div>;
const Info=({children})=><div className="flex gap-2 p-3 bg-hz-cloud rounded-hz-sm border border-[rgba(100,92,220,0.2)] text-xs text-hz-muted leading-relaxed"><span className="shrink-0 mt-0.5">ℹ️</span><span>{children}</span></div>;

const SameCard=({icon,label,prior,onSame,onChange,done,newLabel})=>(
  <Card className={`p-4 transition-all ${done?'border-hz-teal/30':''}`}>
    <div className="flex items-start gap-3 mb-3">
      <span className="text-xl shrink-0">{icon}</span>
      <div className="flex-1">
        <div className="text-xs font-bold text-hz-hint uppercase tracking-wider mb-0.5">{label}</div>
        <div className="text-sm text-hz-muted">{prior}</div>
        {done&&newLabel&&<div className="text-sm text-hz-teal font-semibold mt-0.5">→ {newLabel}</div>}
      </div>
      {done&&<span className="text-hz-teal text-xl shrink-0">✓</span>}
    </div>
    {!done?(
      <div className="grid grid-cols-2 gap-2">
        <button onClick={onSame} className="py-2 rounded-hz-sm text-sm font-semibold bg-hz-teal-bg text-hz-teal border border-hz-teal/20">✓ Same</button>
        <button onClick={onChange} className="py-2 rounded-hz-sm text-sm font-semibold bg-hz-cloud text-hz-indigo border border-hz-border">Change</button>
      </div>
    ):(
      <button onClick={onChange} className="w-full py-1.5 text-xs font-semibold text-hz-accent border border-[rgba(100,92,220,0.2)] rounded-hz-sm hover:bg-hz-cloud">Edit</button>
    )}
  </Card>
);

// ── S1: Login ──────────────────────────────────────────────────────────────
const S1=({onNext})=>{
  const [em,setEm]=React.useState('linda.davis@gmail.com');
  const [pw,setPw]=React.useState('');
  return (
    <Shell step={0} total={0} showBack={false}>
      <div className="text-center mb-8">
        <div className="w-16 h-16 rounded-full bg-hz-cloud flex items-center justify-center mx-auto mb-4 text-3xl">🔑</div>
        <div className="text-xs font-bold uppercase tracking-widest text-hz-accent mb-2">Existing Authorized Party</div>
        <h1 className="text-2xl font-bold text-hz-text mb-2">Log in to add {NEW_STUDENT.name}</h1>
        <p className="text-sm text-hz-muted leading-relaxed">You already have a Nelnet account. The new invitation links to your existing account — no new account needed.</p>
      </div>
      <div className="space-y-3 mb-5">
        <div><label className="block text-xs font-semibold text-hz-muted mb-1">Username or email</label>
        <input value={em} onChange={e=>setEm(e.target.value)} className="w-full bg-white border border-hz-border rounded-hz-sm px-3 py-2.5 text-hz-text text-sm outline-none focus:border-hz-accent"/></div>
        <div><label className="block text-xs font-semibold text-hz-muted mb-1">Password</label>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Your password" className="w-full bg-white border border-hz-border rounded-hz-sm px-3 py-2.5 text-hz-text text-sm outline-none focus:border-hz-accent"/></div>
      </div>
      <Btn onClick={onNext} disabled={!em||!pw}>Sign in →</Btn>
    </Shell>
  );
};

// ── S2: New student notification ───────────────────────────────────────────
const S2=({onNext,onBack})=>(
  <Shell step={1} total={5} onBack={onBack}>
    <div className="text-center mb-6">
      <div className="w-12 h-12 rounded-full bg-hz-cloud flex items-center justify-center mx-auto mb-3 text-2xl">📬</div>
      <h2 className="text-xl font-bold text-hz-text mb-1">New invitation from {NEW_STUDENT.name}</h2>
      <p className="text-sm text-hz-muted">You have an existing account for {EXISTING_STUDENT.name}. Adding {NEW_STUDENT.name} at the same school is quick — we'll reuse as much as possible.</p>
    </div>
    <Card className="p-4 mb-4">
      <div className="text-xs font-bold text-hz-hint uppercase tracking-wider mb-3">Existing setup</div>
      <div className="flex items-center justify-between p-2.5 bg-hz-cloud rounded-hz-sm mb-2">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-full bg-hz-teal flex items-center justify-center text-white text-xs font-bold">ED</div>
          <div><div className="text-sm font-semibold text-hz-text">{EXISTING_STUDENT.name}</div>
          <div className="text-xs text-hz-muted">Monthly · {EXISTING_STUDENT.installments} installments · ≈{fmt(EXISTING_STUDENT.pmt)}/mo</div></div>
        </div>
        <span className="text-xs font-bold text-hz-teal">Active</span>
      </div>
      <div className="flex items-center justify-between p-2.5 bg-amber-50 border border-amber-200 rounded-hz-sm">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-full bg-amber-400 flex items-center justify-center text-white text-xs font-bold">RD</div>
          <div><div className="text-sm font-semibold text-hz-text">{NEW_STUDENT.name}</div>
          <div className="text-xs text-amber-700">New invitation · Setup needed</div></div>
        </div>
        <span className="text-xs font-bold text-amber-700">{fmt(NEW_STUDENT.balance)}</span>
      </div>
    </Card>
    <Info>We'll show you what you chose for {EXISTING_STUDENT.name} and ask if you want to do the same for {NEW_STUDENT.name}. You can change anything independently.</Info>
    <div className="mt-5"><Btn onClick={onNext}>Add {NEW_STUDENT.name} to my account →</Btn></div>
  </Shell>
);

// ── S3: "Same as your other student?" ─────────────────────────────────────
const S3=({onNext,onBack})=>{
  const [potDone,setPotDone]=React.useState(false);
  const [potChoice,setPotChoice]=React.useState(null);
  const [insDone,setInsDone]=React.useState(false);
  const [insChoice,setInsChoice]=React.useState(null);
  const [methodDone,setMethodDone]=React.useState(false);
  const allDone=potDone&&insDone&&methodDone;

  // POT: combine or separate?
  const newCombined = NEW_STUDENT.balance + EXISTING_STUDENT.balance;
  const newPmt = Math.round(newCombined / EXISTING_STUDENT.installments);

  return (
    <Shell step={2} total={5} onBack={onBack}>
      <h2 className="text-xl font-bold text-hz-text mb-1">Same as {EXISTING_STUDENT.name}?</h2>
      <p className="text-sm text-hz-muted mb-5">Confirm or change each item for {NEW_STUDENT.name}.</p>
      <div className="space-y-3 mb-5">

        {/* Pay Over Time */}
        <Card className={`p-4 transition-all ${potDone?'border-hz-teal/30':''}`}>
          <div className="flex items-start gap-3 mb-3">
            <span className="text-xl shrink-0">📅</span>
            <div className="flex-1">
              <div className="text-xs font-bold text-hz-hint uppercase tracking-wider mb-0.5">Pay Over Time</div>
              <div className="text-sm text-hz-muted">For {EXISTING_STUDENT.name}: Monthly · {EXISTING_STUDENT.installments} installments · ≈{fmt(EXISTING_STUDENT.pmt)}/mo</div>
              {potDone&&potChoice==='add'&&(
                <div className="mt-2 bg-hz-cloud rounded-hz-sm p-2.5 text-xs space-y-1">
                  <div className="text-hz-muted font-semibold mb-1">Before → After adding {NEW_STUDENT.name}</div>
                  <div className="flex justify-between text-hz-muted"><span>Plan balance</span><span><span className="line-through">{fmt(EXISTING_STUDENT.balance)}</span> → {fmt(newCombined)}</span></div>
                  <div className="flex justify-between font-bold text-hz-text border-t border-hz-border pt-1"><span>New installment</span><span>≈{fmt(newPmt)}/mo</span></div>
                  <div className="text-hz-hint text-[10px] mt-1">Your existing plan is not changed until you confirm the final step.</div>
                </div>
              )}
              {potDone&&potChoice==='separate'&&<div className="text-sm text-hz-teal font-semibold mt-0.5">→ Separate plan for {NEW_STUDENT.name} · ≈{fmt(NEW_STUDENT.balance/9)}/mo</div>}
            </div>
            {potDone&&<span className="text-hz-teal text-xl shrink-0">✓</span>}
          </div>
          {!potDone?(
            <div className="space-y-2">
              {[
                {v:'add',l:`➕ Add ${NEW_STUDENT.name} to existing plan`,s:`New combined installment ≈${fmt(newPmt)}/mo`},
                {v:'separate',l:`📅 Separate plan for ${NEW_STUDENT.name}`,s:`Keeps existing plan unchanged · ≈${fmt(NEW_STUDENT.balance/9)}/mo`},
                {v:'full',l:`💳 Pay ${NEW_STUDENT.name}'s balance in full`,s:`${fmt(NEW_STUDENT.balance)} today`},
              ].map(opt=>(
                <button key={opt.v} onClick={()=>{setPotChoice(opt.v);setPotDone(true);}}
                  className="w-full p-3 rounded-hz-sm border border-hz-border bg-hz-cloud text-left text-sm hover:border-hz-accent transition-all">
                  <div className="font-semibold text-hz-text">{opt.l}</div>
                  <div className="text-xs text-hz-muted mt-0.5">{opt.s}</div>
                </button>
              ))}
            </div>
          ):(
            <button onClick={()=>setPotDone(false)} className="w-full py-1.5 text-xs font-semibold text-hz-accent border border-[rgba(100,92,220,0.2)] rounded-hz-sm hover:bg-hz-cloud">Edit</button>
          )}
        </Card>

        {/* Insurance */}
        <Card className={`p-4 transition-all ${insDone?'border-hz-teal/30':''}`}>
          <div className="flex items-start gap-3 mb-3">
            <span className="text-xl shrink-0">🛡️</span>
            <div className="flex-1">
              <div className="text-xs font-bold text-hz-hint uppercase tracking-wider mb-0.5">Tuition insurance</div>
              <div className="text-sm text-hz-muted">For {EXISTING_STUDENT.name}: GradGuard accepted last term</div>
              {insDone&&<div className="text-sm text-hz-teal font-semibold mt-0.5">→ {insChoice==='accept'?`GradGuard for ${NEW_STUDENT.name} — ${fmt(INS_NEW)} today`:`Declined for ${NEW_STUDENT.name}`}</div>}
            </div>
            {insDone&&<span className="text-hz-teal text-xl shrink-0">✓</span>}
          </div>
          {!insDone?(
            <div className="space-y-2">
              {[
                {v:'accept',l:`✓ Accept for ${NEW_STUDENT.name}`,s:`${fmt(INS_NEW)} added today`},
                {v:'decline',l:'✗ Decline',s:'No coverage'},
                {v:'later',l:'⏸ Decide later',s:'Added as to-do'},
              ].map(opt=>(
                <button key={opt.v} onClick={()=>{setInsChoice(opt.v);setInsDone(true);}}
                  className="w-full p-3 rounded-hz-sm border border-hz-border bg-hz-cloud text-left text-sm hover:border-hz-accent transition-all">
                  <div className="font-semibold text-hz-text">{opt.l}</div>
                  <div className="text-xs text-hz-muted mt-0.5">{opt.s}</div>
                </button>
              ))}
            </div>
          ):(
            <button onClick={()=>setInsDone(false)} className="w-full py-1.5 text-xs font-semibold text-hz-accent border border-[rgba(100,92,220,0.2)] rounded-hz-sm hover:bg-hz-cloud">Edit</button>
          )}
        </Card>

        {/* Payment method */}
        <SameCard icon="🏦" label="Payment method"
          prior="Chase Checking ···4521 (already on file)"
          newLabel="Same method — Chase Checking ···4521"
          done={methodDone} onSame={()=>setMethodDone(true)} onChange={()=>setMethodDone(true)}/>

      </div>
      <Btn onClick={onNext} disabled={!allDone}>Continue →</Btn>
    </Shell>
  );
};

// ── S4: Agreements ─────────────────────────────────────────────────────────
const S4=({onNext,onBack})=>{
  const [acked,setAcked]=React.useState([false,false]);
  const toggle=i=>setAcked(a=>a.map((v,j)=>j===i?!v:v));
  return (
    <Shell step={3} total={5} onBack={onBack}>
      <h2 className="text-xl font-bold text-hz-text mb-1">Agreements for {NEW_STUDENT.name}</h2>
      <p className="text-sm text-hz-muted mb-5">These are specific to adding {NEW_STUDENT.name}'s account. Your prior agreements for {EXISTING_STUDENT.name} still apply.</p>
      <div className="space-y-3 mb-5">
        {[
          {t:`Financial Responsibility — ${NEW_STUDENT.name}`,b:`I agree to pay 100% of ${NEW_STUDENT.name}'s balance as their designated authorized payer.`},
          {t:'GradGuard Policy — Ryan Davis',b:'I acknowledge GradGuard terms for the new insurance policy for Ryan Davis\'s account.'},
        ].map((d,i)=>(
          <div key={i} onClick={()=>toggle(i)} className={`bg-white rounded-hz-sm border p-4 cursor-pointer transition-all ${acked[i]?'border-hz-teal/40 bg-hz-teal-bg/20':'border-hz-border'}`}>
            <div className="flex items-start gap-3">
              <div className={`w-5 h-5 rounded border flex items-center justify-center shrink-0 mt-0.5 ${acked[i]?'bg-hz-teal border-hz-teal':'border-hz-border bg-white'}`}>{acked[i]&&<span className="text-white text-xs font-bold">✓</span>}</div>
              <div><div className="font-semibold text-sm text-hz-text mb-1">{d.t}</div><div className="text-xs text-hz-muted leading-relaxed">{d.b}</div></div>
            </div>
          </div>
        ))}
      </div>
      <Info>You're signing only what's new for {NEW_STUDENT.name} — you don't need to re-sign what you already agreed to for {EXISTING_STUDENT.name}.</Info>
      <div className="mt-5"><Btn onClick={onNext} disabled={!acked.every(Boolean)}>I agree →</Btn></div>
    </Shell>
  );
};

// ── S5: Confirmation ───────────────────────────────────────────────────────
const S5=({onNext,onBack})=>{
  const newCombined=NEW_STUDENT.balance+EXISTING_STUDENT.balance;
  const newPmt=Math.round(newCombined/EXISTING_STUDENT.installments);
  return (
    <Shell step={4} total={5} onBack={onBack}>
      <div className="text-center mb-6">
        <div className="w-16 h-16 rounded-full bg-hz-teal-bg flex items-center justify-center mx-auto mb-4 text-3xl">✅</div>
        <h2 className="text-xl font-bold text-hz-text mb-2">{NEW_STUDENT.name} added!</h2>
        <p className="text-sm text-hz-muted">Your plan has been updated. One payment today for {NEW_STUDENT.name}'s setup costs.</p>
      </div>
      <Card className="p-4 mb-4">
        <div className="text-xs font-bold text-hz-hint uppercase tracking-wider mb-3">Updated account summary</div>
        <div className="space-y-2 text-sm">
          {[
            [`${EXISTING_STUDENT.name} (existing)`,fmt(EXISTING_STUDENT.balance)],
            [`${NEW_STUDENT.name} (added)`,fmt(NEW_STUDENT.balance)],
            ['Combined plan balance',fmt(newCombined)],
            ['New installment',`≈${fmt(newPmt)}/mo (was ${fmt(EXISTING_STUDENT.pmt)}/mo)`],
            ['Insurance (Ryan)',`GradGuard — ${fmt(INS_NEW)}`],
            ['One payment today',fmt(DOWN_MIN_NEW+NELNET_FEE+INS_NEW)],
          ].map(([k,v],i)=>(
            <div key={i} className={`flex justify-between ${i===2||i===5?'font-bold text-hz-indigo border-t border-hz-border pt-2 mt-1':''}`}>
              <span className={i===2||i===5?'text-hz-text':'text-hz-muted'}>{k}</span>
              <span className={`font-medium text-right max-w-[55%] ${i===2||i===5?'text-hz-indigo':'text-hz-text'}`}>{v}</span>
            </div>
          ))}
        </div>
      </Card>
      <div className="bg-hz-cloud border border-[rgba(100,92,220,0.2)] rounded-hz-sm px-3 py-2.5 text-xs text-hz-muted mb-5">
        ℹ️ One consolidated charge today. Payment method and final confirmation is handled in the payment flow next.
      </div>
      <Btn onClick={onNext} variant="teal">Continue to payment →</Btn>
      <div className="mt-2 text-center text-xs text-hz-hint">Payment processing covered in c-series prototypes</div>
    </Shell>
  );
};

// ── S6: Home (Two Students) ────────────────────────────────────────────────
const S6=()=>{
  const combined=EXISTING_STUDENT.balance+NEW_STUDENT.balance;
  const newPmt=Math.round(combined/EXISTING_STUDENT.installments);
  return (
    <div className="min-h-screen bg-hz-bg">
      <div className="bg-white border-b border-hz-border px-4 py-3 flex items-center justify-between">
        <div className="text-xs font-bold text-hz-accent tracking-wide">HORIZON</div>
        <div className="w-8 h-8 rounded-full bg-hz-cloud flex items-center justify-center text-xs font-bold text-hz-accent">LD</div>
      </div>
      <div className="px-4 py-6 max-w-sm mx-auto">
        <h1 className="text-2xl font-bold text-hz-text mb-0.5">Hi, {AP_FIRST} 👋</h1>
        <p className="text-xs text-hz-hint mb-4">Payer for {EXISTING_STUDENT.name} &amp; {NEW_STUDENT.name} · {SCHOOL}</p>

        <Card className="p-4 mb-4">
          <div className="text-xs font-bold text-hz-hint uppercase tracking-wider mb-2">Combined summary</div>
          <div className="text-3xl font-bold text-hz-text mb-0.5">{fmt(combined)}</div>
          <div className="text-xs text-hz-muted mb-3">Combined balance · Plan active for both</div>
          <div className="space-y-2 text-xs">
            {[EXISTING_STUDENT,NEW_STUDENT].map((s,i)=>(
              <div key={i} className="flex items-center justify-between">
                <div className="flex items-center gap-1.5">
                  <span className={`w-2 h-2 rounded-full inline-block ${i===0?'bg-hz-teal':'bg-hz-indigo'}`}/>
                  <span className="text-hz-muted">{s.name}</span>
                </div>
                <span className="font-medium text-hz-text">{fmt(s.balance)}</span>
              </div>
            ))}
          </div>
          <div className="h-2 bg-hz-cloud rounded-full overflow-hidden mt-3">
            <div className="h-full w-0 bg-hz-teal rounded-full"/>
          </div>
          <div className="text-xs text-hz-muted mt-1.5">Combined plan · ≈{fmt(newPmt)}/mo</div>
        </Card>

        <div className="space-y-2.5">
          {[
            {icon:'📅',l:'My Combined Pay Over Time Plan',s:'Updated installments after adding Ryan',hi:true},
            {icon:'💳',l:'Make a Payment',s:'Combined account'},
            {icon:'📊',l:'Account History',s:'View all activity'},
          ].map((a,i)=>(
            <Card key={i} className={`p-3.5 flex items-center gap-3 cursor-pointer hover:shadow-md transition-shadow ${a.hi?'border-hz-accent/30':''}`}>
              <span className="text-xl shrink-0">{a.icon}</span>
              <div className="flex-1 min-w-0">
                <div className={`text-sm font-semibold ${a.hi?'text-hz-accent':'text-hz-text'}`}>{a.l}</div>
                <div className="text-xs text-hz-hint truncate">{a.s}</div>
              </div>
              <span className="text-hz-hint text-sm">›</span>
            </Card>
          ))}
        </div>
      </div>
    </div>
  );
};

const App=()=>{
  const [s,setS]=React.useState(0);
  const go=n=>{setS(n);window.scrollTo(0,0);};
  return [
    <S1 onNext={()=>go(1)}/>,<S2 onNext={()=>go(2)} onBack={()=>go(0)}/>,
    <S3 onNext={()=>go(3)} onBack={()=>go(1)}/>,<S4 onNext={()=>go(4)} onBack={()=>go(2)}/>,
    <S5 onNext={()=>go(5)} onBack={()=>go(3)}/>,<S6/>,
  ][s]||null;
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
