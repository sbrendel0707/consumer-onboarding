const Btn = ({children, onClick, className='', disabled=false, variant='primary', 'aria-label':ariaLabel}) => {
  const base = 'w-full py-3.5 rounded-hz-pill font-semibold text-[15px] transition-all active:scale-[0.97] ';
  const v = {
    primary: 'bg-hz-indigo text-white hover:opacity-90',
    ghost:   'bg-hz-cloud text-hz-indigo hover:opacity-90',
    outline: 'border border-[rgba(100,92,220,0.3)] text-hz-indigo hover:bg-hz-cloud',
    danger:  'bg-hz-danger text-white hover:opacity-90',
    success: 'bg-hz-teal text-white hover:opacity-90',
  };
  return (
    <button onClick={onClick} disabled={disabled} aria-label={ariaLabel}
      className={base + (v[variant]||v.primary) + ' ' + className + (disabled?' opacity-40 cursor-not-allowed':'')}>
      {children}
    </button>
  );
};

const Input = ({label, id, value, onChange, type='text', placeholder='', error='', hint='', className=''}) => {
  const inputId = id || (label ? label.toLowerCase().replace(/\s+/g,'-') : undefined);
  return (
    <div className={'mb-4 '+className}>
      {label && <label htmlFor={inputId} className="block text-xs font-semibold text-hz-muted mb-1">{label}</label>}
      <input id={inputId} type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        className={'w-full bg-white border rounded-hz-sm px-4 py-3 text-hz-text placeholder-hz-hint text-[15px] outline-none focus:border-hz-accent transition-colors '+(error?'border-hz-danger':'border-[rgba(100,92,220,0.14)]')} />
      {error && <p className="text-hz-danger text-xs mt-1" role="alert">{error}</p>}
      {hint  && <p className="text-hz-hint text-xs mt-1">{hint}</p>}
    </div>
  );
};

// ─── CustomSelect ─────────────────────────────────────────────────────────
// Fully styled popover select — replaces native <select> across all screens.
// Supports keyboard nav (↑↓ navigate, Enter/Space selects, Escape closes),
// click-outside dismiss, animated chevron, checkmark on selected option.
const CustomSelect = ({label, id, value, onChange, options, placeholder='Select…', className=''}) => {
  const [open,         setOpen]         = React.useState(false);
  const [highlightIdx, setHighlightIdx] = React.useState(-1);
  const containerRef = React.useRef(null);
  const triggerId = id ? id + '-btn'  : undefined;
  const listId    = id ? id + '-list' : undefined;

  const selectedOpt  = options.find(o => (o.value !== undefined ? o.value : o) === value);
  const displayLabel = selectedOpt ? (selectedOpt.label !== undefined ? selectedOpt.label : selectedOpt) : placeholder;
  const isEmpty      = !value;

  // Click-outside to close
  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (containerRef.current && !containerRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const openDropdown = () => {
    const startIdx = options.findIndex(o => (o.value !== undefined ? o.value : o) === value);
    setHighlightIdx(startIdx >= 0 ? startIdx : 0);
    setOpen(true);
  };

  const selectOption = (val) => { onChange(val); setOpen(false); };

  const handleKeyDown = (e) => {
    if (!open) {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') { e.preventDefault(); openDropdown(); }
      return;
    }
    if      (e.key === 'Escape')    { setOpen(false); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); setHighlightIdx(i => Math.min(i + 1, options.length - 1)); }
    else if (e.key === 'ArrowUp')   { e.preventDefault(); setHighlightIdx(i => Math.max(i - 1, 0)); }
    else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (highlightIdx >= 0 && highlightIdx < options.length) {
        selectOption(options[highlightIdx].value !== undefined ? options[highlightIdx].value : options[highlightIdx]);
      }
    }
  };

  return (
    <div className={'mb-4 relative ' + className} ref={containerRef}>
      {label && (
        <label htmlFor={triggerId} className="block text-xs font-semibold text-hz-muted mb-1.5">{label}</label>
      )}

      {/* Trigger button */}
      <button
        id={triggerId}
        type="button"
        role="combobox"
        aria-haspopup="listbox"
        aria-expanded={open}
        aria-controls={listId}
        onKeyDown={handleKeyDown}
        onClick={() => open ? setOpen(false) : openDropdown()}
        className={[
          'w-full bg-hz-card rounded-hz-sm px-4 py-3 text-[14px] font-medium text-left',
          'flex items-center justify-between gap-2',
          'border transition-all duration-150',
          open
            ? 'border-hz-accent ring-2 ring-hz-accent/20 shadow-sm'
            : 'border-[rgba(100,92,220,0.2)] hover:border-hz-accent/50 hover:shadow-sm',
          isEmpty ? 'text-hz-hint' : 'text-hz-text',
        ].join(' ')}
      >
        <span className="truncate flex-1">{displayLabel}</span>
        {/* Animated chevron */}
        <svg
          width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"
          className={'flex-shrink-0 text-hz-accent transition-transform duration-200 ' + (open ? 'rotate-180' : '')}
        >
          <path d="M3 5l4 4 4-4" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>

      {/* Dropdown panel */}
      {open && (
        <ul
          id={listId}
          role="listbox"
          aria-label={label || 'Options'}
          className="absolute z-50 w-full mt-1.5 bg-hz-card border border-[rgba(100,92,220,0.18)] rounded-hz-sm overflow-hidden overflow-y-auto"
          style={{
            maxHeight: '13.5rem',
            boxShadow: '0 8px 32px rgba(45,31,163,0.13), 0 2px 8px rgba(45,31,163,0.06)',
          }}
        >
          {options.map((o, i) => {
            const val      = o.value  !== undefined ? o.value  : o;
            const lbl      = o.label  !== undefined ? o.label  : o;
            const isSel    = val === value;
            const isHl     = i === highlightIdx;
            return (
              <li
                key={String(val)}
                role="option"
                aria-selected={isSel}
                onMouseEnter={() => setHighlightIdx(i)}
                onMouseDown={(e) => { e.preventDefault(); selectOption(val); }}
                className={[
                  'px-4 py-2.5 text-[13px] font-medium cursor-pointer',
                  'flex items-center justify-between gap-2 select-none',
                  'transition-colors duration-75',
                  isSel
                    ? 'bg-hz-cloud text-hz-indigo'
                    : isHl
                    ? 'bg-hz-bg text-hz-text'
                    : 'text-hz-text hover:bg-hz-bg',
                ].join(' ')}
              >
                <span className="flex-1 truncate">{lbl}</span>
                {isSel && (
                  <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true" className="flex-shrink-0 text-hz-accent">
                    <path d="M2 6.5l3.5 3.5 5.5-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
              </li>
            );
          })}
        </ul>
      )}
    </div>
  );
};

// HORIZON DESIGN SYSTEM — INTERACTION PATTERNS
// Progressive reveal: when decisions are sequential and tightly coupled,
// reveal the next input inline on the same page rather than routing to a new
// screen. Keeps context visible, reduces navigation overhead, and makes the
// relationship between choices obvious. Examples: count → invite form,

// HORIZON — RangeSlider: styled range input with floating tooltip
// Thumb accurately positioned at track edges; native input overlaid for interaction.
const RangeSlider = ({value, min, max, step=25, onChange, topLabel, minHint, formatFn}) => {
  const fmtFn = formatFn || fmt;
  const pct = max > min ? (value - min) / (max - min) * 100 : 0;
  // Thumb left edge (accounts for 20px thumb width so it stays on-track at extremes)
  const thumbLeft = `calc(${pct}% - ${pct / 100 * 20}px)`;
  // Tooltip center (thumb left edge + 10px = thumb center)
  const tipLeft   = `calc(${pct}% + ${10 - pct / 100 * 20}px)`;
  return (
    <div>
      {/* Floating tooltip above thumb */}
      <div className="relative mb-3" style={{height:'44px'}} aria-hidden="true">
        <div className="absolute bottom-0 pointer-events-none" style={{left:tipLeft, transform:'translateX(-50%)'}}>
          <div className="bg-hz-text text-white rounded-[8px] px-3 py-1.5 text-center whitespace-nowrap shadow">
            {topLabel && <p className="text-[9px] text-white/60 mb-0.5 leading-none">{topLabel}</p>}
            <p className="text-[12px] font-bold leading-none">{fmtFn(value)}</p>
          </div>
          {/* Arrow */}
          <div className="mx-auto w-0 h-0" style={{borderLeft:'5px solid transparent',borderRight:'5px solid transparent',borderTop:'5px solid #1A1060'}}/>
        </div>
      </div>
      {/* Track — py-3 gives 24px touch target */}
      <div className="relative py-3">
        <div className="absolute left-0 right-0 top-1/2 -translate-y-1/2 h-2 rounded-full bg-[rgba(100,92,220,0.12)]">
          <div className="h-full rounded-full bg-hz-indigo pointer-events-none" style={{width:`${pct}%`}}/>
        </div>
        {/* Visual thumb */}
        <div className="absolute top-1/2 -translate-y-1/2 w-5 h-5 rounded-full bg-white border-2 border-hz-indigo shadow-md pointer-events-none z-10"
          style={{left:thumbLeft}}/>
        {/* Invisible native input captures all interaction */}
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={e=>onChange(Number(e.target.value))}
          className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20"
          style={{margin:0}}
          aria-label={topLabel||'Slider'} aria-valuemin={min} aria-valuemax={max}
          aria-valuenow={value} aria-valuetext={fmtFn(value)}/>
      </div>
      {/* Min / max labels */}
      <div className="flex justify-between mt-1">
        <span className="text-[10px] text-hz-hint">{minHint||fmtFn(min)}</span>
        <span className="text-[10px] text-hz-hint">{fmtFn(max)}</span>
      </div>
    </div>
  );
};

const STEP_LABELS = [
  'Agreements',
  'Security',
  "Who's Paying",
  'Insurance',
  'Payment',
  'Communications',
];

// First screen of each step — used by StepBar to jump back
const STEP_ENTRY = ['agreements','security-questions','payer','insurance','howpay','comms'];

const StepBar = ({current, total=6, nav}) => (
  <div className="bg-hz-card border-b border-[rgba(100,92,220,0.08)] px-4 py-2.5">
    <div className="flex items-center gap-1 mb-1.5">
      {Array.from({length:total}).map((_,i)=>{
        const done   = i < current-1;
        const active = i === current-1;
        const El     = done && nav ? 'button' : 'div';
        return (
          <React.Fragment key={i}>
            <El
              onClick={done && nav ? ()=>nav(STEP_ENTRY[i]) : undefined}
              title={done && nav ? `Go back to Step ${i+1}: ${STEP_LABELS[i]}` : undefined}
              aria-label={done && nav ? `Go back to step ${i+1}: ${STEP_LABELS[i]}` : `Step ${i+1} ${done?'completed':active?'current':'upcoming'}: ${STEP_LABELS[i]}`}
              className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 transition-all
                ${done
                  ? 'bg-hz-teal text-white ' + (nav ? 'cursor-pointer hover:scale-110 hover:shadow-sm active:scale-95' : '')
                  : active
                    ? 'bg-hz-indigo text-white ring-2 ring-hz-indigo/20'
                    : 'bg-hz-cloud text-hz-hint'}`}>
              {done ? '✓' : i+1}
            </El>
            {i < total-1 && (
              <div className={`flex-1 h-0.5 transition-colors ${i < current-1 ? 'bg-hz-teal' : 'bg-hz-cloud'}`} aria-hidden="true"/>
            )}
          </React.Fragment>
        );
      })}
    </div>

const ProtoIntroScreen = ({nav}) => {
  const [copied, setCopied] = React.useState(false);

  const copyLink = () => {
    const url = window.location.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 2500);
      }).catch(() => fallbackCopy(url));
    } else {
      fallbackCopy(url);
    }
  };
  const fallbackCopy = (url) => {
    const el = document.createElement('textarea');
    el.value = url; el.style.position = 'fixed'; el.style.opacity = '0';
    document.body.appendChild(el); el.select();
    try { document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 2500); } catch(e) {}
    document.body.removeChild(el);
  };

  return (
    <ScreenWrap portal={false}>
    <div className="flex flex-col px-6 py-10 h-full overflow-y-auto">
      <div className="flex-1 flex flex-col justify-center">

            className={[
              'flex items-center gap-1.5 px-3 py-1.5 rounded-hz-pill text-[11px] font-semibold',
              'border transition-all duration-150',
              copied
                ? 'bg-hz-teal-bg border-hz-teal/40 text-hz-teal'
                : 'bg-hz-card border-[rgba(100,92,220,0.2)] text-hz-indigo hover:bg-hz-cloud hover:border-hz-accent/40',
            ].join(' ')}
          >
            {copied ? (
              <>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                  <path d="M2 6l3 3 5-5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>

                Copied!

            ) : (
              <>

          {phones.map((ph, i) => (

              <div className="flex items-center justify-between mb-1">

                  {i === 0 ? 'Primary mobile' : `Additional phone ${i}`}
                  {i === 0 && <span className="ml-1.5 text-[10px] font-normal text-hz-hint">(from school)</span>}
                </label>
                <div className="flex items-center gap-3">
                  {editIdx.phone === i ? (
                    <button onClick={()=>setEditIdx(p=>({...p,phone:null}))}
                      className="text-hz-teal text-[11px] font-semibold hover:opacity-75 transition-opacity">Done</button>
                  ) : (
                    <button onClick={()=>setEditIdx(p=>({...p,phone:i}))}
                      className="text-hz-accent text-[11px] font-medium hover:opacity-75 transition-opacity">Edit</button>
                  )}
                  {i > 0 && (
                    <button onClick={()=>{ setPhones(prev=>prev.filter((_,j)=>j!==i)); setEditIdx(p=>({...p,phone:null})); }}
                      className="text-hz-danger text-[11px] font-medium hover:opacity-75 transition-opacity">Remove</button>
                  )}
                </div>
              </div>
              {editIdx.phone === i ? (
                <input id={`comms-phone-${i}`} type="tel" value={ph}
                  onChange={e=>updatePhone(i, e.target.value)}

                <p className="text-[13px] text-hz-text">{ph || <span className="text-hz-hint italic">Not set</span>}</p>

          <button
            onClick={()=>{ setPhones(prev=>[...prev,'']); setEditIdx(p=>({...p,phone:phones.length})); }}
            className="flex items-center gap-1.5 text-hz-accent text-[12px] font-semibold hover:opacity-75 transition-opacity pt-1">
            <span aria-hidden="true" className="text-base leading-none">+</span> Add another phone
          </button>
        </div>

        {/* Informational texts */}
        <div className="bg-hz-card border border-[rgba(100,92,220,0.14)] rounded-hz px-4 py-3 space-y-3">
          <p className="text-[10px] font-bold uppercase tracking-widest text-hz-hint">Informational texts</p>
          <div className="flex items-start justify-between gap-4">
            <div className="flex-1">
              <p className="text-[13px] font-semibold text-hz-text">Payment &amp; account alerts</p>
              <p className="text-[11px] text-hz-muted mt-0.5 leading-relaxed">Payment confirmations, upcoming due dates, installment reminders, balance changes</p>
            </div>
            <Toggle on={smsInfo} onChange={setSmsInfo} aria-label="Opt in to informational account texts"/>

        </div>

        {/* Marketing texts */}
        <div className="bg-hz-card border border-[rgba(100,92,220,0.14)] rounded-hz px-4 py-3 space-y-3">
          <p className="text-[10px] font-bold uppercase tracking-widest text-hz-hint">Marketing texts</p>
          <div className="flex items-start justify-between gap-4">
            <div className="flex-1">
              <p className="text-[13px] font-semibold text-hz-text">Offers &amp; opportunities</p>
              <p className="text-[11px] text-hz-muted mt-0.5 leading-relaxed">Financial aid tips, payment plan promotions, scholarship alerts, savings opportunities</p>
            </div>
            <Toggle on={smsMarketing} onChange={setSmsMarketing} aria-label="Opt in to marketing texts"/>

          {/* Opt-in nudge — shown until dismissed or opted in */}
          {showMarketingPrompt && !smsMarketing && (
            <div className="bg-hz-cloud border border-hz-accent/20 rounded-hz-sm px-3 py-3 space-y-2">
              <p className="text-[12px] font-semibold text-hz-text">Your school has you set to informational texts only</p>
              <p className="text-[11px] text-hz-muted leading-relaxed">
                You'd miss things like early payment plan reminders, financial aid deadlines, and scholarship opportunities. Want to opt in to marketing texts too?

              <div className="flex gap-2 pt-1">
                <button onClick={()=>{ setSmsMarketing(true); setShowMarketingPrompt(false); }}
                  className="flex-1 py-2 rounded-hz-sm bg-hz-indigo text-white text-[12px] font-semibold hover:opacity-90 transition-opacity">
                  Yes, opt me in
                </button>
                <button onClick={()=>setShowMarketingPrompt(false)}
                  className="flex-1 py-2 rounded-hz-sm border border-[rgba(100,92,220,0.2)] text-hz-muted text-[12px] font-medium hover:bg-hz-card transition-colors">
                  No thanks
                </button>
              </div>
            </div>
          )}
        </div>

      </div>

      <div className="absolute bottom-0 left-0 right-0 bg-hz-card border-t border-[rgba(100,92,220,0.1)] px-4 py-3">
        <Btn onClick={next}>Save &amp; continue</Btn>
      </div>
    </ScreenWrap>
  );
};

// ─── PayerScreen ─────────────────────────────────────────────────────────
const PayerScreen = ({nav, goBack, S, setS}) => {
  const [payer,   setPayer]   = React.useState('');
  const [showDL,  setShowDL]  = React.useState(false);

  const next = () => {
    if (!payer) return;
    setS(p=>({...p, payer}));
    if (payer === 'other' || payer === 'combo') nav('invite');
    else nav('insurance');
  };

  return (
    <ScreenWrap>
      <StepBar current={3} nav={nav}/>
      <div className="px-5 pt-5 pb-36 space-y-3">
        <div>
          <p className="text-[18px] font-bold text-hz-text mb-2">Who's paying?</p>
          <p className="text-hz-muted text-[13px] mb-4 leading-relaxed">We want to know who will be logging in to this payment portal to submit payments, so we know what tasks are most relevant to you.</p>
        </div>

        {/* Balance context */}
        <div className="bg-hz-cloud border border-hz-accent/20 rounded-hz px-4 py-3 flex items-center justify-between">
          <div>
            <p className="text-[10px] font-bold uppercase tracking-widest text-hz-hint">Balance due</p>
            <p className="text-[22px] font-bold text-hz-text leading-tight">{fmt(BALANCE_DUE)}</p>
          </div>
          <Badge color="amber">Due May 1</Badge>
        </div>

        <RadioCard selected={payer==='self'} onClick={()=>setPayer('self')} aria-label="I will pay myself">
          <p className="text-[14px] font-semibold text-hz-text">I'll pay myself</p>
          <p className="text-[12px] text-hz-muted mt-0.5 leading-snug">I will submit payments — whether that's from my bank account, employer reimbursement, or even scholarships that were first paid out to me.</p>
        </RadioCard>
        <RadioCard selected={payer==='other'} onClick={()=>setPayer('other')} aria-label="Someone else is paying">
          <p className="text-[14px] font-semibold text-hz-text">Someone else is paying</p>
          <p className="text-[12px] text-hz-muted mt-0.5 leading-snug">Invite someone else — or multiple people — into your payment portal to make payments for you.</p>
        </RadioCard>
        <RadioCard selected={payer==='combo'} onClick={()=>setPayer('combo')} aria-label="We will share the payments">
          <p className="text-[14px] font-semibold text-hz-text">We'll share the payments</p>
          <p className="text-[12px] text-hz-muted mt-0.5 leading-snug">You'll cover parts of your school costs while someone else pays other parts.</p>
        </RadioCard>
      </div>

      {showDL && (
        <DecideLaterModal
          stepName="Who's Paying"
          onConfirm={()=>{ setS(p=>({...p, payerDeferred:true})); nav('insurance'); }}
          onCancel={()=>setShowDL(false)}/>
      )}

      <div className="absolute bottom-0 left-0 right-0 bg-hz-card border-t border-[rgba(100,92,220,0.1)] px-4 py-3">
        <button onClick={next} disabled={!payer} aria-disabled={!payer}
          aria-label="Save who is paying and continue"
          className={`w-full py-3 rounded-hz-pill text-[14px] font-semibold transition-all
            ${payer ? 'bg-hz-indigo text-white hover:opacity-90' : 'bg-hz-cloud text-hz-hint cursor-not-allowed'}`}>
          Save &amp; continue
        </button>
        <DecideLaterBtn onClick={()=>setShowDL(true)}/>
      </div>
    </ScreenWrap>
  );
};


// ─── InviteScreen ────────────────────────────────────────────────────────
// Single-page progressive reveal: select count → form expands inline → add more collapses prior cards
const InviteScreen = ({nav, goBack, S, setS}) => {
  const isCombo = S.payer === 'combo';

  // combo-only: student's own share
  const [studentPct,    setStudentPct]    = React.useState('');
  const [studentPctSet, setStudentPctSet] = React.useState(false); // confirmed % → reveals count

  const [count,   setCount]   = React.useState('');   // 'one' | 'multi'
  const [sent,    setSent]    = React.useState([]);   // committed payers

  // active form fields
  const [first,   setFirst]   = React.useState('');
  const [last,    setLast]    = React.useState('');
  const [email,   setEmail]   = React.useState('');
  const [rel,     setRel]     = React.useState('');
  const [pct,     setPct]     = React.useState('');
  const [pctMode, setPctMode] = React.useState('set');
  const [showForm, setShowForm] = React.useState(false);

  // Decide Later — partial-save modal (#3)
  const [showDLModal, setShowDLModal] = React.useState(false);
  const hasPartialAnswers = studentPctSet || count || sent.length > 0 || first.trim() || email.trim();

  const isMulti = count === 'multi';
  const remainingPct = studentPctSet ? 100 - Number(studentPct) : 100;
  const totalPctAssigned = sent.filter(p=>p.pctMode==='set').reduce((s,p)=>s+Number(p.pct||0), 0);
  const canSend = first.trim() && email.includes('@') &&
    (!isMulti || pctMode === 'ask' || (pct !== '' && Number(pct) > 0 && Number(pct) <= 100));

  // For combo: count question only shows after student % is confirmed
  const showCountSection = !isCombo || studentPctSet;

  const handleCountSelect = (val) => {
    setCount(val);
    setShowForm(true);
  };

  const addPayer = () => {
    setSent(p=>[...p, {first, last, email, rel, pct: pctMode==='ask' ? null : pct, pctMode}]);
    setFirst(''); setLast(''); setEmail(''); setRel(''); setPct(''); setPctMode('set');
  };

  const finish = () => {
    const finalSent = (first.trim() && email.includes('@'))
      ? [...sent, {first, last, email, rel, pct: pctMode==='ask' ? null : pct, pctMode}]
      : sent;
    setS(p=>({...p, authPayers: finalSent, studentPct: studentPctSet ? Number(studentPct) : null}));
    nav(S.payer === 'other' ? 'payer-handoff' : 'insurance');
  };

  const canFinish = sent.length > 0 || (first.trim() && email.includes('@') &&
    (!isMulti || pctMode === 'ask' || (pct !== '' && Number(pct) > 0)));

  const decideLater = () => {
    if (hasPartialAnswers) { setShowDLModal(true); }
    else { setS(p=>({...p, inviteDeferred:true})); nav('insurance'); }
  };
  const dlSaveAndContinue = () => {
    // Save whatever partial state we have
    const partialPayers = sent.length > 0 ? sent : (first.trim() && email.trim() ? [{first,last,email,rel,pct,pctMode}] : []);
    setS(p=>({...p, inviteDeferred:true, authPayers: partialPayers, studentPct: studentPctSet ? Number(studentPct) : null}));
    nav('insurance');
  };
  const dlStartOver = () => {
    setStudentPct(''); setStudentPctSet(false); setCount(''); setSent([]);
    setFirst(''); setLast(''); setEmail(''); setRel(''); setPct(''); setPctMode('set');
    setShowForm(false); setShowDLModal(false);
    setS(p=>({...p, inviteDeferred:true, authPayers:[], studentPct:null}));
    nav('insurance');
  };

  return (
    <ScreenWrap>
      <StepBar current={3} nav={nav}/>
      <div className="px-5 pt-5 pb-36 overflow-y-auto">
        <BackBtn onClick={goBack}/>

        <p className="text-[18px] font-bold text-hz-text mb-2">Invite your payers</p>
        <p className="text-hz-muted text-[13px] mb-4 leading-relaxed">
          {isCombo
            ? "Let's figure out how to split your balance."
            : "How many other people will be paying on your account?"}
        </p>

        {/* Balance due context — always visible (#3) */}
        <div className="bg-hz-cloud border border-hz-accent/20 rounded-hz px-4 py-3 flex items-center justify-between mb-5">
          <div>
            <p className="text-[10px] font-bold uppercase tracking-widest text-hz-hint">Balance due</p>
            <p className="text-[22px] font-bold text-hz-text leading-tight">{fmt(BALANCE_DUE)}</p>
          </div>
          <Badge color="amber">Due May 1</Badge>
        </div>

        {/* ── COMBO ONLY: student's own share ── */}
        {isCombo && (
          <div className="mb-5">
            <div className="bg-hz-card border border-[rgba(100,92,220,0.14)] rounded-hz px-4 py-4 space-y-3">
              <p className="text-[11px] font-bold uppercase tracking-widest text-hz-hint">Your share</p>
              <p className="text-[13px] text-hz-muted leading-relaxed">What percentage of your total school costs will <span className="font-semibold text-hz-text">you</span> be paying?</p>
              <div className="flex items-center gap-3">
                <div className="relative flex-1">
                  <input
                    type="number" min="1" max="99" value={studentPct}
                    onChange={e=>{ setStudentPct(e.target.value); setStudentPctSet(false); }}
                    placeholder="e.g. 50"
                    aria-label="Percentage you will pay"
                    disabled={studentPctSet}
                    className={`w-full border border-[rgba(100,92,220,0.2)] rounded-hz-sm px-3 py-2.5 pr-8 text-[14px] font-semibold text-hz-indigo focus:outline-none focus:border-hz-accent focus:ring-2 focus:ring-hz-accent/20 transition-colors ${studentPctSet ? 'bg-hz-cloud' : 'bg-hz-card'}`}/>
                  <span className="absolute right-3 top-1/2 -translate-y-1/2 text-hz-hint text-[13px] font-semibold">%</span>
                </div>
                {!studentPctSet && (
                  <button
                    onClick={()=>{ if(Number(studentPct)>0 && Number(studentPct)<100) setStudentPctSet(true); }}
                    disabled={!(Number(studentPct)>0 && Number(studentPct)<100)}
                    className={`px-4 py-2.5 rounded-hz-sm text-[13px] font-semibold transition-colors flex-shrink-0 ${
                      Number(studentPct)>0 && Number(studentPct)<100
                        ? 'bg-hz-indigo text-white hover:opacity-90'
                        : 'bg-hz-cloud text-hz-hint cursor-not-allowed'}`}>
                    Confirm
                  </button>
                )}
                {studentPctSet && (
                  <button onClick={()=>{ setStudentPctSet(false); setCount(''); setShowForm(false); setSent([]); }}
                    className="text-hz-accent text-[12px] font-medium hover:opacity-75 transition-opacity flex-shrink-0">
                    Edit
                  </button>
                )}
              </div>
              {studentPctSet && (
                <div className="flex items-center justify-between pt-1 border-t border-[rgba(100,92,220,0.08)]">
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full bg-hz-indigo"/>
                    <span className="text-[12px] text-hz-muted">Your share</span>
                  </div>
                  <span className="text-[13px] font-bold text-hz-indigo">{studentPct}%</span>
                </div>
              )}
              {studentPctSet && (
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full bg-hz-teal"/>
                    <span className="text-[12px] text-hz-muted">Others will cover</span>
                  </div>
                  <span className="text-[13px] font-bold text-hz-teal">{remainingPct}%</span>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Count selector — only shown after student % confirmed (combo) or immediately (other) */}
        {showCountSection && (
        <div className="space-y-2 mb-5">
          <p className="text-hz-muted text-[13px] mb-3 leading-relaxed">
            {isCombo
              ? `How many people will cover the remaining ${remainingPct}%?`
              : 'How many other people will be paying on your account?'}
          </p>
          {[
            {val:'one',   label:'Just one person',    sub: isCombo ? `One person covers the remaining ${remainingPct}%.` : 'One other person will handle all payments.'},
            {val:'multi', label:'Two or more people', sub: isCombo ? `Multiple people split the remaining ${remainingPct}%.` : 'Multiple payers, each responsible for a portion.'},
          ].map(opt=>(
            <button key={opt.val} onClick={()=>handleCountSelect(opt.val)}
              aria-pressed={count===opt.val}
              className={`w-full text-left px-4 py-3 rounded-hz border transition-all ${
                count===opt.val
                  ? 'border-hz-indigo bg-hz-cloud'
                  : 'border-[rgba(100,92,220,0.2)] bg-hz-card hover:border-hz-accent/40'
              }`}>
              <div className="flex items-center gap-3">
                <div className={`w-4 h-4 rounded-full border-2 flex-shrink-0 flex items-center justify-center ${count===opt.val ? 'border-hz-indigo' : 'border-hz-hint'}`}>
                  {count===opt.val && <div className="w-2 h-2 rounded-full bg-hz-indigo"/>}
                </div>
                <div>
                  <p className={`text-[13px] font-semibold ${count===opt.val ? 'text-hz-indigo' : 'text-hz-text'}`}>{opt.label}</p>
                  <p className="text-[11px] text-hz-muted mt-0.5">{opt.sub}</p>
                </div>
              </div>
            </button>
          ))}
        </div>
        )}

        {/* Form — slides in after count is chosen */}
        {showForm && (
          <>
            {/* Collapsed cards for already-added payers */}
            {sent.length > 0 && (
              <div className="mb-4 space-y-2">
                <p className="text-[10px] font-bold uppercase tracking-widest text-hz-hint">Invited</p>
                {sent.map((p,i)=>(
                  <div key={i} className="flex items-center gap-2.5 bg-hz-teal-bg border border-hz-teal/25 rounded-hz-sm px-3 py-2">
                    <div className="w-7 h-7 rounded-full bg-hz-teal/20 flex items-center justify-center text-[11px] font-bold text-hz-teal flex-shrink-0">
                      {(p.first[0]||'?').toUpperCase()}{(p.last[0]||'').toUpperCase()}
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-[12px] font-semibold text-hz-text truncate">{p.first} {p.last}</p>
                      <p className="text-[11px] text-hz-muted truncate">{p.email}</p>
                    </div>
                    {isMulti && (
                      <span className="text-[11px] font-semibold text-hz-teal flex-shrink-0">
                        {p.pctMode==='ask' ? 'AP sets %' : p.pct+'%'}
                      </span>
                    )}
                  </div>
                ))}
              </div>
            )}

            {/* New payer form */}
            <div className="bg-hz-card border border-[rgba(100,92,220,0.14)] rounded-hz px-4 py-4 space-y-3 mb-4">
              <p className="text-[11px] font-bold uppercase tracking-widest text-hz-hint">
                {sent.length === 0 ? 'Payer details' : `Payer ${sent.length + 1} details`}
              </p>

              <div className="flex gap-3">
                <div className="flex-1">
                  <label htmlFor="inv-first" className="block text-xs font-semibold text-hz-muted mb-1">First name</label>
                  <input id="inv-first" type="text" value={first} onChange={e=>setFirst(e.target.value)} placeholder="Jane"
                    className="w-full border border-[rgba(100,92,220,0.2)] rounded-hz-sm px-3 py-2.5 text-[13px] text-hz-text focus:outline-none focus:border-hz-accent focus:ring-2 focus:ring-hz-accent/20 transition-colors"/>
                </div>
                <div className="flex-1">
                  <label htmlFor="inv-last" className="block text-xs font-semibold text-hz-muted mb-1">Last name</label>
                  <input id="inv-last" type="text" value={last} onChange={e=>setLast(e.target.value)} placeholder="Doe"
                    className="w-full border border-[rgba(100,92,220,0.2)] rounded-hz-sm px-3 py-2.5 text-[13px] text-hz-text focus:outline-none focus:border-hz-accent focus:ring-2 focus:ring-hz-accent/20 transition-colors"/>
                </div>
              </div>
              <div>
                <label htmlFor="inv-email" className="block text-xs font-semibold text-hz-muted mb-1">Email address</label>
                <input id="inv-email" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="jane@example.com"
                  className="w-full border border-[rgba(100,92,220,0.2)] rounded-hz-sm px-3 py-2.5 text-[13px] text-hz-text focus:outline-none focus:border-hz-accent focus:ring-2 focus:ring-hz-accent/20 transition-colors"/>
              </div>

// ─── DatePicker ───────────────────────────────────────────────────────────
const DatePicker = ({value, min, max, onChange, id}) => {
  const parseD  = s => s ? new Date(s + 'T12:00:00') : null;
  const minDate = parseD(min);
  const maxDate = parseD(max);
  const initD   = parseD(value) || parseD(min) || new Date();

  const [viewYear,  setViewYear]  = React.useState(initD.getFullYear());
  const [viewMonth, setViewMonth] = React.useState(initD.getMonth());

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const TODAY  = new Date('2026-04-30T12:00:00');

  const daysInMonth  = new Date(viewYear, viewMonth + 1, 0).getDate();
  const firstDayOfWk = new Date(viewYear, viewMonth, 1).getDay();

  const canPrev = new Date(viewYear, viewMonth, 1) > new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  const canNext = new Date(viewYear, viewMonth, 1) < new Date(maxDate.getFullYear(), maxDate.getMonth(), 1);

  const goPrev = () => { if (!canPrev) return; if (viewMonth === 0) { setViewYear(y=>y-1); setViewMonth(11); } else setViewMonth(m=>m-1); };
  const goNext = () => { if (!canNext) return; if (viewMonth === 11) { setViewYear(y=>y+1); setViewMonth(0); } else setViewMonth(m=>m+1); };

  const cells = [...Array(firstDayOfWk).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];

  const pad = n => String(n).padStart(2,'0');
  const selectedD = parseD(value);

  return (
    <div id={id} className="bg-hz-card border border-[rgba(100,92,220,0.2)] rounded-hz p-4" role="application" aria-label="Date picker">
      {/* Month navigation */}
      <div className="flex items-center justify-between mb-4">
        <button type="button" onClick={goPrev} disabled={!canPrev} aria-label="Previous month"
          className={`w-9 h-9 rounded-full flex items-center justify-center text-[16px] transition-colors
            ${canPrev ? 'hover:bg-hz-cloud text-hz-indigo' : 'text-hz-hint/30 cursor-not-allowed'}`}>‹</button>
        <p className="text-[14px] font-semibold text-hz-text">{MONTHS[viewMonth]} {viewYear}</p>
        <button type="button" onClick={goNext} disabled={!canNext} aria-label="Next month"
          className={`w-9 h-9 rounded-full flex items-center justify-center text-[16px] transition-colors
            ${canNext ? 'hover:bg-hz-cloud text-hz-indigo' : 'text-hz-hint/30 cursor-not-allowed'}`}>›</button>
      </div>
      {/* Weekday headers */}
      <div className="grid grid-cols-7 mb-1">
        {DAYS.map(d=><div key={d} className="text-center text-[10px] font-semibold text-hz-hint py-1">{d}</div>)}
      </div>
      {/* Day cells */}
      <div className="grid grid-cols-7 gap-y-1">
        {cells.map((d,i) => {
          if (d === null) return <div key={`e${i}`}/>;
          const thisD    = new Date(viewYear, viewMonth, d, 12);
          const disabled = thisD < minDate || thisD > maxDate;
          const selected = selectedD && thisD.toDateString() === selectedD.toDateString();
          const isToday  = thisD.toDateString() === TODAY.toDateString();
          const dStr     = `${viewYear}-${pad(viewMonth+1)}-${pad(d)}`;
          return (
            <button key={d} type="button" onClick={() => !disabled && onChange(dStr)}
              disabled={disabled}
              aria-label={`${MONTHS[viewMonth]} ${d}, ${viewYear}`}
              aria-pressed={selected}
              className={`aspect-square flex items-center justify-center rounded-full text-[13px] font-medium transition-colors mx-auto w-9 h-9
                ${disabled  ? 'text-hz-hint/25 cursor-not-allowed' :
                  selected  ? 'bg-hz-indigo text-white shadow-sm' :
                  isToday   ? 'border-2 border-hz-accent text-hz-indigo hover:bg-hz-cloud' :
                  'text-hz-text hover:bg-hz-cloud'}`}>
              {d}
            </button>
          );
        })}
      </div>
    </div>
  );
};

// ─── HowPayScreen ────────────────────────────────────────────────────────
const HowPayScreen = ({nav, goBack, S, setS}) => {
  const [expanded,    setExpanded]    = React.useState(false);
  const [plan,        setPlan]        = React.useState('');
  const [planOk,      setPlanOk]      = React.useState(false); // payment type collapsed
  const [showDL,      setShowDL]      = React.useState(false);
  const [showAntInfo, setShowAntInfo] = React.useState(false);
  const [payWhen,     setPayWhen]    = React.useState(''); // 'now' | 'later'
  const [payWhenDate, setPayWhenDate] = React.useState('');
  const payWhenRef = React.useRef(null);

  // ── POT inline setup state ───────────────────────────────────────────────
  const FREQ_OPTIONS = [
    {val:'weekly',   label:'Weekly',         days:7},
    {val:'biweekly', label:'Every 2 weeks',  days:14},
    {val:'monthly',  label:'Monthly',        days:30},
  ];
  const FREQ_LABEL   = {weekly:'Weekly', biweekly:'Every 2 weeks', monthly:'Monthly'};
  const FREQ_DAYS    = {weekly:7, biweekly:14, monthly:30};
  const FREQ_S_LABEL = {weekly:'week', biweekly:'biweekly', monthly:'month'};

  // Balance adjusted for student share (combo payer)
  const studentShare = S.studentPct ? S.studentPct / 100 : 1;
  const myBalance    = Math.round(BALANCE_DUE * studentShare);
  const myPotBalance = Math.round(myBalance * (1 - 0.10)); // approx after 10% min down
  const minDown = Math.ceil(myBalance * 0.05 / 25) * 25;  // school min: 5%

  const [potFreq,     setPotFreq]    = React.useState('');
  const [potDate,     setPotDate]    = React.useState('');
  const [potDown,     setPotDown]    = React.useState(minDown);

  // Step confirmations
  const [freqOk, setFreqOk] = React.useState(false);
  const [dateOk, setDateOk] = React.useState(false);
  const [downOk, setDownOk] = React.useState(false);

  const editFreq = () => { setFreqOk(false); setDateOk(false); setDownOk(false); };
  const editDate = () => {                   setDateOk(false); setDownOk(false); };
  const editDown = () => {                                     setDownOk(false); };

  // Date constraints
  const minDateStr = '2026-05-01';
  const maxDateStr = '2026-05-30';
  const maxDateFmt = 'May 30, 2026';

  // Auto-calculate installments from school end date + chosen frequency + start date
  const potEndDate = React.useMemo(() => new Date(POT_PLAN_END_DATE + 'T12:00:00'), []);
  const potInstalls = React.useMemo(() => {
    if (!potDate || !potFreq) return 0;
    const start = new Date(potDate + 'T12:00:00');
    const days  = Math.floor((potEndDate - start) / 86400000);
    return Math.max(1, Math.floor(days / FREQ_DAYS[potFreq]) + 1);
  }, [potDate, potFreq]);

  // Last payment date derived from installments
  const lastPayDate = React.useMemo(() => {
    if (!potDate || !potInstalls || !potFreq) return null;
    const d = new Date(potDate + 'T12:00:00');
    d.setDate(d.getDate() + (potInstalls - 1) * FREQ_DAYS[potFreq]);
    return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  }, [potDate, potInstalls, potFreq]);

  // Per-installment amount
  const installAmt = potInstalls > 0
    ? Math.round((myBalance - potDown) / potInstalls * 100) / 100
    : 0;

  // Total due today
  const totalToday = potDown + NELNET_FEE + SCHOOL_ENROLLMENT_FEE + (S.insAccepted ? (S.insPremium || 0) : 0);
  const potComplete = planOk && freqOk && dateOk && downOk;

  // ── Auto-scroll refs ─────────────────────────────────────────────────────
  const potSetupRef = React.useRef(null);
  const dateStepRef = React.useRef(null);
  const downStepRef = React.useRef(null);

  React.useEffect(() => {
    if (plan === 'pot' && potSetupRef.current) {
      setTimeout(() => potSetupRef.current.scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
    }
  }, [plan]);
  React.useEffect(() => {
    if (freqOk && dateStepRef.current) {
      setTimeout(() => dateStepRef.current.scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
    }
  }, [freqOk]);
  React.useEffect(() => {
    if (dateOk && downStepRef.current) {
      setTimeout(() => downStepRef.current.scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
    }
  }, [dateOk]);
  React.useEffect(() => {
    if (plan === 'full' && planOk && payWhenRef.current) {
      setTimeout(() => payWhenRef.current.scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
    }
  }, [plan, planOk]);

  // ── Sub-components ───────────────────────────────────────────────────────
  const ConfirmBtn = ({onClick, disabled, label}) => (
    <button onClick={onClick} disabled={disabled}
      className={`w-full py-2.5 rounded-hz text-[13px] font-semibold transition-all
        ${disabled ? 'bg-hz-cloud text-hz-hint cursor-not-allowed' : 'bg-hz-indigo text-white hover:opacity-90 active:scale-[0.98]'}`}>
      {label || 'Confirm'}
    </button>
  );

  const SummaryStep = ({label, value, onEdit}) => (
    <div className="bg-hz-card border border-[rgba(100,92,220,0.14)] rounded-hz px-4 py-3 flex items-center justify-between">
      <div>
        <p className="text-[10px] font-semibold text-hz-hint uppercase tracking-wide">{label}</p>
        <p className="text-[13px] font-semibold text-hz-text mt-0.5">{value}</p>
      </div>
      <button onClick={onEdit} className="text-[12px] font-semibold text-hz-accent hover:opacity-75 transition-opacity ml-4 flex-shrink-0">Edit</button>
    </div>
  );

  // ── Navigate ─────────────────────────────────────────────────────────────
  const next = () => {
    if (plan === 'pot') {
      if (!potComplete) return;
      setS(p=>({...p,
        payPlan:'pot', potFreq, potInstall:installAmt, potCount:potInstalls,
        potFreqLabel:FREQ_S_LABEL[potFreq], potDown, potTotalToday:totalToday,
        potBwDate:potDate,
      }));
      nav('pot-confirm');
    } else if (plan === 'full') {
      setS(p=>({...p, payPlan:'full'}));
      if (payWhen === 'now') {
        nav('pay-confirm-full');
      } else if (payWhen === 'later' && payWhenDate) {
        setS(p=>({...p, schedDate: payWhenDate}));
        nav('pay-sched');
      }
    }
  };

  const selectPlan = (p) => { setPlan(p); setPlanOk(false); setFreqOk(false); setDateOk(false); setDownOk(false); setPayWhen(''); setPayWhenDate(''); };
  const confirmPlan = () => setPlanOk(true);
  const editPlan = () => { setPlanOk(false); setPlan(''); setFreqOk(false); setDateOk(false); setDownOk(false); setPayWhen(''); setPayWhenDate(''); };

  // Student's portion label for balance card
  const balanceLabel = S.studentPct
    ? `Your ${S.studentPct}% share of ${fmt(BALANCE_DUE)}`
    : 'Balance Due';

  return (
    <ScreenWrap>
      <Header title="How would you like to pay?" onBack={goBack}/>
      <StepBar current={5} nav={nav}/>
      <div className="px-5 pb-10 space-y-3">

        {/* ── Balance card — always visible ── */}
        <Card className="mt-4">
          <div className="flex justify-between items-center mb-1">
            <p className="text-[13px] text-hz-muted">{balanceLabel}</p>
            <Badge color="amber">Due May 1</Badge>
          </div>
          <p className="text-3xl font-bold text-hz-text mb-1">{fmt(myBalance)}</p>
          {S.studentPct && (
            <p className="text-[11px] text-hz-hint mb-1">Full balance: {fmt(BALANCE_DUE)} · Your portion: {S.studentPct}%</p>
          )}
          <button onClick={()=>setExpanded(p=>!p)} aria-expanded={expanded} aria-controls="balance-breakdown"
            className="text-hz-accent text-[12px] font-medium">
            {expanded ? '▲ Hide breakdown' : '▼ See breakdown'}
          </button>
          {expanded && (
            <div id="balance-breakdown" className="mt-3">
              <Divider/>
              <Row label="Tuition" value="$7,200"/>
              <Row label="Fees" value="$1,300"/>
              <Row label="Merit scholarship" value="−$1,200"/>
              <Row label="Pell Grant" value="−$1,100"/>
              <div className="flex justify-between items-baseline py-1.5 border-b border-[rgba(100,92,220,0.06)]">
                <div className="flex items-center gap-1.5">
                  <span className="text-[13px] text-hz-muted">Fed. subsidized loan</span>
                  <button onClick={()=>setShowAntInfo(true)}
                    className="text-[10px] font-semibold text-hz-accent bg-hz-cloud px-1.5 py-0.5 rounded-full hover:bg-hz-cloud/80 transition-colors">
                    Anticipated
                  </button>
                </div>
                <span className="text-[13px] text-hz-muted">−$1,000</span>
              </div>
              <Divider/>
              <Row label="Balance Due" value={fmt(BALANCE_DUE)} bold/>
              {S.studentPct && <Row label={`Your share (${S.studentPct}%)`} value={fmt(myBalance)} bold/>}
            </div>
          )}
        </Card>

        {/* ── Payment type selection — collapses once confirmed ── */}
        {planOk ? (
          <SummaryStep
            label="How would you like to pay?"
            value={plan==='pot' ? 'Pay over time' : 'Pay in full'}
            onEdit={editPlan}/>
        ) : (
          <div className="space-y-2">
            <RadioCard selected={plan==='pot'} onClick={()=>selectPlan('pot')}
              aria-label="Pay over time — split your balance into multiple payments">
              <p className="text-[14px] font-semibold text-hz-text">Pay over time</p>
              <p className="text-[12px] text-hz-muted mt-0.5">Split your balance into multiple payments over a longer period of time</p>
            </RadioCard>
            <RadioCard selected={plan==='full'} onClick={()=>selectPlan('full')}
              aria-label={`Pay in full — pay ${fmt(myBalance)} now`}>
              <p className="text-[14px] font-semibold text-hz-text">Pay in full</p>
              <p className="text-[12px] text-hz-muted mt-0.5">Pay {fmt(myBalance)} now and you're done</p>
            </RadioCard>
            {plan === 'full' && (
              <ConfirmBtn onClick={confirmPlan} label="Confirm: Pay in full"/>
            )}
            {plan === 'pot' && (
              <ConfirmBtn onClick={confirmPlan} label="Continue — set up Pay Over Time"/>
            )}
          </div>
        )}

        {/* ── Pay in full timing — reveals after plan confirmed ── */}
        {plan === 'full' && planOk && (
          <div ref={payWhenRef} className="space-y-2">
            <p className="text-[11px] font-bold uppercase tracking-widest text-hz-hint px-1 pt-1">When would you like to pay?</p>
            <RadioCard selected={payWhen==='now'} onClick={()=>setPayWhen('now')}
              aria-label="Pay now — complete your payment today">
              <p className="text-[14px] font-semibold text-hz-text">Pay now</p>
              <p className="text-[12px] text-hz-muted mt-0.5">Complete your {fmt(myBalance)} payment today</p>
            </RadioCard>
            <RadioCard selected={payWhen==='later'} onClick={()=>setPayWhen('later')}
              aria-label="Schedule for a later date">
              <p className="text-[14px] font-semibold text-hz-text">Schedule for a later date</p>
              <p className="text-[12px] text-hz-muted mt-0.5">Choose a date before May 1 to pay your full balance</p>
            </RadioCard>
            {payWhen === 'later' && (
              <div className="bg-hz-card border border-hz-accent/25 rounded-hz px-4 py-4 space-y-3">
                <label className="block text-[13px] font-semibold text-hz-text">Choose your payment date</label>
                <input type="date" value={payWhenDate} min="2026-04-07" max="2026-04-30"
                  onChange={e=>setPayWhenDate(e.target.value)}
                  className="w-full border border-[rgba(100,92,220,0.2)] rounded-hz-sm px-3 py-2.5 text-[14px] text-hz-text focus:outline-none focus:border-hz-accent"/>
                <p className="text-[11px] text-hz-muted">Must be on or before May 1, 2026 (the due date)</p>
              </div>
            )}
          </div>
        )}

        {/* ── Inline POT setup — reveals when pay over time confirmed ── */}
        {plan === 'pot' && planOk && (
          <div ref={potSetupRef} className="space-y-2 pl-1">
            <p className="text-[11px] font-bold uppercase tracking-widest text-hz-hint px-1 pt-1">Pay over time setup</p>

            {/* Step 1: Frequency */}
            {freqOk
              ? <SummaryStep label="How often" value={FREQ_LABEL[potFreq]} onEdit={editFreq}/>
              : (
                <div className="bg-hz-card border border-hz-accent/25 rounded-hz px-4 py-4 space-y-3">
                  <p className="text-[13px] font-semibold text-hz-text">How often would you like to make payments?</p>
                  <div className="space-y-2">
                    {FREQ_OPTIONS.map(o=>(
                      <button key={o.val} onClick={()=>setPotFreq(o.val)} aria-pressed={potFreq===o.val}
                        className={`w-full py-2.5 px-4 rounded-hz-sm border text-left text-[13px] font-medium transition-colors
                          ${potFreq===o.val ? 'bg-hz-indigo text-white border-hz-indigo' : 'text-hz-muted border-[rgba(100,92,220,0.2)] hover:border-hz-accent/40'}`}>
                        {o.label}
                      </button>
                    ))}
                  </div>
                  <ConfirmBtn onClick={()=>setFreqOk(true)} disabled={!potFreq} label="Confirm frequency"/>
                </div>
              )
            }

            {/* Step 2: First payment date */}
            {freqOk && (dateOk
              ? <SummaryStep
                  label="First payment"
                  value={new Date(potDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                  onEdit={editDate}/>
              : (
                <div ref={dateStepRef} className="bg-hz-card border border-hz-accent/25 rounded-hz px-4 py-4 space-y-3">
                  <div className="bg-hz-cloud rounded-hz-sm px-3 py-2.5 flex gap-2 items-start">
                    <span aria-hidden="true" className="text-hz-indigo flex-shrink-0">📅</span>
                    <p className="text-[11px] text-hz-muted leading-relaxed">
                      Your school requires your first payment to be <strong className="text-hz-text">within 30 days of today</strong> — by <strong className="text-hz-text">{maxDateFmt}</strong>.
                    </p>
                  </div>
                  <label className="block text-[13px] font-semibold text-hz-text">When is your first payment?</label>
                  <DatePicker id="pot-date" value={potDate} min={minDateStr} max={maxDateStr} onChange={v=>setPotDate(v)}/>
                  <div className="bg-hz-amber-bg/60 border border-hz-amber/30 rounded-hz-sm px-3 py-2 flex gap-2 items-start">
                    <span aria-hidden="true" className="text-hz-amber flex-shrink-0 text-sm">ℹ️</span>
                    <p className="text-[11px] text-hz-muted leading-relaxed">This date is for your first <strong className="text-hz-text">future installment</strong> — it does not include any setup fees or down payment paid today at sign-up.</p>
                  </div>
                  {potDate && potFreq && (
                    <div className="bg-hz-cloud rounded-hz-sm px-3 py-2.5 text-center">
                      <p className="text-[11px] text-hz-hint mb-0.5">Based on your school's plan end date of {new Date(POT_PLAN_END_DATE+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</p>
                      <p className="text-[14px] font-bold text-hz-indigo">{potInstalls} installments</p>
                      <p className="text-[11px] text-hz-hint">{FREQ_LABEL[potFreq].toLowerCase()} · last payment {lastPayDate}</p>
                    </div>
                  )}
                  <ConfirmBtn onClick={()=>setDateOk(true)} disabled={!potDate} label="Confirm date"/>
                </div>
              )
            )}

            {/* Installments view-only summary (auto-calculated) */}
            {freqOk && dateOk && (
              <div className="bg-hz-cloud border border-hz-accent/20 rounded-hz px-4 py-4">
                <p className="text-[10px] font-bold uppercase tracking-widest text-hz-hint mb-2">Your plan</p>
                <p className="text-[14px] font-semibold text-hz-text leading-relaxed">
                  Starting <span className="text-hz-indigo">{new Date(potDate+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</span>, you'll be charged <span className="text-hz-indigo">{FREQ_LABEL[potFreq].toLowerCase()}</span> — <span className="text-hz-indigo">{potInstalls} payments of {fmt(installAmt)}</span> each — until <span className="text-hz-indigo">{lastPayDate}</span>.
                </p>
              </div>
            )}

            {/* Step 3: Down payment slider */}
            {freqOk && dateOk && (downOk
              ? <SummaryStep
                  label="Down payment today"
                  value={`${fmt(potDown)} down · ${fmt(installAmt)} × ${potInstalls} installments after`}
                  onEdit={editDown}/>
              : (
                <div ref={downStepRef} className="bg-hz-card border border-hz-accent/25 rounded-hz px-4 py-4 space-y-4">
                  <p className="text-[13px] font-semibold text-hz-text">How much would you like to put down today?</p>

                  <RangeSlider
                    value={potDown} min={minDown} max={myBalance} step={25}
                    onChange={v=>setPotDown(v)}
                    topLabel="Down payment"
                    minHint={`${fmt(minDown)} · school min (5%)`}/>

                  {/* Live impact — installment amount */}
                  <div className="bg-hz-cloud rounded-hz-sm px-3 py-2.5 flex items-center justify-between">
                    <span className="text-[12px] text-hz-muted">{potInstalls} future installments of</span>
                    <span className="text-[15px] font-bold text-hz-text">{fmt(installAmt)}</span>
                  </div>

                  {/* Total due today breakdown */}
                  <div className="rounded-hz border border-[rgba(100,92,220,0.14)] overflow-hidden">
                    <p className="bg-hz-cloud px-4 py-2 text-[10px] font-bold uppercase tracking-widest text-hz-hint">Paid today</p>
                    <div className="divide-y divide-[rgba(100,92,220,0.07)]">
                      <div className="flex justify-between px-4 py-2.5 text-[12px]">
                        <span className="text-hz-muted">Down payment</span>
                        <span className="text-hz-text font-medium">{fmt(potDown)}</span>
                      </div>
                      <div className="flex justify-between px-4 py-2.5 text-[12px]">
                        <span className="text-hz-muted">Nelnet enrollment fee</span>
                        <span className="text-hz-text font-medium">{fmt(NELNET_FEE)}</span>
                      </div>
                      <div className="flex justify-between px-4 py-2.5 text-[12px]">
                        <span className="text-hz-muted">School enrollment fee</span>
                        <span className="text-hz-text font-medium">{fmt(SCHOOL_ENROLLMENT_FEE)}</span>
                      </div>
                      {S.insAccepted && S.insPremium > 0 && (
                        <div className="flex justify-between px-4 py-2.5 text-[12px]">
                          <span className="text-hz-muted">GradGuard insurance premium</span>
                          <span className="text-hz-text font-medium">{fmt(S.insPremium)}</span>
                        </div>
                      )}
                      <div className="flex justify-between px-4 py-3 text-[13px] font-bold bg-hz-cloud/50">
                        <span className="text-hz-text">Total due today</span>
                        <span className="text-hz-indigo">{fmt(totalToday)}</span>
                      </div>
                    </div>
                  </div>

                  <ConfirmBtn onClick={()=>setDownOk(true)} label="Confirm down payment"/>
                </div>
              )
            )}
          </div>
        )}

        {/* Continue + Decide Later */}
        {plan === 'full' && planOk && (payWhen === 'now' || (payWhen === 'later' && payWhenDate)) && (
          <Btn onClick={next}>Continue</Btn>
        )}
        {plan === 'pot' && potComplete && (
          <Btn onClick={next}>Review &amp; confirm plan</Btn>
        )}
        <DecideLaterBtn onClick={()=>setShowDL(true)}/>
      </div>

      {showDL && (
        <DecideLaterModal
          stepName="Payment Setup"
          onConfirm={()=>{ setS(p=>({...p, payDeferred:true})); nav('comms'); }}
          onCancel={()=>setShowDL(false)}/>
      )}

      {showAntInfo && (
        <div className="absolute inset-0 bg-black/50 z-50 flex items-end" role="dialog" aria-modal="true" aria-labelledby="ant-title">
          <div className="bg-hz-card w-full rounded-t-[20px] px-5 pt-5 pb-8 space-y-3">
            <div className="w-10 h-1 bg-[rgba(100,92,220,0.2)] rounded-full mx-auto"/>
            <p id="ant-title" className="text-[17px] font-bold text-hz-text">What does "Anticipated" mean?</p>
            <p className="text-[13px] text-hz-muted leading-relaxed">
              We've already subtracted this aid from your balance to give you the most accurate picture of what you owe. However, it hasn't officially been applied to your school account yet — it's still pending.
            </p>
            <div className="bg-hz-amber-bg border border-hz-amber/40 rounded-hz-sm px-3 py-2.5 flex gap-2 items-start">
              <span aria-hidden="true" className="flex-shrink-0 text-hz-amber">⚠️</span>
              <p className="text-[12px] text-hz-muted leading-relaxed">
                If this aid doesn't finalize — for example, if your enrollment status changes — you could still owe this amount.
              </p>
            </div>
            <button onClick={()=>setShowAntInfo(false)}
              className="w-full py-3 rounded-hz bg-hz-indigo text-white text-[14px] font-semibold hover:opacity-90 transition-opacity">
              Got it
            </button>
          </div>
        </div>
      )}
    </ScreenWrap>
  );
};

// ─── PotSetupScreen ───────────────────────────────────────────────────────
const PotSetupScreen = ({nav, goBack, S, setS}) => {
  const [step, setStep] = React.useState('A');
  const [freq, setFreq] = React.useState('');
  const [days, setDays] = React.useState([]);
  const [bwDate, setBwDate] = React.useState('');
  const [speed, setSpeed] = React.useState('');
  const [customAmt, setCustomAmt] = React.useState('');

  const maxPmts = freq==='monthly'?9:freq==='twice'?18:19;
  const minInstall = Math.ceil(POT_BALANCE / maxPmts * 100) / 100;
  const installAmt = speed==='spread' ? (POT_BALANCE/maxPmts) : (parseFloat(customAmt)||minInstall);
  const count = Math.ceil(POT_BALANCE / installAmt);
  const freqLabel = freq==='monthly'?'month':freq==='twice'?'half-month':'2 weeks';

  const MONTH_DAYS = Array.from({length:28},(_,i)=>i+1);
  const BW_DATES = ['Apr 4','Apr 18','May 2','May 16','May 30'];

  const toggleDay = (d) => {
    if (days.includes(d)) setDays(p=>p.filter(x=>x!==d));
    else if (days.length < 2) setDays(p=>[...p,d].sort((a,b)=>a-b));
  };

  const goToSpeed = () => {
    setS(p=>({...p, potFreq:freq, potDays:days, potBwDate:bwDate}));
    setStep('C');
  };

  const confirm = () => {
    setS(p=>({...p, potSpeed:speed, potInstall:installAmt, potCount:count, potFreqLabel:freqLabel, potMinInstall:minInstall}));
    nav('pot-confirm');
  };

  return (
    <ScreenWrap>
      <Header title="Pay Over Time Setup" onBack={step==='A'?goBack:()=>setStep(step==='C'?(freq==='biweekly'?'B2':'B1'):'A')}/>
      <div className="px-5 pb-8">
        {step === 'A' && (
          <>
            <p className="text-hz-muted text-[13px] mb-5">How often would you like to make payments?</p>
            {[{v:'monthly',l:'Monthly',d:'One payment per month, up to 9 payments'},
              {v:'twice',l:'Twice Monthly',d:'Two payments per month, up to 18 payments'},
              {v:'biweekly',l:'Every 2 Weeks',d:'Biweekly payments, up to 19 payments'}].map(o=>(
              <RadioCard key={o.v} selected={freq===o.v} onClick={()=>setFreq(o.v)} aria-label={o.l + ' — ' + o.d}>
                <p className="text-[14px] font-semibold text-hz-text">{o.l}</p>
                <p className="text-[12px] text-hz-muted mt-0.5">{o.d}</p>
              </RadioCard>
            ))}
            <Btn onClick={()=>setStep(freq==='biweekly'?'B2':'B1')} disabled={!freq}>Continue</Btn>
          </>
        )}
        {step === 'B1' && (
          <>
            <p className="text-hz-muted text-[13px] mb-2">
              {freq==='monthly' ? 'Which day of the month?' : 'Which two days of the month? (pick 2)'}
            </p>
            <div className="grid grid-cols-7 gap-1.5 mb-6" role="group" aria-label="Select payment day(s)">
              {MONTH_DAYS.map(d=>(
                <button key={d} onClick={()=>freq==='monthly'?(setDays([d])):(toggleDay(d))}
                  aria-pressed={days.includes(d)} aria-label={`Day ${d}`}
                  className={'w-full aspect-square rounded-hz-sm text-[13px] font-medium transition-all '+
                    (days.includes(d)?'bg-hz-indigo text-white':'bg-hz-cloud text-hz-text hover:bg-hz-cloud/70')+
                    (!days.includes(d) && days.length >= (freq==='monthly'?1:2) ? ' opacity-40' : '')}>
                  {d}
                </button>
              ))}
            </div>
            <Btn onClick={goToSpeed} disabled={freq==='monthly'?days.length<1:days.length<2}>Continue</Btn>
          </>
        )}
        {step === 'B2' && (
          <>
            <p className="text-hz-muted text-[13px] mb-4">Select your first payment date:</p>
            {BW_DATES.map(d=>(
              <RadioCard key={d} selected={bwDate===d} onClick={()=>setBwDate(d)} aria-label={`First payment on ${d}`}>
                <p className="text-[14px] text-hz-text">{d}</p>
              </RadioCard>
            ))}
            <Btn onClick={goToSpeed} disabled={!bwDate}>Continue</Btn>
          </>
        )}
        {step === 'C' && (
          <>
            <p className="text-hz-muted text-[13px] mb-4">Balance to finance: <strong className="text-hz-text">{fmt(POT_BALANCE)}</strong></p>
            <RadioCard selected={speed==='spread'} onClick={()=>setSpeed('spread')} aria-label={`Spread it out — ${maxPmts} payments of ${fmt(POT_BALANCE/maxPmts)}`}>
              <p className="text-[14px] font-semibold text-hz-text">Spread it out</p>
              <p className="text-[12px] text-hz-muted mt-0.5">{maxPmts} payments of {fmt(POT_BALANCE/maxPmts)} / {freqLabel}</p>
            </RadioCard>
            <RadioCard selected={speed==='fast'} onClick={()=>setSpeed('fast')} aria-label="Pay as quickly as possible with a custom installment amount">
              <p className="text-[14px] font-semibold text-hz-text">Pay as quickly as possible</p>
              <p className="text-[12px] text-hz-muted mt-0.5">Choose your installment amount (min {fmt(minInstall)})</p>
            </RadioCard>
            {speed === 'fast' && (
              <div className="mb-3">
                <Input label="Amount per payment" id="custom-installment" value={customAmt} onChange={setCustomAmt} placeholder={fmt(minInstall)}
                  hint={customAmt && parseFloat(customAmt)>=minInstall ? `${Math.ceil(POT_BALANCE/parseFloat(customAmt))} payments` : `Min ${fmt(minInstall)}`}/>
              </div>
            )}
            <Btn onClick={confirm} disabled={!speed||(speed==='fast'&&(!customAmt||parseFloat(customAmt)<minInstall))}>Continue</Btn>
          </>
        )}
      </div>
    </ScreenWrap>
  );
};

                            <button onClick={()=>setRefundSameAcct(false)} aria-pressed={!refundSameAcct}
                              className={'w-full py-2.5 px-4 rounded-hz-sm border text-left text-[13px] font-medium transition-colors '+(!refundSameAcct?'bg-hz-indigo text-white border-hz-indigo':'text-hz-muted border-[rgba(100,92,220,0.2)] hover:border-hz-accent/40')}>
                              A different account
                            </button>
                          </div>
                          {!refundSameAcct && (
                            <>
                              <Input label="Refund routing number" id="pot-ref-routing" value={refundRouting} onChange={setRefundRouting} placeholder="9 digits"/>
                              <Input label="Refund account number" id="pot-ref-acct" value={refundAcct2} onChange={setRefundAcct2} placeholder="Account number"/>
                            </>
                          )}

                    </>
                  )}
                  {method === 'card' && (
                    <>
                      <Input label="Card number" id="pot-card" value={acct} onChange={setAcct} placeholder="1234 5678 9012 3456"/>
                      {acct.length > 0 && (
                        <div className="bg-hz-amber-bg border border-hz-amber/30 rounded-hz-sm px-3 py-2 mt-1 mb-3">
                          <p className="text-[11px] text-hz-muted">Service fee: <span className="font-semibold text-hz-text">{fmt(Math.round(todayTotal * CARD_FEE_PCT) / 100)}</span> will be added ({CARD_FEE_PCT}% of {fmt(todayTotal)})</p>
                        </div>
                      )}
                    </>
                  )}
                </>
              )}
            </div>

            <Btn onClick={submit} disabled={!canSubmit} aria-label={`Pay ${fmt(todayTotal)} and complete enrollment`}>
              Pay {fmt(todayTotal)} &amp; Complete Enrollment
            </Btn>
          </>
        )}
      </div>
    </ScreenWrap>
  );
};

  const netBalance  = BALANCE_DUE;
  const paidFull    = S.payPlan === 'full';
  const potPaidDown = S.payPlan === 'pot' ? (S.potDown || POT_DOWN) : 0;
  const onPlan      = S.payPlan === 'pot' ? Math.max(0, netBalance - potPaidDown) : 0;
  const openBal     = paidFull ? 0 : Math.max(0, netBalance - potPaidDown - onPlan);

  // Coverage bar — two segments only: on-plan (green) + open (amber), as % of total balance
  const planPct = netBalance > 0 ? Math.round(onPlan / netBalance * 100) : 0;
  const openPct = netBalance > 0 ? Math.max(0, 100 - planPct) : 0;

  // To-do actions (derived from S state)
  const actions = [];
  if (openBal > 0 && !paidFull && S.payPlan !== 'later')
    actions.push({id:'open-bal', icon:'⚡', color:'blue',

                        {(ap.first?.[0]||'?').toUpperCase()}{(ap.last?.[0]||'').toUpperCase()}

                        className={`relative w-11 h-6 rounded-full transition-colors ${isActive?'bg-hz-teal':'bg-hz-cloud'}`}>

                      className="text-[11px] text-hz-accent font-medium hover:opacity-75 transition-opacity" aria-label={editContactIdx.phones[i]?`Done editing phone ${i+1}`:`Edit phone ${i+1}`}>
                      {editContactIdx.phones[i] ? 'Done' : 'Edit'}
                    </button>
                    {i > 0 && (
                      <button onClick={()=>removePhone(i)} aria-label={`Remove phone ${i+1}`}
                        className="text-hz-hint text-[11px] hover:text-hz-danger transition-colors ml-1">Remove</button>
                    )}
                  </div>
                </div>
              ))}
            </div>
            <button onClick={addPhone}
              className="mt-2 text-[12px] text-hz-accent font-medium flex items-center gap-1 hover:opacity-75 transition-opacity" aria-label="Add another phone number">
              <span aria-hidden="true" className="text-base leading-none">+</span> Add another phone
            </button>
          </div>
        </Card>

        {/* ── Text Message Opt-Ins (Legal) ── */}
        <Card>
          <p className="text-[11px] font-bold uppercase tracking-widest text-hz-hint mb-1">Text Message Opt-Ins</p>
          <p className="text-[12px] text-hz-muted mb-4 leading-relaxed">
            These preferences were set during your account setup. You can update your marketing opt-in at any time.
          </p>

          {/* Transactional — always on, locked */}
          <div className="flex items-start justify-between gap-4 py-3 border-b border-[rgba(100,92,220,0.08)]">
            <div className="flex-1">
              <p className="text-[13px] font-semibold text-hz-text">Transactional texts</p>
              <p className="text-[11px] text-hz-muted mt-0.5 leading-snug">Payment confirmations, due date reminders, balance alerts. Required for account activity.</p>
            </div>
            <div className="flex flex-col items-center gap-0.5 flex-shrink-0 pt-0.5">
              <div className="w-11 h-6 rounded-full bg-hz-teal flex items-center justify-end pr-0.5" aria-label="Transactional texts — always on">
                <div className="w-5 h-5 rounded-full bg-white shadow-sm"/>
              </div>
              <span className="text-[9px] font-bold text-hz-teal uppercase tracking-wide">Required</span>
            </div>
          </div>

          {/* Information & marketing — opt-in, seeded from step 6 */}
          <div className="flex items-start justify-between gap-4 py-3">
            <div className="flex-1">
              <p className="text-[13px] font-semibold text-hz-text">Information &amp; marketing texts</p>
              <p className="text-[11px] text-hz-muted mt-0.5 leading-snug">Financial aid tips, payment plan offers, scholarship alerts, savings opportunities.</p>
            </div>
            <Toggle on={smsMarketing} onChange={setSmsMarketing} aria-label="Toggle information and marketing texts"/>
          </div>

          {!smsMarketing && (
            <p className="text-[10px] text-hz-hint mt-1 leading-relaxed">
              You're opted out of marketing texts. You may miss financial aid reminders and savings opportunities.
            </p>
          )}
        </Card>

        {/* ── Security Questions ── */}
        <Card>
          <div className="flex items-center justify-between mb-3">
            <p className="text-[11px] font-bold uppercase tracking-widest text-hz-hint">Security Questions</p>
            <button onClick={()=>nav('security-questions')}
              className="text-hz-accent text-[12px] font-medium hover:opacity-75 transition-opacity" aria-label="Change security questions">
              Change
            </button>
          </div>
          <p className="text-[12px] text-hz-muted mb-3 leading-relaxed">
            Used to verify you as a caller when you contact support by phone.
          </p>
          {S.secQsDeferred ? (
            <div className="bg-hz-amber-bg border border-hz-amber/40 rounded-hz-sm px-3 py-2.5 flex items-start gap-2">
              <span aria-hidden="true" className="text-hz-amber flex-shrink-0">⏰</span>
              <div>
                <p className="text-[12px] font-semibold text-hz-text">Security questions not set up yet</p>
                <p className="text-[11px] text-hz-muted mt-0.5">You deferred this during setup. Tap "Change" to complete it now.</p>
              </div>
            </div>
          ) : (
            <div className="space-y-0 divide-y divide-[rgba(100,92,220,0.07)]">
              <div className="py-2.5">
                <p className="text-[11px] text-hz-hint mb-0.5">Question 1</p>
                <p className="text-[12px] font-medium text-hz-text">What was the name of your first pet?</p>
                <p className="text-[12px] text-hz-hint mt-0.5 font-mono tracking-widest">••••••••</p>
              </div>
              <div className="py-2.5">
                <p className="text-[11px] text-hz-hint mb-0.5">Question 2</p>
                <p className="text-[12px] font-medium text-hz-text">What street did you grow up on?</p>
                <p className="text-[12px] text-hz-hint mt-0.5 font-mono tracking-widest">••••••••</p>
              </div>
            </div>
          )}
        </Card>

        <Btn onClick={save} aria-label="Save account changes">
          {saved ? '✓ Saved' : 'Save changes'}
        </Btn>

      </div>
    </ScreenWrap>
  );
};


// ─── HistoryScreen ────────────────────────────────────────────────────────
const HistoryScreen = ({nav, goBack, S, setS}) => {
  const [tab, setTab] = React.useState('all');

  const allItems = [
    {type:'payment',  date:'Apr 14, 2025', desc:'Down payment + fee',        amt:'+'+fmt(POT_DOWN_TOTAL), color:'green', icon:'💳'},
    {type:'balance',  date:'Apr 12, 2025', desc:'Fall 2025 bill posted',     amt:'+'+fmt(TOTAL_CHARGES),  color:'amber', icon:'📋'},
    {type:'aid',      date:'Apr 10, 2025', desc:'Pell Grant applied',        amt:'−$1,100',               color:'green', icon:'🎓'},
    {type:'aid',      date:'Apr 10, 2025', desc:'Merit Scholarship applied', amt:'−$1,200',               color:'green', icon:'🏆'},
    {type:'comms',    date:'Apr 8,  2025', desc:'Welcome email sent',        amt:'',                      color:'blue',  icon:'✉️'},
    {type:'comms',    date:'Apr 8,  2025', desc:'Account created',           amt:'',                      color:'blue',  icon:'👤'},
  ];

  const filtered = tab==='all' ? allItems
    : tab==='payments' ? allItems.filter(i=>i.type==='payment')
    : tab==='balance'  ? allItems.filter(i=>i.type==='balance'||i.type==='aid')
    : allItems.filter(i=>i.type==='comms');

  const TABS = [{v:'all',l:'All'},{v:'payments',l:'Payments'},{v:'balance',l:'Balance'},{v:'comms',l:'Comms'}];

  return (
    <ScreenWrap>
      <Header title="Account History" onBack={goBack}/>
      <div className="px-5 pb-8">
        <div className="flex bg-hz-cloud rounded-hz p-1 mb-5" role="tablist">
          {TABS.map(t=>(
            <button key={t.v} onClick={()=>setTab(t.v)} role="tab" aria-selected={tab===t.v}
              className={'flex-1 py-1.5 rounded-hz-sm text-[12px] font-medium transition-all '+(tab===t.v?'bg-hz-indigo text-white':'text-hz-muted hover:text-hz-text')}>
              {t.l}
            </button>
          ))}
        </div>
        {filtered.length === 0 ? (
          <div className="text-center py-12 text-hz-hint text-[13px]">No items in this category</div>
        ) : (
          <div className="space-y-3" role="tabpanel">
            {filtered.map((item,i)=>(
              <Card key={i} className="flex items-center gap-3 p-3">
                <div className={`w-10 h-10 rounded-full flex items-center justify-center text-lg flex-shrink-0
                  ${item.color==='green'?'bg-hz-teal-bg':item.color==='amber'?'bg-hz-amber-bg':'bg-hz-cloud'}`}
                  aria-hidden="true">
                  {item.icon}
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-medium text-hz-text truncate">{item.desc}</p>
                  <p className="text-[11px] text-hz-hint">{item.date}</p>
                </div>
                {item.amt && (
                  <span className={`text-[13px] font-semibold flex-shrink-0 ${item.color==='green'?'text-hz-teal':item.color==='amber'?'text-hz-amber':'text-hz-text'}`}>
                    {item.amt}
                  </span>
                )}
              </Card>
            ))}
          </div>
        )}
      </div>
    </ScreenWrap>
  );
};
