<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3A – New AP · Email Invite · Single Payer</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

// ── Scenario: Jordan Kim invited parent Christine Kim as sole payer ──
const AP={name:"Christine Kim",role:"Mom"};
const STUDENT={name:"Jordan Kim",school:"Westfield College",term:"Fall 2025"};
const BALANCE=6200; // 100% — sole payer
const NELNET_FEE=29; // Nelnet fee only — no school CFI fee for this school
const SCHOOL_FEE=0;
const INSURANCE_PREM=143;
const DUE_DATE="September 15, 2025";

const Shell=({title,step,total,onBack,children})=>(
  <div className="min-h-screen bg-gray-50 flex flex-col">
    <div className="bg-white border-b px-4 py-3 flex items-center gap-3 sticky top-0 z-10 shadow-sm">
      {onBack&&<button onClick={onBack} className="text-gray-400 hover:text-gray-700 text-xl">←</button>}
      <div className="flex-1"><div className="text-sm font-bold text-gray-800">{title}</div>{step&&<div className="text-xs text-gray-400">Step {step} of {total}</div>}</div>
      <span className="text-blue-700 font-bold text-sm">Nelnet</span>
    </div>
    <div className="flex-1 px-4 py-5 max-w-md mx-auto w-full">{children}</div>
  </div>
);
const Btn=({onClick,children,variant="primary",className=""})=>{
  const s={primary:"bg-blue-600 text-white hover:bg-blue-700",secondary:"bg-white border-2 border-blue-600 text-blue-600 hover:bg-blue-50",ghost:"text-blue-600 underline bg-transparent text-center",warn:"bg-amber-500 text-white hover:bg-amber-600"};
  return <button onClick={onClick} className={`w-full py-3 px-4 rounded-xl font-semibold text-sm transition-all ${s[variant]} ${className}`}>{children}</button>;
};
const Card=({children,className=""})=><div className={`bg-white rounded-2xl shadow-sm border border-gray-100 p-5 ${className}`}>{children}</div>;
const Tag=({color,children})=>{const c={blue:"bg-blue-100 text-blue-700",green:"bg-green-100 text-green-700",amber:"bg-amber-100 text-amber-700"};return<span className={`text-xs font-bold px-2 py-0.5 rounded-full ${c[color]||"bg-gray-100 text-gray-500"}`}>{children}</span>;};
const Lbl=({children})=><div className="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2 mt-4">{children}</div>;
const InfoBox=({color="blue",children})=>{const c={blue:"bg-blue-50 border-blue-200 text-blue-800",amber:"bg-amber-50 border-amber-200 text-amber-800",green:"bg-green-50 border-green-200 text-green-800"};return<div className={`border rounded-xl p-3 text-sm ${c[color]}`}>{children}</div>;};
const CB=({sel,onClick,title,sub})=>(
  <button onClick={onClick} className={`w-full p-4 rounded-xl border-2 text-left transition-all ${sel?"border-blue-600 bg-blue-50":"border-gray-200 bg-white hover:border-blue-300"}`}>
    <div className="font-bold text-gray-900 text-sm">{title}</div>
    {sub&&<div className="text-xs text-gray-500 mt-0.5">{sub}</div>}
  </button>
);
const Toggle=({label,sub,val,set})=>(
  <div className="flex items-start gap-3">
    <button onClick={()=>set(!val)} className={`w-11 h-6 rounded-full transition-colors shrink-0 mt-0.5 ${val?'bg-blue-600':'bg-gray-300'}`}>
      <div className={`w-5 h-5 bg-white rounded-full shadow transition-transform mx-0.5 ${val?'translate-x-5':'translate-x-0'}`}/>
    </button>
    <div><div className="text-sm font-semibold text-gray-800">{label}</div>{sub&&<div className="text-xs text-gray-500 mt-0.5">{sub}</div>}</div>
  </div>
);

export default function App(){
  const[sc,setSc]=useState(0);
  const go=n=>{setSc(n);window.scrollTo(0,0);};
  const[pwd,setPwd]=useState('');
  const[ins,setIns]=useState(null);
  const[pay,setPay]=useState(null);
  const[pifWhen,setPifWhen]=useState('today');
  const[pifDate,setPifDate]=useState('');
  const[freq,setFreq]=useState(null);
  const[startD,setStartD]=useState(null);
  const[down,setDown]=useState(400);
  const[method,setMethod]=useState(null);
  const[nameSigned,setNameSigned]=useState(false);
  const[refundSame,setRefundSame]=useState(null);
  const[phone,setPhone]=useState('');
  const[prefs,setPrefs]=useState({changes:true,reminders:true,confirms:true,apActivity:true,autoOff:false});
  const hasIns=ins==='accept';
  const installments=freq==='monthly'?5:freq==='biweekly'?10:0;
  const instAmt=installments>0?((BALANCE-down)/installments).toFixed(2):0;
  const todayTotal=down+NELNET_FEE+(hasIns?INSURANCE_PREM:0);

  const S={
    0:()=>(
      <Shell title="You're Invited">
        <div className="text-center mb-5">
          <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-3">✉</div>
          <h1 className="text-xl font-bold">You've been invited!</h1>
          <p className="text-sm text-gray-500 mt-1">{STUDENT.name} · {STUDENT.school}</p>
        </div>
        <Card className="mb-4 border-blue-200 bg-blue-50">
          <div className="font-bold text-blue-900 mb-2">{STUDENT.name} has invited you to manage their student account</div>
          <div className="text-sm text-blue-800">As an <strong>Authorized Party</strong>, you'll be able to view their balance, make payments, and set up a payment plan for {STUDENT.term}.</div>
        </Card>
        <Card className="mb-4 space-y-2 text-sm">
          <div className="flex justify-between"><span className="text-gray-500">Student</span><span className="font-semibold">{STUDENT.name}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">School</span><span className="font-semibold">{STUDENT.school}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Term</span><span className="font-semibold">{STUDENT.term}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Balance</span><span className="font-bold text-gray-900">${BALANCE.toLocaleString()}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Your role</span><span><Tag color="blue">Sole Payer · 100%</Tag></span></div>
        </Card>
        <Btn onClick={()=>go(1)}>Accept Invitation →</Btn>
      </Shell>
    ),
    1:()=>(
      <Shell title="Create Your Account" step={1} total={11} onBack={()=>go(0)}>
        <h2 className="text-lg font-bold mb-1">Set up your Nelnet login</h2>
        <p className="text-sm text-gray-500 mb-4">You'll use these credentials each time you log in.</p>
        <Card className="space-y-3 mb-4">
          <div><label className="text-xs text-gray-400 uppercase font-bold">Full name</label><input defaultValue={AP.name} className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
          <div><label className="text-xs text-gray-400 uppercase font-bold">Email address</label><input type="email" placeholder="your@email.com" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
          <div><label className="text-xs text-gray-400 uppercase font-bold">Username</label><input placeholder="Choose a username" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
          <div>
            <label className="text-xs text-gray-400 uppercase font-bold">Password</label>
            <input type="password" placeholder="8+ characters" value={pwd} onChange={e=>setPwd(e.target.value)} className="w-full border rounded-lg p-2 mt-1 text-sm"/>
          </div>
          <div><label className="text-xs text-gray-400 uppercase font-bold">Confirm password</label><input type="password" placeholder="Repeat password" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
        </Card>
        <Btn disabled={pwd.length<8} onClick={()=>go(2)}>Create Account →</Btn>
      </Shell>
    ),
    2:()=>(
      <Shell title="Security Questions" step={2} total={11} onBack={()=>go(1)}>
        <h2 className="text-lg font-bold mb-1">Security questions</h2>
        <p className="text-sm text-gray-500 mb-4">These help verify your identity if you ever need to recover your account.</p>
        <Card className="space-y-4 mb-4">
          {[["Question 1","What was the name of your first pet?"],["Question 2","What city were you born in?"],["Question 3","What was your childhood nickname?"]].map(([q,placeholder])=>(
            <div key={q}>
              <label className="text-xs text-gray-400 uppercase font-bold">{q}</label>
              <select className="w-full border rounded-lg p-2 mt-1 text-sm mb-1">
                <option>{placeholder}</option>
                <option>What was the name of your first school?</option>
                <option>What is your mother's maiden name?</option>
              </select>
              <input placeholder="Your answer" className="w-full border rounded-lg p-2 text-sm"/>
            </div>
          ))}
        </Card>
        <Btn onClick={()=>go(3)}>Continue →</Btn>
      </Shell>
    ),
    3:()=>(
      <Shell title="Your Contact Info" step={3} total={11} onBack={()=>go(2)}>
        <h2 className="text-lg font-bold mb-1">Confirm your information</h2>
        <p className="text-sm text-gray-500 mb-4">We use this to send you account notifications and payment reminders.</p>
        <Card className="space-y-3 mb-3">
          <div><label className="text-xs text-gray-400 uppercase font-bold">Full name</label><input defaultValue={AP.name} className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
          <div><label className="text-xs text-gray-400 uppercase font-bold">Email address</label><input type="email" placeholder="your@email.com" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
          <div>
            <label className="text-xs text-gray-400 uppercase font-bold flex justify-between"><span>Phone number</span><span className="font-normal text-gray-400 normal-case">Optional but recommended</span></label>
            <input type="tel" placeholder="(555) 000-0000" value={phone} onChange={e=>setPhone(e.target.value)} className="w-full border rounded-lg p-2 mt-1 text-sm"/>
          </div>
          <div><label className="text-xs text-gray-400 uppercase font-bold">Mailing address</label><input placeholder="Street address, city, state, ZIP" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
        </Card>
        {!phone&&<InfoBox color="amber">📱 <strong>Phone highly recommended</strong> — you'll receive payment reminders via text. You can add it later too.</InfoBox>}
        <div className="mt-4"><Btn onClick={()=>go(4)}>Continue →</Btn></div>
      </Shell>
    ),
    4:()=>(
      <Shell title="School Agreements" step={4} total={11} onBack={()=>go(3)}>
        <h2 className="text-lg font-bold mb-1">Agreements from {STUDENT.school}</h2>
        <p className="text-sm text-gray-500 mb-4">Please review and agree to these documents from the school before continuing.</p>
        {[["Authorized Party Access Agreement","By proceeding, you acknowledge that you are an authorized party on this student account and agree to the terms of access."],["Financial Responsibility Agreement","You agree to be financially responsible for the portion of the student's balance assigned to you."]].map(([title,text])=>(
          <Card key={title} className="mb-3">
            <div className="font-semibold text-gray-800 mb-1">{title}</div>
            <div className="text-xs text-gray-500 mb-3">{text}</div>
            <div className="border border-dashed border-gray-300 rounded-lg p-3 text-xs text-gray-400 mb-3">[ Scroll to read full document ]</div>
            <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" className="rounded"/> I agree to the {title}</label>
          </Card>
        ))}
        <Btn onClick={()=>go(5)}>Continue →</Btn>
      </Shell>
    ),
    5:()=>(
      <Shell title="Tuition Insurance" step={5} total={11} onBack={()=>go(4)}>
        <h2 className="text-lg font-bold mb-1">Tuition Protection Insurance</h2>
        <p className="text-sm text-gray-500 mb-4">Protect the full balance if {STUDENT.name} must withdraw unexpectedly.</p>
        <Card className="mb-4 border-blue-200 bg-blue-50">
          <div className="font-bold text-blue-900 mb-1">GradGuard Tuition Protection</div>
          <div className="text-sm text-blue-800 mb-2">Covers up to 100% of tuition for covered withdrawals — illness, injury, mental health, military, and more. You're covering 100% of the balance.</div>
          <div className="flex justify-between items-center"><span className="text-xl font-bold text-blue-900">${INSURANCE_PREM}<span className="text-sm font-normal">/term</span></span><button className="text-xs text-blue-600 underline">View coverage →</button></div>
        </Card>
        <div className="space-y-2">
          <CB sel={ins==='accept'}  onClick={()=>{setIns('accept');go(6);}}  title="✓ Yes, protect this investment"  sub={`$${INSURANCE_PREM} added to today's total`}/>
          <CB sel={ins==='decline'} onClick={()=>{setIns('decline');go(6);}} title="✗ No, decline coverage"           sub="I understand I'm declining protection"/>
          <CB sel={ins==='later'}   onClick={()=>{setIns('later');go(6);}}   title="🕐 I'll decide later"             sub="A reminder will appear on your home screen"/>
        </div>
      </Shell>
    ),
    6:()=>(
      <Shell title="How to Pay" step={6} total={11} onBack={()=>go(5)}>
        <h2 className="text-lg font-bold mb-1">How would you like to pay?</h2>
        <p className="text-sm text-gray-500 mb-1">Full balance: <strong>${BALANCE.toLocaleString()}</strong> · {STUDENT.term}</p>
        <p className="text-xs text-gray-400 mb-4">You are the sole payer — you're responsible for 100%</p>
        <div className="space-y-3">
          <CB sel={pay==='pot'} onClick={()=>setPay('pot')} title="Pay Over Time" sub="Split into monthly or bi-weekly installments"/>
          <CB sel={pay==='pif'} onClick={()=>setPay('pif')} title="Pay in Full"   sub="Pay the full amount — today, or schedule for any date before the due date"/>
          <CB sel={pay==='later'} onClick={()=>{setPay('later');go(7);}} title="🕐 I'll decide later" sub="A reminder will appear on your home screen"/>
        </div>
        {pay==='pot'&&<>
          <Lbl>Payment Frequency</Lbl>
          <div className="space-y-2">
            <CB sel={freq==='monthly'}  onClick={()=>{setFreq('monthly');setStartD(null);}}  title="Monthly"   sub="5 installments"/>
            <CB sel={freq==='biweekly'} onClick={()=>{setFreq('biweekly');setStartD(null);}} title="Bi-Weekly" sub="10 installments"/>
          </div>
          {freq&&<>
            <Lbl>First Installment Date</Lbl>
            <div className="space-y-2">
              {[["Aug15","August 15, 2025"],["Sep1","September 1, 2025"],["Sep15","September 15, 2025"]].map(([v,l])=>(
                <CB key={v} sel={startD===v} onClick={()=>setStartD(v)} title={l}/>
              ))}
            </div>
          </>}
          {freq&&startD&&<>
            <Lbl>Plan Preview</Lbl>
            <Card className="bg-gray-50 text-sm mb-3 space-y-1.5">
              <div className="flex justify-between"><span className="text-gray-500">Full balance</span><span>${BALANCE.toLocaleString()}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">Installments</span><span>{installments} × ${Number(instAmt).toLocaleString('en-US',{minimumFractionDigits:2})}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">Nelnet fee</span><span>${NELNET_FEE}</span></div>
              {SCHOOL_FEE>0&&<div className="flex justify-between"><span className="text-gray-500">School enrollment fee</span><span>${SCHOOL_FEE}</span></div>}
              {hasIns&&<div className="flex justify-between text-blue-700"><span>GradGuard insurance</span><span>${INSURANCE_PREM}</span></div>}
            </Card>
            <Lbl>Down Payment</Lbl>
            <Card>
              <div className="flex justify-between items-center mb-2"><span className="text-sm text-gray-600">Down Payment</span><span className="font-bold text-xl">${down}</span></div>
              <input type="range" min={0} max={BALANCE} step={50} value={down} onChange={e=>setDown(Number(e.target.value))} className="w-full mb-3"/>
              <div className="bg-blue-50 rounded-xl p-3 space-y-1 text-sm">
                <div className="text-xs font-bold text-blue-800 mb-1">Due today</div>
                <div className="flex justify-between"><span className="text-gray-600">Down payment</span><span>${down}</span></div>
                <div className="flex justify-between"><span className="text-gray-600">Nelnet enrollment fee</span><span>${NELNET_FEE}</span></div>
                {SCHOOL_FEE>0&&<div className="flex justify-between"><span className="text-gray-600">School enrollment fee</span><span>${SCHOOL_FEE}</span></div>}
                {hasIns&&<div className="flex justify-between text-blue-700"><span>GradGuard premium</span><span>${INSURANCE_PREM}</span></div>}
                <div className="flex justify-between font-bold pt-1.5 border-t border-blue-200"><span>Total due today</span><span>${todayTotal}</span></div>
              </div>
              <div className="mt-3"><Btn onClick={()=>go(7)}>Confirm This Plan →</Btn></div>
            </Card>
          </>}
        </>}
        {pay==='pif'&&<>
          <Lbl>When would you like to pay?</Lbl>
          <div className="space-y-2">
            <CB sel={pifWhen==='today'}    onClick={()=>{setPifWhen('today');setPifDate('');}}   title="Pay today"                 sub="Full payment processed immediately"/>
            <CB sel={pifWhen==='schedule'} onClick={()=>setPifWhen('schedule')} title="Schedule for a future date" sub={`Choose any date on or before ${DUE_DATE}`}/>
          </div>
          {pifWhen==='schedule'&&<Card className="mt-3">
            <label className="text-sm font-semibold text-gray-700 block mb-2">Select payment date</label>
            <input type="date" max="2025-09-15" value={pifDate} onChange={e=>setPifDate(e.target.value)} className="w-full border rounded-lg p-2 text-sm"/>
            <p className="text-xs text-gray-400 mt-1">Must be on or before {DUE_DATE}</p>
          </Card>}
          {(pifWhen==='today'||pifDate)&&<div className="mt-4"><Btn onClick={()=>go(7)}>Continue →</Btn></div>}
        </>}
      </Shell>
    ),
    7:()=>(
      <Shell title="Payment Method" step={7} total={11} onBack={()=>go(6)}>
        <h2 className="text-lg font-bold mb-1">Select a payment method</h2>
        {pay==='pot'
          ?<p className="text-sm text-gray-500 mb-4">For payment plans, this school accepts bank account only. Credit cards are available for pay-in-full payments.</p>
          :<p className="text-sm text-gray-500 mb-4">For pay-in-full, this school accepts bank account or credit card.</p>}
        {pay==='later'&&<InfoBox color="amber">You chose to decide your payment plan later. You still need to save a payment method for when you're ready.</InfoBox>}
        <div className="space-y-3 mt-3">
          <CB sel={method==='ach'}  onClick={()=>setMethod('ach')}  title="🏦 Bank Account (ACH)"    sub="Free — no service fee"/>
          {pay!=='pot'&&<CB sel={method==='cc'} onClick={()=>setMethod('cc')} title="💳 Credit or Debit Card" sub="⚠ 2.85% service fee applies"/>}
        </div>
        {pay==='pot'&&method===null&&<div className="mt-2"><InfoBox color="blue">Payment plans require ACH bank account. Credit cards are not accepted for installment payments at this school.</InfoBox></div>}
        {method==='ach'&&<>
          <Lbl>Bank Account Details</Lbl>
          <Card className="space-y-3 mb-3">
            <div><label className="text-xs text-gray-400 uppercase font-bold">Account holder name</label><input defaultValue={AP.name} className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
            <div><label className="text-xs text-gray-400 uppercase font-bold">Routing number</label><input placeholder="9 digits" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
            <div><label className="text-xs text-gray-400 uppercase font-bold">Account number</label><input placeholder="Enter account number" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
            <div><label className="text-xs text-gray-400 uppercase font-bold">Account type</label><select className="w-full border rounded-lg p-2 mt-1 text-sm"><option>Checking</option><option>Savings</option></select></div>
          </Card>
          <InfoBox color="blue">The account holder name will be verified against your profile (<strong>{AP.name}</strong>).</InfoBox>
          <div className="mt-3 space-y-2">
            <Btn onClick={()=>go(8)}>Name matches — Save Account →</Btn>
            <Btn variant="secondary" onClick={()=>go('7n')}>Name is different</Btn>
          </div>
        </>}
        {method==='cc'&&<>
          <InfoBox color="amber">⚠ <strong>Service fee:</strong> A 2.85% non-refundable service fee will be added to your total.</InfoBox>
          <Lbl>Card Details</Lbl>
          <Card className="space-y-3 mb-3">
            <div><label className="text-xs text-gray-400 uppercase font-bold">Name on card</label><input defaultValue={AP.name} className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
            <div><label className="text-xs text-gray-400 uppercase font-bold">Card number</label><input placeholder="•••• •••• •••• ••••" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs text-gray-400 uppercase font-bold">Expires</label><input placeholder="MM/YY" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
              <div><label className="text-xs text-gray-400 uppercase font-bold">CVV</label><input placeholder="•••" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
            </div>
          </Card>
          <div className="space-y-2">
            <Btn onClick={()=>go(8)}>Name matches — Save Card →</Btn>
            <Btn variant="secondary" onClick={()=>go('7n')}>Name is different</Btn>
          </div>
        </>}
      </Shell>
    ),
    '7n':()=>(
      <Shell title="Account Authorization" step={7} total={11} onBack={()=>go(7)}>
        <h2 className="text-lg font-bold mb-2">Name doesn't match your profile</h2>
        <InfoBox color="amber">The name on this payment account doesn't match <strong>{AP.name}</strong> on your profile. To protect you and {STUDENT.school} from disputed payments:</InfoBox>
        <div className="mt-4 space-y-3">
          <Card className="border-blue-200">
            <div className="font-semibold text-blue-900 mb-1">✍ This is my own account</div>
            <div className="text-sm text-gray-600 mb-3">Sign to confirm you own this account and authorize Nelnet to charge it.</div>
            <div className="border-2 border-dashed border-gray-300 rounded-xl h-14 flex items-center justify-center mb-3 cursor-pointer hover:border-blue-400" onClick={()=>setNameSigned(true)}>
              <span className="text-gray-400 text-sm">{nameSigned?`✓ Signed — ${AP.name}`:"Tap to sign"}</span>
            </div>
            {nameSigned&&<Btn onClick={()=>go(8)}>Continue →</Btn>}
          </Card>
          <Card className="border-green-200">
            <div className="font-semibold text-green-900 mb-1">👥 Invite the account owner to pay</div>
            <div className="text-sm text-gray-600 mb-2">If this is someone else's account, they should pay directly as their own Authorized Party.</div>
            <Btn variant="secondary" onClick={()=>go(0)}>Go back</Btn>
          </Card>
        </div>
      </Shell>
    ),
    8:()=>(
      <Shell title="Refund Account" step={8} total={11} onBack={()=>go(7)}>
        <h2 className="text-lg font-bold mb-1">Set up your refund account</h2>
        <p className="text-sm text-gray-500 mb-4">If a refund is issued on this student account, where should it go? Required for all payers.</p>
        {method==='ach'&&refundSame===null&&(
          <Card className="border-green-200 bg-green-50 mb-4">
            <div className="font-semibold text-green-900 mb-1">Use same account for refunds?</div>
            <div className="text-sm text-gray-600 mb-3">We can send refunds to the same bank account you just set up for payments.</div>
            <div className="space-y-2">
              <CB sel={false} onClick={()=>{setRefundSame(true);go(9);}} title="Yes, use my payment account"/>
              <CB sel={false} onClick={()=>setRefundSame(false)} title="No, use a different account"/>
            </div>
          </Card>
        )}
        {(method!=='ach'||refundSame===false)&&<>
          <Card className="space-y-3 mb-4">
            <div className="text-xs text-gray-400 uppercase font-bold">Refund Bank Account</div>
            <div><label className="text-xs text-gray-400 uppercase">Account holder name</label><input defaultValue={AP.name} className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
            <div><label className="text-xs text-gray-400 uppercase">Routing number</label><input placeholder="9 digits" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
            <div><label className="text-xs text-gray-400 uppercase">Account number</label><input placeholder="Enter account number" className="w-full border rounded-lg p-2 mt-1 text-sm"/></div>
            <div><label className="text-xs text-gray-400 uppercase">Account type</label><select className="w-full border rounded-lg p-2 mt-1 text-sm"><option>Checking</option><option>Savings</option></select></div>
          </Card>
          <Btn onClick={()=>go(9)}>Save Refund Account →</Btn>
        </>}
      </Shell>
    ),
    9:()=>(
      <Shell title="Notification Preferences" step={9} total={11} onBack={()=>go(8)}>
        <h2 className="text-lg font-bold mb-1">Stay in the loop</h2>
        <p className="text-sm text-gray-500 mb-3">We've set smart defaults based on your role as a payer. Adjust as needed.</p>
        {!phone&&<div className="mb-3"><InfoBox color="amber">📱 <strong>Add a phone number</strong> to enable text alerts for payment reminders.</InfoBox></div>}
        <Lbl>Your Notification Preferences</Lbl>
        <Card className="space-y-4 mb-4">
          <Toggle label="Account changes & balance updates" sub="Notify me when the balance changes or charges are added." val={prefs.changes} set={v=>setPrefs(p=>({...p,changes:v}))}/>
          <Toggle label="Payment reminders" sub="Remind me before each scheduled payment date." val={prefs.reminders} set={v=>setPrefs(p=>({...p,reminders:v}))}/>
          <Toggle label="Payment confirmations" sub="Send a confirmation after each payment processes." val={prefs.confirms} set={v=>setPrefs(p=>({...p,confirms:v}))}/>
          <Toggle label="Skip reminders for auto payments" sub="I don't need reminders for auto-drafted installments." val={prefs.autoOff} set={v=>setPrefs(p=>({...p,autoOff:v}))}/>
        </Card>
        <Btn onClick={()=>go(10)}>Save Preferences →</Btn>
      </Shell>
    ),
    10:()=>(
      <Shell title="Nelnet Agreement" step={10} total={11} onBack={()=>go(9)}>
        <h2 className="text-lg font-bold mb-1">Nelnet Agreement</h2>
        <p className="text-sm text-gray-500 mb-4">One final document before we're done.</p>
        <Card className="mb-3">
          <div className="font-semibold text-gray-800 mb-1">Nelnet Authorized Party &amp; Payment Agreement</div>
          <div className="text-xs text-gray-500 mb-3">By completing setup, you authorize Nelnet to process payments per the plan you configured on behalf of {STUDENT.name}'s student account.</div>
          <div className="border border-dashed border-gray-300 rounded-lg p-3 text-xs text-gray-400 mb-3">[ Scroll to read full document ]</div>
          <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" className="rounded"/> I have read and agree to the Nelnet Agreement</label>
        </Card>
        {pay!=='later'&&<Card className="mb-3">
          <div className="font-semibold text-gray-800 mb-1">Auto-Pay Authorization</div>
          <div className="text-xs text-gray-500 mb-3">You authorize Nelnet to automatically charge your {method==='ach'?'bank account':'card'} on each scheduled installment date until the plan is complete or cancelled.</div>
          <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" className="rounded"/> I authorize recurring payments</label>
        </Card>}
        <Btn onClick={()=>go(11)}>Sign &amp; Finish →</Btn>
      </Shell>
    ),
    11:()=>(
      <Shell title="All Set!">
        <div className="text-center mb-5">
          <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-3">✓</div>
          <h1 className="text-2xl font-bold">You're all set!</h1>
          <p className="text-sm text-gray-500 mt-1">{STUDENT.name} · {STUDENT.school}</p>
        </div>
        <Card className="mb-4 space-y-2 text-sm">
          <div className="font-bold text-gray-700 mb-1">Your setup summary</div>
          <div className="flex justify-between"><span className="text-gray-500">Your responsibility</span><span className="font-bold">100% · ${BALANCE.toLocaleString()}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Payment plan</span><span>{pay==='pif'?'Pay in Full':pay==='later'?'Decide later':freq==='monthly'?'Monthly POT':'Bi-Weekly POT'}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Insurance</span><span className={ins==='accept'?"text-blue-700":""}>{ins==='accept'?'GradGuard accepted':ins==='decline'?'Declined':'Decide later'}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Payment method</span><span>{method==='ach'?'Bank account (ACH)':'Credit card'}</span></div>
        </Card>
        <InfoBox color="blue">We've sent {STUDENT.name} a confirmation that you've completed setup.</InfoBox>
        <div className="mt-4"><Btn onClick={()=>go(12)}>View My Account →</Btn></div>
      </Shell>
    ),
    12:()=>(
      <Shell title={STUDENT.school}>
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm">CK</div>
          <div><div className="font-bold text-gray-900">{AP.name}</div><div className="text-xs text-gray-500">Authorized Party for {STUDENT.name}</div></div>
        </div>
        <Card className="mb-4 bg-gradient-to-br from-blue-700 to-blue-500 text-white">
          <div className="text-xs font-bold uppercase tracking-widest opacity-70 mb-1">Balance — {STUDENT.term}</div>
          <div className="text-3xl font-bold mb-1">${BALANCE.toLocaleString()}</div>
          <div className="text-xs opacity-80">{STUDENT.name} · {STUDENT.school}</div>
          <div className="mt-2 pt-2 border-t border-white/20 text-xs opacity-70">
            {pay==='pif'?'Pay in Full':pay==='later'?'Payment plan: decide later':freq==='monthly'?'Monthly POT':'Bi-Weekly POT'}
          </div>
        </Card>
        {(ins==='later'||pay==='later')&&<div className="mb-3 space-y-2">
          {ins==='later'&&<InfoBox color="amber">🕐 <strong>To-do:</strong> Decide on tuition insurance.</InfoBox>}
          {pay==='later'&&<InfoBox color="amber">🕐 <strong>To-do:</strong> Set up your payment plan.</InfoBox>}
        </div>}
        <Lbl>Quick Actions</Lbl>
        <div className="grid grid-cols-2 gap-3 mb-6">
          {["View schedule","Make a payment","Account details","Settings"].map(a=>(
            <Card key={a} className="text-center py-3 cursor-pointer hover:border-blue-300 transition-colors"><div className="text-sm font-semibold text-gray-700">{a}</div></Card>
          ))}
        </div>
        <div className="text-center">
          <a href="index.html" target="_top" onClick={e=>{e.preventDefault();try{window.top.location.href='index.html';}catch(_){window.location.href='index.html';}}} className="text-xs text-gray-400 hover:text-blue-600 underline">⌂ Back to prototype index</a>
        </div>
      </Shell>
    ),
  };
  const Screen=S[sc];
  return Screen?<Screen/>:null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
