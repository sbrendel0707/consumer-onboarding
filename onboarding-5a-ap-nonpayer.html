<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5A – Returning Student · Non-Payer</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

// ── Scenario: Taylor Reed — returning student, was non-payer last term, parents paid. New term charges ready ──
const STUDENT={name:"Taylor Reed",email:"t.reed@greenhill.edu",phone:"(555) 441-2209",address:"332 Oak Lane, Portland OR 97201"};
const SCHOOL="Greenhill University";
const NEW_TERM="Spring 2025",LAST_TERM="Fall 2024";
const NEW_BAL=4800;
const DUE_DATE="March 1, 2025";
// Last term payer
const LAST_PAYER={name:"Linda Reed",role:"Mom",email:"linda.reed@email.com"};

const Shell=({title,step,total,onBack,children})=>(
  <div className="min-h-screen bg-gray-50 flex flex-col">
    <div className="bg-white border-b px-4 py-3 flex items-center gap-3 sticky top-0 z-10 shadow-sm">
      {onBack&&<button onClick={onBack} className="text-gray-400 hover:text-gray-700 text-xl">←</button>}
      <div className="flex-1"><div className="text-sm font-bold text-gray-800">{title}</div>{step&&<div className="text-xs text-gray-400">Step {step} of {total}</div>}</div>
      <span className="text-blue-700 font-bold text-sm">Nelnet</span>
    </div>
    <div className="flex-1 px-4 py-5 max-w-md mx-auto w-full">{children}</div>
  </div>
);
const Btn=({onClick,children,variant="primary",className=""})=>{
  const s={primary:"bg-blue-600 text-white hover:bg-blue-700",secondary:"bg-white border-2 border-blue-600 text-blue-600 hover:bg-blue-50",ghost:"text-blue-600 underline bg-transparent text-center",danger:"bg-red-600 text-white hover:bg-red-700"};
  return <button onClick={onClick} className={`w-full py-3 px-4 rounded-xl font-semibold text-sm transition-all ${s[variant]} ${className}`}>{children}</button>;
};
const Card=({children,className=""})=><div className={`bg-white rounded-2xl shadow-sm border border-gray-100 p-5 ${className}`}>{children}</div>;
const Tag=({color,children})=>{const c={blue:"bg-blue-100 text-blue-700",green:"bg-green-100 text-green-700",amber:"bg-amber-100 text-amber-700",gray:"bg-gray-100 text-gray-500"};return<span className={`text-xs font-bold px-2 py-0.5 rounded-full ${c[color]||c.gray}`}>{children}</span>;};
const Lbl=({children})=><div className="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2 mt-4">{children}</div>;
const InfoBox=({color="blue",children})=>{const c={blue:"bg-blue-50 border-blue-200 text-blue-800",amber:"bg-amber-50 border-amber-200 text-amber-800",green:"bg-green-50 border-green-200 text-green-800"};return<div className={`border rounded-xl p-3 text-sm ${c[color]}`}>{children}</div>;};
const CB=({sel,onClick,title,sub})=>(
  <button onClick={onClick} className={`w-full p-4 rounded-xl border-2 text-left transition-all ${sel?"border-blue-600 bg-blue-50":"border-gray-200 bg-white hover:border-blue-300"}`}>
    <div className="font-bold text-gray-900 text-sm">{title}</div>
    {sub&&<div className="text-xs text-gray-500 mt-0.5">{sub}</div>}
  </button>
);
const Toggle=({label,sub,val,set})=>(
  <div className="flex items-start gap-3">
    <button onClick={()=>set(!val)} className={`w-11 h-6 rounded-full transition-colors shrink-0 mt-0.5 ${val?'bg-blue-600':'bg-gray-300'}`}>
      <div className={`w-5 h-5 bg-white rounded-full shadow transition-transform mx-0.5 ${val?'translate-x-5':'translate-x-0'}`}/>
    </button>
    <div><div className="text-sm font-semibold text-gray-800">{label}</div>{sub&&<div className="text-xs text-gray-500 mt-0.5">{sub}</div>}</div>
  </div>
);

export default function App(){
  const[sc,setSc]=useState(0);
  const go=n=>{setSc(n);window.scrollTo(0,0);};
  const[payerChoice,setPayerChoice]=useState(null); // 'same'|'new'|'self'
  const[newPayerEmail,setNewPayerEmail]=useState('');
  const[prefs,setPrefs]=useState({apMissed:true,paidOff:true,allActivity:false,allBilling:false});

  const S={
    // 0 ─ Welcome back
    0:()=>(
      <Shell title="Welcome Back">
        <div className="text-center mb-5">
          <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white text-xl font-bold mx-auto mb-3">TR</div>
          <h1 className="text-xl font-bold">Welcome back, Taylor!</h1>
          <p className="text-sm text-gray-500 mt-1">{SCHOOL}</p>
        </div>
        <InfoBox color="blue">🎓 <strong>{NEW_TERM} charges are ready.</strong> {LAST_TERM} is fully paid — nothing left to do from last term!</InfoBox>
        <Card className="mt-4">
          <div className="flex justify-between items-center mb-2"><span className="text-sm text-gray-500">{LAST_TERM}</span><Tag color="green">✓ Paid in full</Tag></div>
          <div className="flex justify-between items-center"><span className="text-sm text-gray-500">{NEW_TERM}</span><Tag color="amber">Action needed</Tag></div>
        </Card>
        <Card className="mt-3">
          <div className="text-xs text-gray-400 uppercase tracking-wide mb-1">New Balance — {NEW_TERM}</div>
          <div className="text-3xl font-bold">${NEW_BAL.toLocaleString()}</div>
          <div className="text-xs text-gray-500 mt-1">Due {DUE_DATE}</div>
        </Card>
        <Card className="mt-3 border-gray-200">
          <div className="text-xs text-gray-400 uppercase tracking-wide mb-2">Your account setup</div>
          <div className="flex items-center gap-2 text-sm text-gray-600">
            <span className="text-lg">👁</span>
            <span>You're set up as a <strong>view-only student</strong>. Your Authorized Party manages payments.</span>
          </div>
        </Card>
        <div className="mt-4"><Btn onClick={()=>go(1)}>Set Up {NEW_TERM} →</Btn></div>
      </Shell>
    ),

    // 1 ─ Confirm same payer
    1:()=>(
      <Shell title="Who's Paying?" step={1} total={4} onBack={()=>go(0)}>
        <h2 className="text-lg font-bold mb-1">Should the same person pay this term?</h2>
        <p className="text-sm text-gray-500 mb-4">Last term, <strong>{LAST_PAYER.name}</strong> ({LAST_PAYER.role}) paid your balance. What should happen this term?</p>
        <Card className="mb-4 border-blue-200 bg-blue-50">
          <div className="text-xs text-gray-400 uppercase tracking-wide mb-2">Last term's payer</div>
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm">LR</div>
            <div>
              <div className="font-bold text-blue-900">{LAST_PAYER.name}</div>
              <div className="text-xs text-blue-700">{LAST_PAYER.role} · {LAST_PAYER.email}</div>
            </div>
          </div>
          <Tag color="green" className="mt-2">✓ {LAST_TERM} fully paid</Tag>
        </Card>
        <div className="space-y-3">
          <CB sel={payerChoice==='same'} onClick={()=>setPayerChoice('same')} title={`Yes, ${LAST_PAYER.name} should pay again`} sub={`We'll send ${LAST_PAYER.name} an invitation to set up ${NEW_TERM}`}/>
          <CB sel={payerChoice==='new'}  onClick={()=>setPayerChoice('new')}  title="Invite a different person"              sub="Send invitation to a new email address"/>
          <CB sel={payerChoice==='self'} onClick={()=>setPayerChoice('self')} title="I'll pay myself this term"              sub="Switch from view-only to payer for this term"/>
        </div>
        {payerChoice==='new'&&<Card className="mt-3">
          <label className="text-sm font-semibold text-gray-700 block mb-2">New payer's email address</label>
          <input type="email" placeholder="payer@email.com" value={newPayerEmail} onChange={e=>setNewPayerEmail(e.target.value)} className="w-full border rounded-lg p-2 text-sm"/>
        </Card>}
        {payerChoice==='same'&&<div className="mt-4"><Btn onClick={()=>go(2)}>Send Invitation to {LAST_PAYER.name} →</Btn></div>}
        {payerChoice==='new'&&newPayerEmail&&<div className="mt-4"><Btn onClick={()=>go(2)}>Send Invitation →</Btn></div>}
        {payerChoice==='self'&&<div className="mt-4"><InfoBox color="amber">Switching to payer means you'll go through payment setup steps. <Btn variant="secondary" className="mt-2" onClick={()=>go(0)}>Continue as view-only</Btn></InfoBox><div className="mt-2"><Btn onClick={()=>go(2)}>Yes, I'll pay myself →</Btn></div></div>}
      </Shell>
    ),

    // 2 ─ Confirm personal info
    2:()=>(
      <Shell title="Confirm Your Info" step={2} total={4} onBack={()=>go(1)}>
        <h2 className="text-lg font-bold mb-1">Is your information still accurate?</h2>
        <p className="text-sm text-gray-500 mb-4">We use this to contact you about your account status.</p>
        <Card className="mb-3 space-y-3">
          {[["Full Name",STUDENT.name],["Email",STUDENT.email],["Phone",STUDENT.phone],["Address",STUDENT.address]].map(([l,v])=>(
            <div key={l} className="flex justify-between items-start">
              <div><div className="text-xs text-gray-400 uppercase tracking-wide">{l}</div><div className="text-sm font-semibold text-gray-800">{v}</div></div>
              <button className="text-xs text-blue-600 underline shrink-0 ml-4">Edit</button>
            </div>
          ))}
        </Card>
        <InfoBox color="blue">📱 <strong>Phone helps</strong> — if your AP misses a payment we can alert you quickly.</InfoBox>
        <div className="mt-4 space-y-2">
          <Btn onClick={()=>go(3)}>Everything looks correct</Btn>
          <Btn variant="ghost" onClick={()=>go(3)}>I've updated my info — continue</Btn>
        </div>
      </Shell>
    ),

    // 3 ─ Communications (non-payer defaults)
    3:()=>(
      <Shell title="Notification Preferences" step={3} total={4} onBack={()=>go(2)}>
        <h2 className="text-lg font-bold mb-1">Stay informed about your account</h2>
        <p className="text-sm text-gray-500 mb-3">Since you're not the payer, we've set a focused set of defaults. You can expand them.</p>
        <InfoBox color="blue">As a view-only student, we only notify you about things that require your attention or affect your standing.</InfoBox>
        <Lbl>Your Default Preferences</Lbl>
        <Card className="space-y-4 mb-4">
          <Toggle
            label="When my AP misses an expected payment"
            sub="Be notified if your Authorized Party has not made a scheduled payment."
            val={prefs.apMissed}
            set={v=>setPrefs(p=>({...p,apMissed:v}))}
          />
          <Toggle
            label="When my account is fully paid off"
            sub="Get a confirmation when your full balance reaches zero."
            val={prefs.paidOff}
            set={v=>setPrefs(p=>({...p,paidOff:v}))}
          />
        </Card>
        <Lbl>Optional — Expand Your Notifications</Lbl>
        <Card className="space-y-4 mb-4">
          <Toggle
            label="All AP activity"
            sub="Every payment, schedule change, or plan update made by your AP."
            val={prefs.allActivity}
            set={v=>setPrefs(p=>({...p,allActivity:v}))}
          />
          <Toggle
            label="All billing notifications"
            sub="New charges, balance changes, refunds, and payment confirmations."
            val={prefs.allBilling}
            set={v=>setPrefs(p=>({...p,allBilling:v}))}
          />
        </Card>
        <Btn onClick={()=>go(4)}>Save Preferences →</Btn>
      </Shell>
    ),

    // 4 ─ Home (view-only)
    4:()=>(
      <Shell title={SCHOOL}>
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm">TR</div>
          <div><div className="font-bold text-gray-900">{STUDENT.name}</div><div className="text-xs text-gray-500">{NEW_TERM} · View-only student</div></div>
        </div>
        <div className="mb-3"><InfoBox color="gray">👁 <strong>View-only access</strong> — your Authorized Party manages payments on your behalf.</InfoBox></div>

        {payerChoice==='same'&&<div className="mb-3"><InfoBox color="amber">📨 <strong>Invitation sent to {LAST_PAYER.name}.</strong> They'll receive an email to set up {NEW_TERM}. You'll be notified once they complete setup.</InfoBox></div>}
        {payerChoice==='new'&&<div className="mb-3"><InfoBox color="amber">📨 <strong>Invitation sent to {newPayerEmail}.</strong> They'll receive an email to set up {NEW_TERM}.</InfoBox></div>}

        <Card className="mb-4">
          <div className="text-xs text-gray-400 uppercase tracking-wide mb-1">Balance — {NEW_TERM}</div>
          <div className="text-3xl font-bold">${NEW_BAL.toLocaleString()}</div>
          <div className="text-xs text-gray-500 mt-1">Due {DUE_DATE}</div>
          <div className="mt-3 pt-3 border-t border-gray-100">
            <div className="flex justify-between items-center">
              <div>
                <div className="text-sm font-semibold text-gray-700">{payerChoice==='same'?LAST_PAYER.name:payerChoice==='new'?newPayerEmail:'You'}</div>
                <div className="text-xs text-gray-400">Authorized Party · Payer</div>
              </div>
              <Tag color={payerChoice?'amber':'gray'}>{payerChoice?'Setup pending':'No payer'}</Tag>
            </div>
          </div>
        </Card>

        <Lbl>Last Term</Lbl>
        <Card className="mb-4">
          <div className="flex justify-between items-center mb-2">
            <div><div className="text-sm font-semibold text-gray-700">{LAST_TERM}</div><div className="text-xs text-gray-400">{LAST_PAYER.name} paid</div></div>
            <Tag color="green">✓ Paid in full</Tag>
          </div>
          <div className="text-sm text-gray-500">No remaining balance from last term.</div>
        </Card>

        <Lbl>Account Activity</Lbl>
        <Card className="mb-4 space-y-3">
          {[["Aug 28","Fall 2024 payment plan completed","green"],["Sep 1","Final installment drafted","green"],["Today",NEW_TERM+" charges posted","amber"]].map(([date,desc,color])=>(
            <div key={date} className="flex items-start gap-3">
              <div className={`w-2 h-2 rounded-full mt-2 shrink-0 ${color==='green'?'bg-green-500':color==='amber'?'bg-amber-500':'bg-gray-300'}`}/>
              <div><div className="text-sm font-semibold text-gray-800">{desc}</div><div className="text-xs text-gray-400">{date}</div></div>
            </div>
          ))}
        </Card>

        <div className="text-center mt-2">
          <a href="index.html" target="_top" onClick={e=>{e.preventDefault();try{window.top.location.href='index.html';}catch(_){window.location.href='index.html';}}} className="text-xs text-gray-400 hover:text-blue-600 underline">⌂ Back to prototype index</a>
        </div>
      </Shell>
    ),
  };
  const Screen=S[sc];
  return Screen?<Screen/>:null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
