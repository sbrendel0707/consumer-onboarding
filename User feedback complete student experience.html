<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Student Onboarding – React Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<body class="bg-gray-900">
<div id="root"></div>
<script type="text/babel">

// ─── Financial constants ───────────────────────────────────────────────────
const TOTAL_CHARGES  = 8500;
const APPLIED_AID    = 2300;   // merit $1,200 + Pell $1,100
const ANTICIPATED_AID= 1000;   // fed subsidized loan
const BALANCE_DUE    = 5200;
const POT_DOWN       = 520;    // 10% of $5,200
const NELNET_FEE     = 25;
const POT_DOWN_TOTAL = 545;
const POT_BALANCE    = 4655;   // $5,200 − $545
const TAKEN_USERNAMES= ['ajohnson2024','bmurphy','csmith2023','djones','ejackson'];

const fmt  = (n) => '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK = (n) => '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits:0});

// ─── Shared UI helpers ────────────────────────────────────────────────────
const Btn = ({children, onClick, className='', disabled=false, variant='primary'}) => {
  const base = 'w-full py-3.5 rounded-2xl font-semibold text-[15px] transition-all active:scale-[0.97] ';
  const v = {
    primary:  'bg-blue text-white hover:bg-blue-light',
    ghost:    'bg-white/10 text-white hover:bg-white/20',
    outline:  'border border-white/30 text-white hover:bg-white/10',
    danger:   'bg-red/90 text-white hover:bg-red',
    success:  'bg-green text-navy font-bold',
  };
  return (
    <button onClick={onClick} disabled={disabled}
      className={base + (v[variant]||v.primary) + ' ' + className + (disabled?' opacity-40 cursor-not-allowed':'')}>
      {children}
    </button>
  );
};

const Input = ({label, value, onChange, type='text', placeholder='', error='', hint='', className=''}) => (
  <div className={'mb-4 '+className}>
    {label && <label className="block text-xs font-medium text-white/60 mb-1">{label}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      className={'w-full bg-white/10 border rounded-xl px-4 py-3 text-white placeholder-white/30 text-[15px] outline-none focus:border-blue-light transition-colors '+(error?'border-red':'border-white/20')} />
    {error && <p className="text-red text-xs mt-1">{error}</p>}
    {hint  && <p className="text-white/40 text-xs mt-1">{hint}</p>}
  </div>
);

const Select = ({label, value, onChange, options, className=''}) => (
  <div className={'mb-4 '+className}>
    {label && <label className="block text-xs font-medium text-white/60 mb-1">{label}</label>}
    <select value={value} onChange={e=>onChange(e.target.value)}
      className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white text-[15px] outline-none focus:border-blue-light appearance-none">
      {options.map(o => <option key={o.value||o} value={o.value||o} className="bg-navy2">{o.label||o}</option>)}
    </select>
  </div>
);

const Card = ({children, className=''}) => (
  <div className={'bg-white/8 border border-white/10 rounded-2xl p-4 '+className}>{children}</div>
);

const Divider = () => <div className="border-t border-white/10 my-3"/>;

const Row = ({label, value, sub, bold=false}) => (
  <div className="flex justify-between items-start py-1.5">
    <span className={'text-[13px] '+(bold?'text-white font-semibold':'text-white/70')}>{label}</span>
    <div className="text-right">
      <span className={'text-[13px] '+(bold?'text-white font-semibold':'text-white')}>{value}</span>
      {sub && <p className="text-white/40 text-[11px]">{sub}</p>}
    </div>
  </div>
);

const Badge = ({children, color='blue'}) => {
  const c = {blue:'bg-blue/20 text-blue-light', green:'bg-green/20 text-green', amber:'bg-amber/20 text-amber', red:'bg-red/20 text-red', purple:'bg-purple/20 text-purple'};
  return <span className={'inline-block px-2 py-0.5 rounded-full text-[11px] font-semibold '+(c[color]||c.blue)}>{children}</span>;
};

const Toggle = ({on, onChange}) => (
  <button onClick={()=>onChange(!on)}
    className={'relative w-12 h-7 rounded-full transition-colors '+(on?'bg-blue':'bg-white/20')}>
    <span className={'absolute top-1 w-5 h-5 bg-white rounded-full shadow transition-all '+(on?'left-6':'left-1')}/>
  </button>
);

const RadioCard = ({selected, onClick, children, className=''}) => (
  <button onClick={onClick}
    className={'w-full text-left p-4 rounded-2xl border transition-all mb-3 '+(selected?'border-blue bg-blue/10':'border-white/15 bg-white/5 hover:border-white/30')+' '+className}>
    <div className="flex items-start gap-3">
      <div className={'mt-0.5 w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 '+(selected?'border-blue':'border-white/40')}>
        {selected && <div className="w-2.5 h-2.5 rounded-full bg-blue"/>}
      </div>
      <div className="flex-1">{children}</div>
    </div>
  </button>
);

const ScreenWrap = ({children, className=''}) => (
  <div className={'absolute inset-0 overflow-y-auto bg-navy text-white font-sans '+className}>{children}</div>
);

const Header = ({title, onBack, right}) => (
  <div className="flex items-center px-5 pt-12 pb-4 gap-3">
    {onBack && (
      <button onClick={onBack} className="w-9 h-9 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors flex-shrink-0">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
    )}
    <h1 className="flex-1 text-[17px] font-semibold text-white">{title}</h1>
    {right}
  </div>
);

const Toast = ({msg, show}) => (
  <div className={'fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/90 text-navy px-5 py-3 rounded-2xl text-sm font-semibold shadow-xl transition-all duration-300 z-50 '+(show?'opacity-100 translate-y-0':'opacity-0 translate-y-4 pointer-events-none')}>
    {msg}
  </div>
);

// ─── ProtoIntroScreen ────────────────────────────────────────────────────

  <ScreenWrap className="flex flex-col px-6 py-12">
    <div className="flex-1 flex flex-col justify-center">
      <div className="mb-6">
        <span className="text-[11px] font-bold tracking-widest uppercase text-blue-light/70">Prototype</span>
      </div>
      <h1 className="text-2xl font-bold text-white mb-4 leading-snug">Student Onboarding<br/>Complete Experience</h1>
      <p className="text-white/60 text-[14px] leading-relaxed mb-6">
        You are a first-year student at <strong className="text-white">Lakewood University</strong> receiving your first bill for Fall semester.
        You'll create an account, review your balance, and set up how you'd like to pay.
      </p>
      <Card className="mb-6">
        <p className="text-[13px] font-semibold text-white/80 mb-2">Your scenario:</p>
        <ul className="text-[13px] text-white/60 space-y-1.5">
          <li>• Tuition + fees: <strong className="text-white">$8,500</strong></li>
          <li>• Applied aid (merit + Pell): <strong className="text-white">−$2,300</strong></li>
          <li>• Anticipated aid (loan): <strong className="text-white">−$1,000</strong></li>

      <p className="text-white/40 text-[12px] mb-8">This prototype covers account creation through the post-enrollment home screen. Click through all 26 screens.</p>

// ─── WelcomeScreen ───────────────────────────────────────────────────────
const WelcomeScreen = ({nav, goBack, S, setS}) => (
  <ScreenWrap className="flex flex-col items-center justify-center px-8 text-center">
    <div className="relative mb-8">
      <div className="absolute inset-0 rounded-full bg-blue/20 blur-2xl scale-150"/>
      <div className="relative w-20 h-20 rounded-full bg-blue/20 border border-blue/40 flex items-center justify-center text-4xl">🎓</div>
    </div>
    <p className="text-white/50 text-sm font-medium tracking-wide uppercase mb-2">Welcome to</p>
    <h1 className="text-2xl font-bold text-white mb-2">Lakewood University</h1>
    <p className="text-white/50 text-[13px] mb-2">Student Account Portal</p>
    <p className="text-white/40 text-[12px] mb-10">Powered by Nelnet Campus Commerce</p>
    <div className="w-full">
      <Btn onClick={()=>nav('login')}>Get started →</Btn>
      <p className="text-white/30 text-[11px] mt-4">Secure · Encrypted · FERPA Compliant</p>
    </div>
  </ScreenWrap>
);

// ─── LoginScreen ─────────────────────────────────────────────────────────
const LoginScreen = ({nav, goBack, S, setS}) => {
  const [username, setUsername] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [pw2, setPw2] = React.useState('');
  const [tfa, setTfa] = React.useState('text');
  const [userErr, setUserErr] = React.useState('');
  const [showPw, setShowPw] = React.useState(false);

  const pwStrength = () => {
    if (!pw) return 0;
    let s = 0;
    if (pw.length >= 8) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    return s;
  };
  const strLabels = ['','Weak','Fair','Good','Strong'];
  const strColors = ['','bg-red','bg-amber','bg-blue-light','bg-green'];
  const s = pwStrength();

  const checkUsername = (v) => {
    setUsername(v);
    if (TAKEN_USERNAMES.includes(v.toLowerCase())) setUserErr('Username already taken');
    else setUserErr('');
  };

  const canSubmit = username.length >= 3 && !userErr && pw.length >= 8 && pw === pw2;

  const submit = () => {
    if (!canSubmit) return;
    setS(p=>({...p, tfa}));
    nav('contact');
  };

  return (
    <ScreenWrap>
      <Header title="Create Account" onBack={goBack}/>
      <div className="px-5 pb-8">
        <p className="text-white/50 text-[13px] mb-6">Set up your Lakewood University student account.</p>
        <Input label="Username" value={username} onChange={checkUsername} placeholder="e.g. ajohnson2024" error={userErr} hint={!userErr && username.length >= 3 ? '✓ Available' : ''}/>
        <div className="mb-4">
          <label className="block text-xs font-medium text-white/60 mb-1">Password</label>
          <div className="relative">
            <input type={showPw?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)}
              placeholder="Min. 8 characters"
              className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/30 text-[15px] outline-none focus:border-blue-light pr-12"/>
            <button onClick={()=>setShowPw(p=>!p)} className="absolute right-3 top-3 text-white/40 hover:text-white/70">
              {showPw ? '🙈' : '👁'}
            </button>
          </div>
          {pw && (
            <div className="mt-2">
              <div className="flex gap-1 mb-1">{[1,2,3,4].map(i=><div key={i} className={'h-1 flex-1 rounded-full '+(i<=s?strColors[s]:'bg-white/15')}/>)}</div>
              <p className={'text-xs '+(s>=3?'text-green':s===2?'text-amber':'text-red')}>{strLabels[s]}</p>
            </div>
          )}
        </div>
        <Input label="Confirm Password" value={pw2} onChange={setPw2} type={showPw?'text':'password'}
          placeholder="Re-enter password" error={pw2 && pw!==pw2?'Passwords do not match':''}/>
        <div className="mb-6">
          <p className="text-xs font-medium text-white/60 mb-3">Two-factor authentication</p>
          {[{v:'text',l:'Text message',d:'Recommended'},{v:'email',l:'Email',d:'Backup option'},{v:'app',l:'Authenticator app',d:'Most secure'}].map(o=>(
            <button key={o.v} onClick={()=>setTfa(o.v)}
              className={'w-full flex items-center gap-3 p-3 rounded-xl mb-2 border transition-all '+(tfa===o.v?'border-blue bg-blue/10':'border-white/15 hover:border-white/30')}>
              <div className={'w-4 h-4 rounded-full border-2 flex items-center justify-center '+(tfa===o.v?'border-blue':'border-white/40')}>
                {tfa===o.v && <div className="w-2 h-2 rounded-full bg-blue"/>}
              </div>
              <div className="text-left">
                <p className="text-[13px] font-medium text-white">{o.l}</p>
                <p className="text-[11px] text-white/40">{o.d}</p>
              </div>
            </button>
          ))}
        </div>
        <Btn onClick={submit} disabled={!canSubmit}>Create Account</Btn>
      </div>
    </ScreenWrap>
  );
};


// ─── ContactScreen ───────────────────────────────────────────────────────
const ContactScreen = ({nav, goBack, S, setS}) => {
  const [email, setEmail] = React.useState('alex.johnson@student.lakewood.edu');
  const [phone, setPhone] = React.useState('');
  const [extras, setExtras] = React.useState([]);
  const [extraInput, setExtraInput] = React.useState('');
  const [showAdd, setShowAdd] = React.useState(false);

  const addExtra = () => {
    if (extraInput.includes('@')) { setExtras(p=>[...p,extraInput]); setExtraInput(''); setShowAdd(false); }
  };

  const next = () => {
    const hasPhone = phone.replace(/\D/g,'').length >= 10;
    setS(p=>({...p, hasPhone}));
    nav(hasPhone ? 'comms' : 'payer');
  };

  return (
    <ScreenWrap>
      <Header title="Contact Info" onBack={goBack}/>
      <div className="px-5 pb-8">
        <p className="text-white/50 text-[13px] mb-6">How should we reach you about your account?</p>
        <Input label="Primary Email" value={email} onChange={setEmail} type="email" placeholder="your@email.com"/>
        <Input label="Mobile Phone (optional)" value={phone} onChange={setPhone} type="tel" placeholder="(555) 000-0000"
          hint="Enables SMS alerts and 2FA via text"/>
        {extras.map((e,i)=>(
          <div key={i} className="flex items-center gap-2 mb-2">
            <div className="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white text-[14px]">{e}</div>
            <button onClick={()=>setExtras(p=>p.filter((_,j)=>j!==i))} className="text-white/40 hover:text-red transition-colors">✕</button>
          </div>
        ))}
        {showAdd ? (
          <div className="flex gap-2 mb-4">
            <input value={extraInput} onChange={e=>setExtraInput(e.target.value)} placeholder="Additional email"
              className="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/30 text-[14px] outline-none focus:border-blue-light"/>
            <button onClick={addExtra} className="bg-blue px-4 rounded-xl text-white font-semibold text-[13px]">Add</button>
          </div>
        ) : (
          <button onClick={()=>setShowAdd(true)} className="text-blue-light text-[13px] font-medium mb-6">+ Add another email</button>
        )}
        <Btn onClick={next}>Continue</Btn>
      </div>
    </ScreenWrap>
  );
};

const CommsScreen = ({nav, goBack, S, setS}) => {

  const [suggest, setSuggest] = React.useState(false);

        {S.hasPhone ? (

                <Toggle on={suggest} onChange={setSuggest}/>

        ) : (
          <Card className="mb-6 border-amber/30 bg-amber/10">

            <p className="text-[12px] text-white/60">Add a mobile number in Contact Info to receive SMS alerts about payments and account activity.</p>
          </Card>

        <Btn onClick={next}>Continue</Btn>

// ─── PayerScreen ─────────────────────────────────────────────────────────
const PayerScreen = ({nav, goBack, S, setS}) => {
  const [payer, setPayer] = React.useState('');

  const next = () => {
    if (!payer) return;
    setS(p=>({...p, payer}));
    if (payer === 'other') nav('invite');
    else nav('insurance');
  };

  return (
    <ScreenWrap>
      <Header title="Who's Paying?" onBack={goBack}/>
      <div className="px-5 pb-8">
        <p className="text-white/50 text-[13px] mb-6">Let us know how payments will be made so we can set things up correctly.</p>
        <RadioCard selected={payer==='self'} onClick={()=>setPayer('self')}>
          <p className="text-[14px] font-semibold text-white">I'll pay myself</p>
          <p className="text-[12px] text-white/50 mt-0.5">Set up your payment method and plan</p>
        </RadioCard>
        <RadioCard selected={payer==='other'} onClick={()=>setPayer('other')}>
          <p className="text-[14px] font-semibold text-white">Someone else is paying</p>
          <p className="text-[12px] text-white/50 mt-0.5">Invite a parent, guardian, or sponsor</p>
        </RadioCard>
        <RadioCard selected={payer==='combo'} onClick={()=>setPayer('combo')}>
          <p className="text-[14px] font-semibold text-white">We'll share the payments</p>
          <p className="text-[12px] text-white/50 mt-0.5">Invite someone and set up your portion too</p>
        </RadioCard>
        <Btn onClick={next} disabled={!payer}>Continue</Btn>
      </div>
    </ScreenWrap>
  );
};


// ─── InviteScreen ────────────────────────────────────────────────────────
const InviteScreen = ({nav, goBack, S, setS}) => {
  const [first, setFirst] = React.useState('');
  const [last,  setLast]  = React.useState('');
  const [email, setEmail] = React.useState('');
  const [rel,   setRel]   = React.useState('');
  const [sent,  setSent]  = React.useState([]);
  const [justSent, setJustSent] = React.useState(false);

  const canSend = first.trim() && email.includes('@');

  const send = () => {
    setSent(p=>[...p,{first,last,email,rel}]);
    setJustSent(true);
    setFirst(''); setLast(''); setEmail(''); setRel('');
  };

  const finish = () => {
    const skipped = sent.length === 0;
    setS(p=>({...p, skippedInvite: skipped, authPayers: sent}));
    if (S.payer === 'other') {
      // skip to complete for "other" payer
      nav('complete');
    } else {
      nav('insurance');
    }
  };

  return (
    <ScreenWrap>
      <Header title="Invite a Payer" onBack={goBack}/>
      <div className="px-5 pb-8">
        <p className="text-white/50 text-[13px] mb-5">They'll receive an email with a secure link to set up their payment method.</p>
        {sent.length > 0 && (
          <div className="mb-4">
            {sent.map((p,i)=>(
              <div key={i} className="flex items-center gap-3 bg-green/10 border border-green/30 rounded-xl px-4 py-3 mb-2">
                <span className="text-green text-lg">✓</span>
                <div>
                  <p className="text-[13px] font-semibold text-white">{p.first} {p.last}</p>
                  <p className="text-[11px] text-white/50">{p.email}{p.rel ? ' · '+p.rel : ''}</p>
                </div>
              </div>
            ))}
          </div>
        )}
        {justSent && sent.length > 0 ? (
          <div className="text-center py-4 mb-4">
            <p className="text-white/60 text-[13px] mb-4">Invite sent! Send another or continue.</p>
            <button onClick={()=>setJustSent(false)} className="text-blue-light text-[13px] font-medium">+ Invite another person</button>
          </div>
        ) : (
          <>
            <div className="flex gap-3">
              <Input label="First name" value={first} onChange={setFirst} placeholder="Jane" className="flex-1 mb-0"/>
              <Input label="Last name" value={last} onChange={setLast} placeholder="Doe" className="flex-1 mb-0"/>
            </div>
            <div className="mb-4"/>
            <Input label="Email address" value={email} onChange={setEmail} type="email" placeholder="jane@example.com"/>
            <Input label="Relationship (optional)" value={rel} onChange={setRel} placeholder="e.g. Parent, Guardian"/>
            <Btn onClick={send} disabled={!canSend} className="mb-3">Send Invite</Btn>
          </>
        )}
        <Divider/>
        <button onClick={finish} className="w-full text-center text-white/40 text-[13px] py-2 hover:text-white/60 transition-colors">
          {sent.length > 0 ? 'Continue →' : 'Skip for now'}
        </button>
      </div>
    </ScreenWrap>
  );
};

// ─── InsuranceScreen ─────────────────────────────────────────────────────
const InsuranceScreen = ({nav, goBack, S, setS}) => {
  const [step, setStep] = React.useState('A'); // A → C → D → E
  const [choice, setChoice] = React.useState(''); // yes/no
  const [inState, setInState] = React.useState(''); // in/out
  const [method, setMethod] = React.useState('ach');
  const [acct, setAcct] = React.useState('');
  const [routing, setRouting] = React.useState('');

  const rate = inState === 'in' ? 0.019 : 0.022;
  const premium = Math.round(TOTAL_CHARGES * rate * 100) / 100;

  const handleChoiceNext = () => {
    if (choice === 'no') { nav('howpay'); return; }
    setStep('C');
  };
  const handleAccept = () => {
    setS(p=>({...p, insAccepted:true, insPremium:premium, insState:inState}));
    setStep('D');
  };
  const handlePayInsurance = () => {
    setStep('E');
  };

// ─── PotSetupScreen ───────────────────────────────────────────────────────
const PotSetupScreen = ({nav, goBack, S, setS}) => {
  const [step, setStep] = React.useState('A'); // A=freq, B1=day, B2=biweekly, C=speed
  const [freq, setFreq] = React.useState('');
  const [days, setDays] = React.useState([]);
  const [bwDate, setBwDate] = React.useState('');
  const [speed, setSpeed] = React.useState('');
  const [customAmt, setCustomAmt] = React.useState('');

  const maxPmts = freq==='monthly'?9:freq==='twice'?18:19;
  const minInstall = Math.ceil(POT_BALANCE / maxPmts * 100) / 100;
  const installAmt = speed==='spread' ? (POT_BALANCE/maxPmts) : (parseFloat(customAmt)||minInstall);
  const count = Math.ceil(POT_BALANCE / installAmt);
  const freqLabel = freq==='monthly'?'month':freq==='twice'?'half-month':'2 weeks';

  const MONTH_DAYS = Array.from({length:28},(_,i)=>i+1);
  const BW_DATES = ['Apr 4','Apr 18','May 2','May 16','May 30'];

  const toggleDay = (d) => {
    if (days.includes(d)) setDays(p=>p.filter(x=>x!==d));
    else if (days.length < 2) setDays(p=>[...p,d].sort((a,b)=>a-b));
  };

  const goToSpeed = () => {
    const d = freq==='biweekly' ? bwDate : days.join('&');
    setS(p=>({...p, potFreq:freq, potDays:days, potBwDate:bwDate}));
    setStep('C');
  };

  const confirm = () => {
    setS(p=>({...p, potSpeed:speed, potInstall:installAmt, potCount:count, potFreqLabel:freqLabel, potMinInstall:minInstall}));
    nav('pot-confirm');
  };

  return (
    <ScreenWrap>
      <Header title="Pay Over Time Setup" onBack={step==='A'?goBack:()=>setStep(step==='C'?(freq==='biweekly'?'B2':'B1'):'A')}/>
      <div className="px-5 pb-8">
        {step === 'A' && (
          <>
            <p className="text-white/50 text-[13px] mb-5">How often would you like to make payments?</p>
            {[{v:'monthly',l:'Monthly',d:'One payment per month, up to 9 payments'},
              {v:'twice',l:'Twice Monthly',d:'Two payments per month, up to 18 payments'},
              {v:'biweekly',l:'Every 2 Weeks',d:'Biweekly payments, up to 19 payments'}].map(o=>(
              <RadioCard key={o.v} selected={freq===o.v} onClick={()=>setFreq(o.v)}>
                <p className="text-[14px] font-semibold text-white">{o.l}</p>
                <p className="text-[12px] text-white/50 mt-0.5">{o.d}</p>
              </RadioCard>
            ))}
            <Btn onClick={()=>setStep(freq==='biweekly'?'B2':'B1')} disabled={!freq}>Continue</Btn>
          </>
        )}
        {step === 'B1' && (
          <>
            <p className="text-white/50 text-[13px] mb-2">
              {freq==='monthly' ? 'Which day of the month?' : 'Which two days of the month? (pick 2)'}
            </p>
            <div className="grid grid-cols-7 gap-1.5 mb-6">
              {MONTH_DAYS.map(d=>(
                <button key={d} onClick={()=>freq==='monthly'?(setDays([d])):(toggleDay(d))}
                  className={'w-full aspect-square rounded-lg text-[13px] font-medium transition-all '+
                    (days.includes(d)?'bg-blue text-white':'bg-white/10 text-white/70 hover:bg-white/20')+
                    (!days.includes(d) && days.length >= (freq==='monthly'?1:2) ? ' opacity-40' : '')}>
                  {d}
                </button>
              ))}
            </div>
            <Btn onClick={goToSpeed} disabled={freq==='monthly'?days.length<1:days.length<2}>Continue</Btn>
          </>
        )}
        {step === 'B2' && (
          <>
            <p className="text-white/50 text-[13px] mb-4">Select your first payment date:</p>
            {BW_DATES.map(d=>(
              <RadioCard key={d} selected={bwDate===d} onClick={()=>setBwDate(d)}>
                <p className="text-[14px] text-white">{d}</p>
              </RadioCard>
            ))}
            <Btn onClick={goToSpeed} disabled={!bwDate}>Continue</Btn>
          </>
        )}
        {step === 'C' && (
          <>
            <p className="text-white/50 text-[13px] mb-4">Balance to finance: <strong className="text-white">{fmt(POT_BALANCE)}</strong></p>
            <RadioCard selected={speed==='spread'} onClick={()=>setSpeed('spread')}>
              <p className="text-[14px] font-semibold text-white">Spread it out</p>
              <p className="text-[12px] text-white/50 mt-0.5">{maxPmts} payments of {fmt(POT_BALANCE/maxPmts)} / {freqLabel}</p>
            </RadioCard>
            <RadioCard selected={speed==='fast'} onClick={()=>setSpeed('fast')}>
              <p className="text-[14px] font-semibold text-white">Pay as quickly as possible</p>
              <p className="text-[12px] text-white/50 mt-0.5">Choose your installment amount (min {fmt(minInstall)})</p>
            </RadioCard>
            {speed === 'fast' && (
              <div className="mb-3">
                <Input label="Amount per payment" value={customAmt} onChange={setCustomAmt} placeholder={fmt(minInstall)}
                  hint={customAmt && parseFloat(customAmt)>=minInstall ? `${Math.ceil(POT_BALANCE/parseFloat(customAmt))} payments` : `Min ${fmt(minInstall)}`}/>
              </div>
            )}
            <Btn onClick={confirm} disabled={!speed||(speed==='fast'&&(!customAmt||parseFloat(customAmt)<minInstall))}>Continue</Btn>
          </>
        )}
      </div>
    </ScreenWrap>
  );
};

const CompleteScreen = ({nav, goBack, S, setS}) => {
  const lines = [];
  if (S.payer === 'other') {
    lines.push({icon:'✉️', text:`Invite sent to ${S.authPayers?.[0]?.first || 'your payer'}`});
    lines.push({icon:'⏳', text:'Waiting for payer to complete setup'});
  } else {
    if (S.insAccepted) lines.push({icon:'🛡️', text:`GradGuard protection: ${fmt(S.insPremium)}/yr`});
    if (S.payPlan==='pot') lines.push({icon:'📅', text:`Pay Over Time: ${S.potCount} × ${fmt(S.potInstall)} / ${S.potFreqLabel}`});
    else if (S.payPlan==='full') lines.push({icon:'✅', text:`Paid in full: ${fmt(BALANCE_DUE)}`});
    else if (S.payPlan==='later') lines.push({icon:'📅', text:`Payment scheduled`});
    if (S.methodSaved) lines.push({icon:'🏦', text:'Bank account saved for future payments'});
    if (S.authPayers?.length > 0) lines.push({icon:'👤', text:`${S.authPayers.length} authorized payer(s) invited`});
  }

  const msg = S.payer==='other'
    ? "Your account is set up! Your payer will receive an email to complete their payment setup."
    : S.payPlan==='pot'
    ? "You're enrolled in Pay Over Time. Your first installment will draft on schedule."
    : S.payPlan==='full'
    ? "Your balance is paid. Your account is fully set up."
    : "Your payment is scheduled. Everything's set!";

  return (
    <ScreenWrap className="flex flex-col px-6 py-10">
      <div className="flex-1 flex flex-col items-center text-center justify-center">
        <div className="w-20 h-20 rounded-full bg-green/20 border border-green/30 flex items-center justify-center text-4xl mb-5">🎉</div>
        <h2 className="text-2xl font-bold text-white mb-3">Setup Complete!</h2>
        <p className="text-white/60 text-[13px] leading-relaxed mb-8 max-w-[280px]">{msg}</p>
        <Card className="w-full mb-8 text-left">
          {lines.map((l,i)=>(
            <div key={i} className="flex items-center gap-3 py-2">
              <span className="text-lg">{l.icon}</span>
              <p className="text-[13px] text-white/80">{l.text}</p>
            </div>
          ))}
        </Card>
      </div>

    </ScreenWrap>
  );
};

const PayNowScreen = ({nav, goBack, S, setS}) => {
  const [step, setStep] = React.useState(1); // 1=amount, 2=confirm, 3=done
  const [amtChoice, setAmtChoice] = React.useState('');
  const [customAmt, setCustomAmt] = React.useState('');

  const amount = amtChoice==='full' ? (S.payPlan==='pot'?POT_BALANCE:BALANCE_DUE)
    : amtChoice==='next' ? S.potInstall
    : parseFloat(customAmt) || 0;

  const canStep1 = amtChoice && (amtChoice !== 'custom' || amount > 0);

  const handleDone = () => {
    nav('home');
  };

  return (
    <ScreenWrap>
      <Header title="Make a Payment" onBack={step===1?goBack:()=>setStep(p=>p-1)}/>
      <div className="px-5 pb-8">
        {step === 1 && (
          <>
            <p className="text-white/50 text-[13px] mb-5">How much would you like to pay?</p>
            {S.payPlan==='pot' && (
              <RadioCard selected={amtChoice==='next'} onClick={()=>setAmtChoice('next')}>
                <p className="text-[14px] font-semibold text-white">Next installment</p>
                <p className="text-[12px] text-white/50 mt-0.5">{fmt(S.potInstall)}</p>
              </RadioCard>
            )}
            <RadioCard selected={amtChoice==='full'} onClick={()=>setAmtChoice('full')}>
              <p className="text-[14px] font-semibold text-white">Pay remaining balance</p>
              <p className="text-[12px] text-white/50 mt-0.5">{fmt(S.payPlan==='pot'?POT_BALANCE:BALANCE_DUE)}</p>
            </RadioCard>
            <RadioCard selected={amtChoice==='custom'} onClick={()=>setAmtChoice('custom')}>
              <p className="text-[14px] font-semibold text-white">Custom amount</p>
              <p className="text-[12px] text-white/50 mt-0.5">Enter any amount</p>
            </RadioCard>
            {amtChoice==='custom' && (
              <Input label="Amount" value={customAmt} onChange={setCustomAmt} placeholder="$0.00" type="number"/>
            )}
            <Btn onClick={()=>setStep(2)} disabled={!canStep1}>Continue</Btn>
          </>
        )}
        {step === 2 && (
          <>
            <Card className="mb-5">
              <Row label="Payment amount" value={fmt(amount)} bold/>
              <Divider/>
              {S.methodSaved ? (
                <div className="flex items-center gap-3 mt-2">
                  <span className="text-xl">🏦</span>
                  <div>
                    <p className="text-[13px] font-semibold text-white">Checking ••••4521</p>
                    <p className="text-[11px] text-white/50">Chase Bank · ACH</p>
                  </div>
                </div>
              ) : (
                <p className="text-[12px] text-white/50 mt-2">No saved method · will use entered details</p>
              )}
            </Card>
            <Btn onClick={()=>setStep(3)}>Submit Payment</Btn>
          </>
        )}
        {step === 3 && (
          <div className="flex flex-col items-center text-center pt-8">
            <div className="w-16 h-16 rounded-full bg-green/20 flex items-center justify-center text-3xl mb-4">✅</div>
            <h2 className="text-xl font-bold text-white mb-2">Payment Submitted!</h2>
            <p className="text-white/50 text-[13px] mb-6">{fmt(amount)} has been submitted. Processing within 1–3 business days.</p>
            <Btn onClick={handleDone}>Return to Home</Btn>
          </div>
        )}
      </div>
    </ScreenWrap>
  );
};

                <div className="text-right">
                  <p className="text-[13px] font-semibold text-white">{fmt(p.amt)}</p>
                  <Badge color={p.status==='upcoming'?'amber':'blue'} className="text-[10px]">{p.status}</Badge>
                </div>
              </div>
            ))}
            {(S.potCount||9) > 5 && <p className="text-center text-white/40 text-[11px] pt-2">+ {(S.potCount||9)-5} more payments</p>}
          </Card>
        )}

        <div className="space-y-3">
          <Btn onClick={()=>nav('change-dates-ob')} variant="ghost">Change Payment Dates</Btn>
          <Btn onClick={()=>nav('change-autopay-ob')} variant="ghost">Change Auto-Pay Method</Btn>
          <Btn onClick={()=>nav('pay-next-ob')} variant="primary">Pay Next Payment</Btn>
          <Btn onClick={()=>nav('pay-now')} variant="ghost">Make Extra Payment</Btn>
          <Btn onClick={()=>nav('home')} variant="outline">Cancel Plan</Btn>
        </div>
      </div>
    </ScreenWrap>
  );
};

// ─── ChangeDatesScreen ───────────────────────────────────────────────────
const ChangeDatesScreen = ({nav, goBack, S, setS}) => {
  const [mode, setMode] = React.useState(''); // all / one
  const [newDay, setNewDay] = React.useState('');
  const [specificPmt, setSpecificPmt] = React.useState('');
  const [specificDate, setSpecificDate] = React.useState('');
  const [done, setDone] = React.useState(false);

  const handleSave = () => setDone(true);

  if (done) return (
    <ScreenWrap className="flex flex-col items-center justify-center px-8 text-center">
      <div className="w-16 h-16 rounded-full bg-green/20 flex items-center justify-center text-3xl mb-4">✅</div>
      <h2 className="text-xl font-bold text-white mb-2">Dates Updated</h2>
      <p className="text-white/50 text-[13px] mb-6">
        {mode==='all' ? `All future payments moved to day ${newDay} of each ${S.potFreqLabel||'month'}.` : `Payment ${specificPmt} rescheduled to ${specificDate}.`}
      </p>
      <Btn onClick={()=>nav('manage-pot')}>Return to Plan</Btn>
    </ScreenWrap>
  );

  return (
    <ScreenWrap>
      <Header title="Change Payment Dates" onBack={goBack}/>
      <div className="px-5 pb-8">
        <p className="text-white/50 text-[13px] mb-5">Would you like to change all future payments or just one?</p>
        <RadioCard selected={mode==='all'} onClick={()=>setMode('all')}>
          <p className="text-[14px] font-semibold text-white">All future payments</p>
          <p className="text-[12px] text-white/50 mt-0.5">Move to a new day of the month</p>
        </RadioCard>
        <RadioCard selected={mode==='one'} onClick={()=>setMode('one')}>
          <p className="text-[14px] font-semibold text-white">One specific payment</p>
          <p className="text-[12px] text-white/50 mt-0.5">Reschedule a single upcoming payment</p>
        </RadioCard>
        {mode==='all' && (
          <Input label="New day of month" value={newDay} onChange={setNewDay} placeholder="e.g. 15" type="number"
            hint="1–28"/>
        )}
        {mode==='one' && (
          <>
            <Input label="Payment number" value={specificPmt} onChange={setSpecificPmt} placeholder="e.g. 2" type="number"/>
            <Input label="New date" value={specificDate} onChange={setSpecificDate} type="date"/>
          </>
        )}
        {mode && <Btn onClick={handleSave} disabled={mode==='all'?!newDay:(!specificPmt||!specificDate)}>Save Changes</Btn>}
      </div>
    </ScreenWrap>
  );
};


// ─── ChangeAutopayScreen ──────────────────────────────────────────────────
const ChangeAutopayScreen = ({nav, goBack, S, setS}) => {
  const [selected, setSelected] = React.useState('current');
  const [showAdd, setShowAdd] = React.useState(false);
  const [routing, setRouting] = React.useState('');
  const [acct, setAcct] = React.useState('');
  const [done, setDone] = React.useState(false);

  const handleSave = () => {
    if (showAdd && routing && acct) {
      setS(p=>({...p, methodSaved:true}));
    }
    setDone(true);
  };

  if (done) return (
    <ScreenWrap className="flex flex-col items-center justify-center px-8 text-center">
      <div className="w-16 h-16 rounded-full bg-green/20 flex items-center justify-center text-3xl mb-4">✅</div>
      <h2 className="text-xl font-bold text-white mb-2">Auto-Pay Updated</h2>
      <p className="text-white/50 text-[13px] mb-6">Future installments will be drafted from your updated payment method.</p>
      <Btn onClick={()=>nav('manage-pot')}>Return to Plan</Btn>
    </ScreenWrap>
  );

  return (
    <ScreenWrap>
      <Header title="Change Auto-Pay Method" onBack={goBack}/>
      <div className="px-5 pb-8">
        <p className="text-white/50 text-[13px] mb-5">Select a payment method for future installments:</p>
        {S.methodSaved && (
          <RadioCard selected={selected==='current'} onClick={()=>{setSelected('current');setShowAdd(false);}}>
            <div className="flex items-center gap-3">
              <span className="text-lg">🏦</span>
              <div>
                <p className="text-[14px] font-semibold text-white">Checking ••••4521</p>
                <p className="text-[12px] text-white/50">Chase Bank · ACH</p>
              </div>
            </div>
          </RadioCard>
        )}
        {!showAdd ? (
          <button onClick={()=>{setShowAdd(true);setSelected('new');}} className="w-full text-left p-4 rounded-2xl border border-dashed border-white/20 hover:border-blue/50 transition-colors text-blue-light text-[13px] font-medium mb-6">
            + Add new bank account
          </button>
        ) : (
          <div className="mb-4">
            <p className="text-[13px] font-semibold text-white mb-3">New Bank Account</p>
            <Input label="Routing number" value={routing} onChange={setRouting} placeholder="9 digits"/>
            <Input label="Account number" value={acct} onChange={setAcct} placeholder="Account number"/>
          </div>
        )}
        <Btn onClick={handleSave} disabled={selected==='new'&&(!routing||!acct)}>Save Method</Btn>
      </div>
    </ScreenWrap>
  );
};

// ─── PayNextScreen ────────────────────────────────────────────────────────
const PayNextScreen = ({nav, goBack, S, setS}) => {
  const [method, setMethod] = React.useState(S.methodSaved?'saved':'ach');
  const [routing, setRouting] = React.useState('');
  const [acct, setAcct] = React.useState('');
  const [done, setDone] = React.useState(false);

  const amount = S.potInstall || 517;
  const canPay = method==='saved' || (routing.length>=9 && acct.length>=8);

  const handlePay = () => {
    if (!S.methodSaved && routing && acct) setS(p=>({...p,methodSaved:true}));
    setDone(true);
  };

  if (done) return (
    <ScreenWrap className="flex flex-col items-center justify-center px-8 text-center">
      <div className="w-16 h-16 rounded-full bg-green/20 flex items-center justify-center text-3xl mb-4">✅</div>
      <h2 className="text-xl font-bold text-white mb-2">Payment Submitted!</h2>
      <p className="text-white/50 text-[13px] mb-6">{fmt(amount)} installment payment submitted successfully.</p>
      <Btn onClick={()=>nav('manage-pot')}>Return to Plan</Btn>
    </ScreenWrap>
  );

  return (
    <ScreenWrap>
      <Header title="Pay Next Installment" onBack={goBack}/>
      <div className="px-5 pb-8">
        <Card className="mb-5">
          <Row label="Next installment" value={fmt(amount)} bold/>
          <Row label="Due date" value="May 1, 2025"/>
          <Row label="Remaining after payment" value={fmt(Math.max(0, POT_BALANCE-amount))}/>
        </Card>
        <p className="text-[13px] font-semibold text-white mb-3">Payment Method</p>
        {S.methodSaved ? (
          <>
            <RadioCard selected={method==='saved'} onClick={()=>setMethod('saved')}>
              <div className="flex items-center gap-3">
                <span className="text-lg">🏦</span>
                <div>
                  <p className="text-[13px] font-semibold text-white">Checking ••••4521</p>
                  <p className="text-[11px] text-white/50">Chase Bank · ACH</p>
                </div>
              </div>
            </RadioCard>
            <RadioCard selected={method==='new'} onClick={()=>setMethod('new')}>
              <p className="text-[13px] text-white">Use different method</p>
            </RadioCard>
          </>
        ) : null}
        {(method==='new' || !S.methodSaved) && (
          <>
            <Input label="Routing number" value={routing} onChange={setRouting} placeholder="9 digits"/>
            <Input label="Account number" value={acct} onChange={setAcct} placeholder="Account number"/>
          </>
        )}
        <Btn onClick={handlePay} disabled={!canPay}>Pay {fmt(amount)}</Btn>
      </div>
    </ScreenWrap>
  );
};


// ─── HistoryScreen ────────────────────────────────────────────────────────
const HistoryScreen = ({nav, goBack, S, setS}) => {
  const [tab, setTab] = React.useState('all');

  const allItems = [
    {type:'payment',  date:'Apr 14, 2025', desc:'Down payment + fee',        amt:'+'+fmt(POT_DOWN_TOTAL), color:'green', icon:'💳'},
    {type:'balance',  date:'Apr 12, 2025', desc:'Fall 2025 bill posted',     amt:'+'+fmt(TOTAL_CHARGES),  color:'amber', icon:'📋'},
    {type:'aid',      date:'Apr 10, 2025', desc:'Pell Grant applied',        amt:'−$1,100',               color:'green', icon:'🎓'},
    {type:'aid',      date:'Apr 10, 2025', desc:'Merit Scholarship applied', amt:'−$1,200',               color:'green', icon:'🏆'},
    {type:'comms',    date:'Apr 8,  2025', desc:'Welcome email sent',        amt:'',                      color:'blue',  icon:'✉️'},
    {type:'comms',    date:'Apr 8,  2025', desc:'Account created',           amt:'',                      color:'blue',  icon:'👤'},
  ];

  const filtered = tab==='all' ? allItems
    : tab==='payments' ? allItems.filter(i=>i.type==='payment')
    : tab==='balance'  ? allItems.filter(i=>i.type==='balance'||i.type==='aid')
    : allItems.filter(i=>i.type==='comms');

  const TABS = [{v:'all',l:'All'},{v:'payments',l:'Payments'},{v:'balance',l:'Balance'},{v:'comms',l:'Comms'}];

  return (
    <ScreenWrap>
      <Header title="Account History" onBack={goBack}/>
      <div className="px-5 pb-8">
        <div className="flex bg-white/8 rounded-2xl p-1 mb-5">
          {TABS.map(t=>(
            <button key={t.v} onClick={()=>setTab(t.v)}
              className={'flex-1 py-1.5 rounded-xl text-[12px] font-medium transition-all '+(tab===t.v?'bg-blue text-white':'text-white/50 hover:text-white/80')}>
              {t.l}
            </button>
          ))}
        </div>
        {filtered.length === 0 ? (
          <div className="text-center py-12 text-white/30 text-[13px]">No items in this category</div>
        ) : (
          <div className="space-y-3">
            {filtered.map((item,i)=>(
              <Card key={i} className="flex items-center gap-3 p-3">
                <div className={`w-10 h-10 rounded-full flex items-center justify-center text-lg flex-shrink-0
                  ${item.color==='green'?'bg-green/15':item.color==='amber'?'bg-amber/15':'bg-blue/15'}`}>
                  {item.icon}
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-medium text-white truncate">{item.desc}</p>
                  <p className="text-[11px] text-white/40">{item.date}</p>
                </div>
                {item.amt && (
                  <span className={`text-[13px] font-semibold flex-shrink-0 ${item.color==='green'?'text-green':item.color==='amber'?'text-amber':'text-white'}`}>
                    {item.amt}
                  </span>
                )}
              </Card>
            ))}
          </div>
        )}
      </div>
    </ScreenWrap>
  );
};


// ─── App ──────────────────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = React.useState('proto-intro');
  const [S, setS] = React.useState({
    tfa: '', payer: '', authPayers: [], methodSaved: false, methodType: 'ach',
    payPlan: '', potFreq: '', potDays: [], potBwDate: '', potSpeed: '',
    potInstall: 0, potCount: 0, potFreqLabel: 'month', potMinInstall: 0,
    skippedInvite: false, skippedMethod: false, hasPhone: false,
    insAccepted: false, insPremium: 162, insState: '', apActive: false,
  });
  const navStack = React.useRef([]);
  const nav    = (s) => { navStack.current.push(screen); setScreen(s); };
  const goBack = () => { const p = navStack.current.pop(); if (p) setScreen(p); };

  const screens = {
    'proto-intro':       <ProtoIntroScreen      nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'welcome':           <WelcomeScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'login':             <LoginScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'contact':           <ContactScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'comms':             <CommsScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'payer':             <PayerScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'invite':            <InviteScreen          nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'insurance':         <InsuranceScreen       nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'howpay':            <HowPayScreen          nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pot':               <PotSetupScreen        nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pot-confirm':       <PotConfirmScreen      nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-confirm-full':  <PayConfirmFullScreen  nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-success':       <PaySuccessScreen      nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-sched':         <PaySchedScreen        nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'adj-settings':      <AdjSettingsScreen     nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'complete':          <CompleteScreen        nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'home':              <HomeScreen            nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'costs':             <CostsScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'print':             <PrintScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-now':           <PayNowScreen          nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'guest':             <GuestScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'manage-pot':        <ManagePotScreen       nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'change-dates-ob':   <ChangeDatesScreen     nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'change-autopay-ob': <ChangeAutopayScreen   nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-next-ob':       <PayNextScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'history':           <HistoryScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
  };

  return (
    <div className="min-h-screen bg-[#060d1a] flex items-center justify-center font-sans p-4">
      {/* Home button */}
      <a href="/"
        className="fixed top-4 left-4 z-50 bg-white/10 hover:bg-white/20 border border-white/20 text-white text-[13px] font-medium px-3 py-2 rounded-xl transition-colors backdrop-blur-sm">
        ← Home
      </a>

      {/* Screen selector (dev helper) */}
      <div className="fixed top-4 right-4 z-50">
        <select
          value={screen}
          onChange={e => { navStack.current = []; setScreen(e.target.value); }}
          className="bg-white/10 border border-white/20 text-white text-[11px] rounded-xl px-2 py-1.5 backdrop-blur-sm outline-none max-w-[160px]"
          title="Jump to screen">
          {Object.keys(screens).map(s => <option key={s} value={s} className="bg-[#0a1628]">{s}</option>)}
        </select>
      </div>

      {/* Phone frame */}
      <div className="relative w-[390px] h-[844px] bg-navy overflow-hidden rounded-[44px] shadow-2xl border border-white/10 flex-shrink-0">
        {/* Notch */}
        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-7 bg-black rounded-b-2xl z-30"/>
        {/* Screen content */}
        <div className="absolute inset-0 pt-7">
          {screens[screen] || screens['proto-intro']}
        </div>
      </div>

      {/* Watermark */}
      <div className="fixed bottom-4 left-1/2 -translate-x-1/2 text-white/20 text-[11px] font-medium tracking-wide pointer-events-none">
        Nelnet Campus Commerce · Student Onboarding Prototype
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
