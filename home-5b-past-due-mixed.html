<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>5b · Past Due & Mixed Due Dates — Horizon Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*:focus-visible {
  outline: 3px solid #2D1FA3;
  outline-offset: 2px;
  border-radius: 4px;
}
button.bg-hz-indigo:focus-visible,
button.bg-hz-teal:focus-visible {
  outline: 3px solid #ffffff;
  outline-offset: 2px;
}
</style>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'hz-indigo':    '#2D1FA3',
        'hz-mid':       '#4A4580',
        'hz-accent':    '#645CDC',
        'hz-cloud':     '#EEF0FF',
        'hz-teal':      '#0D7A55',
        'hz-teal-bg':   '#E1F5EE',
        'hz-amber':     '#EF9F27',
        'hz-amber-bg':  '#FAEEDA',
        'hz-danger':    '#E24B4A',
        'hz-danger-bg': '#F7C1C1',
        'hz-bg':        '#F4F5FF',
        'hz-card':      '#FFFFFF',
        'hz-text':      '#1A1060',
        'hz-muted':     '#57548D',
        'hz-hint':      '#6B6899',
        'hz-border':    'rgba(100,92,220,0.14)',
      },
      fontFamily: {
        sans: ["'Plus Jakarta Sans'", 'system-ui', 'sans-serif'],
      },
      borderRadius: {
        'hz':     '18px',
        'hz-sm':  '12px',
        'hz-pill':'99px',
      },
    },
  },
}
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-hz-bg">
<div id="root"></div>
<script type="text/babel">
// ═══ BEGIN SHARED HOME COMPONENTS — sync from consumer-home.html ═══

// ─── Financial constants — scenario-specific ──────────────────────────────
const TOTAL_CHARGES   = 13050;
const APPLIED_AID     = 600;
const ANTICIPATED_AID = 0;
const BALANCE_DUE     = 12450;
const POT_DOWN        = 0;
const NELNET_FEE      = 0;
const POT_DOWN_TOTAL  = 0;
const POT_BALANCE     = 0;
const CARD_FEE_PCT    = 2.75;
const fmt  = (n) => '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK = (n) => '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits:0});

// ─── Default returning student state ──────────────────────────────────────
const HOME_DEFAULT_STATE = {
  firstName: 'Alex',
  initials: 'AJ',
  emoji: '👋',
  payPlan: 'pot',
  potFreq: 'monthly',
  potFreqLabel: 'month',
  potInstall: 517,
  potCount: 9,
  potDown: 520,
  potBalance: 4680,
  potTotalToday: 545,
  methodSaved: true,
  methodType: 'ach',
  insAccepted: true,
  insPremium: 162,
  insState: 'CO',
  authPayers: [{first:'Janet', last:'Johnson', email:'janet.johnson@email.com', pct:null}],
  commsEmail: 'alex.johnson@student.claude.edu',
  commsPhone: '(720) 555-0198',
  smsMarketing: false,
  apActive: true,
  hasPhone: true,
  secQsDeferred: false,
  insDeferred: false,
  payDeferred: false,
  skippedInvite: false,
  skippedMethod: false,
  tfa: 'sms',
  payer: 'me',
  // No balanceCard set → legacy fallback mode
};

// ─── Shared UI components ─────────────────────────────────────────────────
const Btn = ({children, onClick, className='', disabled=false, variant='primary', 'aria-label':ariaLabel}) => {
  const base = 'w-full py-3.5 rounded-hz-pill font-semibold text-[15px] transition-all active:scale-[0.97] ';
  const v = { primary:'bg-hz-indigo text-white hover:opacity-90', ghost:'bg-hz-cloud text-hz-indigo hover:opacity-90', outline:'border border-[rgba(100,92,220,0.3)] text-hz-indigo hover:bg-hz-cloud', danger:'bg-hz-danger text-white hover:opacity-90', success:'bg-hz-teal text-white hover:opacity-90' };
  return <button onClick={onClick} disabled={disabled} aria-label={ariaLabel} className={base+(v[variant]||v.primary)+' '+className+(disabled?' opacity-40 cursor-not-allowed':'')}>{children}</button>;
};

const Input = ({label, id, value, onChange, type='text', placeholder='', error='', hint='', className=''}) => {
  const inputId = id || (label ? label.toLowerCase().replace(/\s+/g,'-') : undefined);
  return (
    <div className={'mb-4 '+className}>
      {label && <label htmlFor={inputId} className="block text-xs font-semibold text-hz-muted mb-1">{label}</label>}
      <input id={inputId} type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        className={'w-full bg-white border rounded-hz-sm px-4 py-3 text-hz-text placeholder-hz-hint text-[15px] outline-none focus:border-hz-accent transition-colors '+(error?'border-hz-danger':'border-[rgba(100,92,220,0.14)]')} />
      {error && <p className="text-hz-danger text-xs mt-1" role="alert">{error}</p>}
      {hint && <p className="text-hz-hint text-xs mt-1">{hint}</p>}
    </div>
  );
};

const Card = ({children, className=''}) => <div className={'bg-hz-card border border-[rgba(100,92,220,0.14)] rounded-hz p-4 '+className}>{children}</div>;
const Divider = () => <div className="border-t border-[rgba(100,92,220,0.1)] my-3"/>;
const Row = ({label, value, sub, bold=false}) => (
  <div className="flex justify-between items-start py-1.5">
    <span className={'text-[13px] '+(bold?'text-hz-text font-semibold':'text-hz-muted')}>{label}</span>
    <div className="text-right"><span className={'text-[13px] '+(bold?'text-hz-text font-semibold':'text-hz-text')}>{value}</span>{sub && <p className="text-hz-hint text-[11px]">{sub}</p>}</div>
  </div>
);
const Badge = ({children, color='blue'}) => {
  const c = { blue:'bg-hz-cloud text-hz-indigo', green:'bg-hz-teal-bg text-hz-teal', amber:'bg-hz-amber-bg text-hz-amber', red:'bg-hz-danger-bg text-hz-danger' };
  return <span className={'inline-block px-2 py-0.5 rounded-hz-pill text-[11px] font-semibold '+(c[color]||c.blue)}>{children}</span>;
};
const Toggle = ({on, onChange, 'aria-label':ariaLabel}) => (
  <button onClick={()=>onChange(!on)} role="switch" aria-checked={on} aria-label={ariaLabel}
    className={'relative w-12 h-7 rounded-full transition-colors '+(on?'bg-hz-teal':'bg-[rgba(100,92,220,0.2)]')}>
    <span aria-hidden="true" className={'absolute top-1 w-5 h-5 bg-white rounded-full shadow transition-all '+(on?'left-6':'left-1')}/>
  </button>
);
const RadioCard = ({selected, onClick, children, className='', 'aria-label':ariaLabel}) => (
  <button onClick={onClick} aria-pressed={selected} aria-label={ariaLabel}
    className={'w-full text-left p-4 rounded-hz border transition-all mb-3 '+(selected?'border-hz-accent bg-hz-cloud':'border-[rgba(100,92,220,0.14)] bg-hz-card hover:border-hz-accent/40')+' '+className}>
    <div className="flex items-start gap-3">
      <div aria-hidden="true" className={'mt-0.5 w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 '+(selected?'border-hz-indigo':'border-hz-hint')}>
        {selected && <div className="w-2.5 h-2.5 rounded-full bg-hz-indigo"/>}
      </div>
      <div className="flex-1">{children}</div>
    </div>
  </button>
);
const ChevronLeft = () => <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"/></svg>;
const BrowserBar = () => (
  <div className="bg-[#F1F3F4] border-b border-gray-200 px-3 py-1.5 flex items-center gap-1.5 flex-shrink-0">
    <svg aria-hidden="true" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#34A853" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <span className="text-[10px] text-gray-500 flex-1 text-center font-medium">pay.claude.edu</span>
  </div>
);
const PortalHeader = ({onAccountClick, showAccount=false}) => (
  <div className="bg-hz-indigo px-4 py-2 flex items-center justify-between flex-shrink-0">
    <div className="flex items-center gap-2">
      <div className="w-6 h-6 rounded-md bg-white/25 flex items-center justify-center"><span className="text-white font-black text-[11px]">CU</span></div>
      <span className="text-[13px] font-semibold text-white">Claude University</span>
    </div>
    {showAccount && <button onClick={onAccountClick} aria-label="Go to account settings" className="flex flex-col items-center gap-0.5 group"><div className="w-7 h-7 rounded-full bg-white/20 border border-white/30 flex items-center justify-center text-[11px] font-bold text-white group-hover:bg-white/30 transition-colors">AJ</div><span className="text-[8px] text-white/60 font-medium uppercase tracking-wide">Account</span></button>}
  </div>
);
const ScreenWrap = ({children, portal=true}) => (
  <div className="flex flex-col h-full overflow-hidden bg-hz-bg">
    {portal && <BrowserBar/>}
    {portal && <PortalHeader/>}
    <div className="flex-1 overflow-y-auto">{children}</div>
  </div>
);
const Header = ({title, onBack, right}) => (
  <div className="sticky top-0 bg-hz-card border-b border-[rgba(100,92,220,0.1)] px-2 py-2.5 flex items-center gap-1 z-10">
    {onBack && <button onClick={onBack} aria-label="Go back" className="flex items-center gap-0.5 text-hz-muted text-[12px] font-medium px-2 py-1.5 rounded-hz-sm hover:text-hz-indigo hover:bg-hz-cloud transition-colors flex-shrink-0"><ChevronLeft/><span className="sr-only">Back</span></button>}
    <p className="text-[15px] font-semibold text-hz-text flex-1 px-1">{title}</p>
    {right}
  </div>
);

// ─── HomeScreen ───────────────────────────────────────────────────────────
const HomeScreen = ({nav, goBack, S, setS}) => {
  // ── NEW: scenario-driven fields (from S) ──────────────────────────────────
  const bc       = S.balanceCard || null;
  const todos    = S.todos || [];
  const recent   = S.recentActivity || null;
  const upcoming = S.upcomingPayments || null;

  // ── LEGACY fallback (when bc not set — e.g. consumer-home.html default) ───
  const netBalance  = BALANCE_DUE;
  const paidFull    = !bc && S.payPlan === 'full';
  const potPaidDown = !bc && S.payPlan === 'pot' ? (S.potDown || POT_DOWN) : 0;
  const onPlan      = !bc && S.payPlan === 'pot' ? (S.potBalance || Math.max(0, netBalance - potPaidDown)) : 0;
  const openBal     = !bc ? (paidFull ? 0 : Math.max(0, netBalance - potPaidDown - onPlan)) : 0;
  const planPct     = !bc && netBalance > 0 ? Math.round(onPlan / netBalance * 100) : 0;
  const openPct     = !bc && netBalance > 0 ? Math.max(0, 100 - planPct) : 0;

  // Legacy to-dos (when S.todos not set)
  const legacyTodos = [];
  if (!bc) {
    if (openBal > 0 && !paidFull && S.payPlan !== 'later')
      legacyTodos.push({id:'open-bal', icon:'⚡', color:'blue', title:'Open balance needs attention', sub:`${fmt(openBal)} hasn't been paid or scheduled to be paid yet`, screen:'howpay', cta:'Address now'});
    if (S.payPlan === 'later')
      legacyTodos.push({id:'scheduled', icon:'📅', color:'blue', title:'Payment scheduled', sub:`${fmt(BALANCE_DUE)} scheduled before May 1`, screen:'pay-now', cta:'View details'});
    if (S.secQsDeferred)
      legacyTodos.push({id:'sec-q', icon:'🔒', color:'blue', title:'Set up security questions', sub:'Required if you ever need to verify yourself by phone with support', screen:'security-questions', cta:'Complete now'});
    if (S.insDeferred)
      legacyTodos.push({id:'ins', icon:'🛡️', color:'blue', title:'Review tuition protection', sub:'You deferred your insurance decision — a deadline may apply', screen:'insurance', cta:'Review now'});
    if (S.payDeferred)
      legacyTodos.push({id:'pay', icon:'💳', color:'blue', title:'Complete payment setup', sub:"You haven't decided how you'll pay your balance yet", screen:'howpay', cta:'Set up now'});
  }
  const activeTodos = todos.length > 0 ? todos : legacyTodos;

  // Legacy upcoming (when S.upcomingPayments not set)
  const legacyUpcoming = [];
  if (!bc) {
    if (S.payPlan === 'pot' && S.potInstall)
      legacyUpcoming.push({date:'May 10, 2026', amount:S.potInstall, label:'Payment plan installment', note:'Auto-pay'});
    if (S.payPlan === 'later')
      legacyUpcoming.push({date:'Apr 30, 2026', amount:BALANCE_DUE, label:'Scheduled payment'});
  }
  const activeUpcoming = upcoming || legacyUpcoming;

  // Legacy recent activity (when S.recentActivity not set)
  const legacyRecent = [];
  if (!bc) {
    legacyRecent.push({date:'Apr 15', text:'Pell Grant ($1,100) applied to your account', type:'aid'});
    legacyRecent.push({date:'Apr 15', text:'Anticipated federal loan ($1,000) reflected in balance', type:'aid'});
    if (S.insAccepted && S.insPremium) legacyRecent.push({date:'Today', text:`GradGuard tuition insurance premium ${fmt(S.insPremium)} paid — coverage active`, type:'account'});
    legacyRecent.push({date:'Today', text:'Account setup complete — all steps finished', type:'account'});
    if (S.authPayers?.length > 0)
      S.authPayers.forEach(p=>legacyRecent.push({date:'Today', text:`Invite sent to ${p.first} ${p.last} (${p.email})`, type:'account'}));
  }
  const activeRecent = recent || legacyRecent;

  // ── Balance card renderer ─────────────────────────────────────────────────
  const renderBalanceCard = () => {
    if (!bc) {
      // Legacy card (existing behavior)
      return (
        <Card className="p-0 overflow-hidden">
          {paidFull ? (
            <div className="px-5 py-4 flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-hz-teal-bg flex items-center justify-center text-xl flex-shrink-0" aria-hidden="true">✅</div>
              <div><p className="text-[16px] font-bold text-hz-teal">Paid in full</p><p className="text-[12px] text-hz-muted mt-0.5">No outstanding balance. Nice work!</p></div>
            </div>
          ) : (
            <div className="px-5 pt-5 pb-4 space-y-4">
              <div>
                <div className="flex items-baseline justify-between">
                  <span className="text-[28px] font-bold text-hz-text leading-none tracking-tight">{fmt(openBal)}</span>
                  <span className="text-[11px] font-semibold uppercase tracking-widest text-hz-hint">Open balance</span>
                </div>
                <p className="text-[12px] text-hz-hint mt-1">Hasn't been paid or scheduled to be paid yet</p>
              </div>
              {S.payPlan === 'pot' && (
                <div className="flex items-center justify-between bg-hz-teal-bg/60 rounded-hz-sm px-3 py-2.5">
                  <div><p className="text-[12px] font-medium text-hz-teal">On payment plan</p><p className="text-[11px] text-hz-hint mt-0.5">Next {fmt(S.potInstall)} · autopay</p></div>
                  <p className="text-[15px] font-bold text-hz-teal">{fmt(onPlan)}</p>
                </div>
              )}
              <div className="space-y-2">
                <div className="flex items-center justify-between"><span className="text-[11px] text-hz-hint">Total balance</span><span className="text-[12px] font-semibold text-hz-text">{fmt(netBalance)}</span></div>
                <div className="w-full h-1.5 rounded-full overflow-hidden flex bg-[rgba(100,92,220,0.08)]">
                  {planPct > 0 && <div style={{width:planPct+'%'}} className="bg-hz-teal h-full rounded-l-full"/>}
                  {openPct > 0 && <div style={{width:openPct+'%'}} className={`bg-hz-accent/50 h-full ${planPct===0?'rounded-full':'rounded-r-full'}`}/>}
                </div>
                <div className="flex gap-3">
                  {planPct > 0 && <span className="flex items-center gap-1 text-[10px] text-hz-hint"><span className="w-2 h-2 rounded-full bg-hz-teal inline-block"/>On plan</span>}
                  {openPct > 0 && <span className="flex items-center gap-1 text-[10px] text-hz-hint"><span className="w-2 h-2 rounded-full bg-hz-accent/50 inline-block"/>Open</span>}
                </div>
              </div>
            </div>
          )}
          <div className="px-5 pb-4">
            <button onClick={()=>nav('costs')} className="w-full flex items-center justify-center py-2 rounded-full border border-[rgba(100,92,220,0.2)] text-[12px] font-semibold text-hz-indigo hover:bg-hz-cloud transition-colors">View full statement</button>
          </div>
        </Card>
      );
    }

    const mode = bc.mode;

    // ── Credit balance ────────────────────────────────────────────────────────
    if (mode === 'credit') return (
      <Card className="p-0 overflow-hidden">
        <div className="px-5 pt-5 pb-2 space-y-3">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-full bg-hz-teal-bg flex items-center justify-center text-xl flex-shrink-0" aria-hidden="true">✅</div>
            <div>
              <p className="text-[15px] font-bold text-hz-teal">Credit Balance</p>
              <p className="text-[12px] text-hz-muted mt-0.5">You've paid more than your charges</p>
            </div>
          </div>
          <div className="flex items-baseline justify-between">
            <span className="text-[28px] font-bold text-hz-teal leading-none tracking-tight">−{fmt(bc.creditAmount)}</span>
            <span className="text-[11px] font-semibold uppercase tracking-widest text-hz-teal">Credit</span>
          </div>
          <div className="bg-hz-teal-bg/60 rounded-hz-sm px-3 py-3 space-y-2">
            <div className="flex justify-between text-[12px]">
              <span className="text-hz-muted">Refund processing</span>
              <span className="font-semibold text-hz-teal">{fmt(bc.refundPending)}</span>
            </div>
            {bc.refundExpectedDate && <div className="flex justify-between text-[12px]"><span className="text-hz-muted">Expected by</span><span className="font-semibold text-hz-text">{bc.refundExpectedDate}</span></div>}
            {bc.refundIssued > 0 && <div className="flex justify-between text-[12px]"><span className="text-hz-muted">Already issued</span><span className="font-semibold text-hz-text">{fmt(bc.refundIssued)}</span></div>}
          </div>
        </div>
        <div className="px-5 pb-4 pt-3">
          <button onClick={()=>nav('costs')} className="w-full flex items-center justify-center py-2 rounded-full border border-[rgba(100,92,220,0.2)] text-[12px] font-semibold text-hz-indigo hover:bg-hz-cloud transition-colors">View full statement</button>
        </div>
      </Card>
    );

    // ── Defaulted plan ────────────────────────────────────────────────────────
    if (mode === 'defaulted') return (
      <Card className="p-0 overflow-hidden border-hz-danger/30">
        <div className="bg-hz-danger-bg/60 px-4 py-2.5 flex items-center gap-2 border-b border-hz-danger/20">
          <span className="text-hz-danger text-sm" aria-hidden="true">⚠️</span>
          <p className="text-[12px] font-bold text-hz-danger uppercase tracking-wide">Payment Plan Defaulted</p>
          {bc.defaultDate && <span className="ml-auto text-[10px] text-hz-danger/70">{bc.defaultDate}</span>}
        </div>
        <div className="px-5 pt-4 pb-2 space-y-3">
          <div>
            <div className="flex items-baseline justify-between">
              <span className="text-[28px] font-bold text-hz-danger leading-none tracking-tight">{fmt(bc.pastDueAmount)}</span>
              <span className="text-[11px] font-semibold uppercase tracking-widest text-hz-danger">Past Due</span>
            </div>
            <p className="text-[12px] text-hz-muted mt-1">Full balance now immediately due per default terms</p>
          </div>
          {bc.futureDueAmount > 0 && (
            <div className="flex items-center justify-between bg-hz-amber-bg/60 rounded-hz-sm px-3 py-2.5">
              <div><p className="text-[12px] font-medium text-hz-text">Future charges</p><p className="text-[11px] text-hz-hint mt-0.5">Due {bc.futureDueDate}</p></div>
              <p className="text-[14px] font-bold text-hz-text">{fmt(bc.futureDueAmount)}</p>
            </div>
          )}
          {bc.registrationHold && (
            <div className="flex items-center gap-2 bg-hz-danger-bg/40 rounded-hz-sm px-3 py-2 border border-hz-danger/20">
              <span className="text-hz-danger text-sm" aria-hidden="true">🔒</span>
              <p className="text-[11px] font-semibold text-hz-danger">Registration hold is active</p>
            </div>
          )}
          <div className="flex items-center justify-between pt-1">
            <span className="text-[11px] text-hz-hint">Total balance</span>
            <span className="text-[12px] font-semibold text-hz-text">{fmt(bc.totalBalance)}</span>
          </div>
        </div>
        <div className="px-5 pb-4 pt-2">
          <button onClick={()=>nav('costs')} className="w-full flex items-center justify-center py-2 rounded-full border border-[rgba(100,92,220,0.2)] text-[12px] font-semibold text-hz-indigo hover:bg-hz-cloud transition-colors">View full statement</button>
        </div>
      </Card>
    );

    // ── Past due (mixed) ──────────────────────────────────────────────────────
    if (mode === 'past-due') return (
      <Card className="p-0 overflow-hidden">
        <div className="bg-hz-amber-bg/60 px-4 py-2.5 flex items-center gap-2 border-b border-hz-amber/20">
          <span className="text-hz-amber text-sm" aria-hidden="true">⚠️</span>
          <p className="text-[12px] font-bold text-hz-amber uppercase tracking-wide">Past Due Balance</p>
        </div>
        <div className="px-5 pt-4 pb-2 space-y-3">
          <div>
            <div className="flex items-baseline justify-between">
              <span className="text-[28px] font-bold text-hz-amber leading-none tracking-tight">{fmt(bc.pastDueAmount)}</span>
              <span className="text-[11px] font-semibold uppercase tracking-widest text-hz-amber">Past Due</span>
            </div>
            {bc.pastDueDescription && <p className="text-[12px] text-hz-muted mt-1">{bc.pastDueDescription}</p>}
          </div>
          <div className="divide-y divide-[rgba(100,92,220,0.07)] space-y-0">
            {bc.currentDueAmount > 0 && (
              <div className="flex items-center justify-between py-2">
                <div><p className="text-[12px] text-hz-muted">Also due</p><p className="text-[10px] text-hz-hint">{bc.currentDueDate}</p></div>
                <span className="text-[13px] font-semibold text-hz-text">{fmt(bc.currentDueAmount)}</span>
              </div>
            )}
            {bc.immediateDueAmount > 0 && (
              <div className="flex items-center justify-between py-2">
                <p className="text-[12px] text-hz-muted">Due immediately</p>

            {qaItems.map(a=>(

        </div>

      </div>
    </ScreenWrap>
  );

const PayNextScreen = ({nav, goBack, S, setS}) => {
  const [method, setMethod] = React.useState(S.methodSaved?'saved':'ach');
  const [routing, setRouting] = React.useState('');
  const [acct, setAcct] = React.useState('');

  const amount = S.potInstall || 517;
  const canPay = method==='saved' || (routing.length>=9 && acct.length>=8);

  const handlePay = () => {
    if (!S.methodSaved && routing && acct) setS(p=>({...p,methodSaved:true}));
    setDone(true);
  };

  if (done) return (
    <ScreenWrap>
      <div className="flex flex-col items-center justify-center px-8 text-center py-8">

        <p className="text-hz-muted text-[13px] mb-6">{fmt(amount)} installment payment submitted successfully.</p>
        <Btn onClick={()=>nav('manage-pot')}>Return to Plan</Btn>
      </div>
    </ScreenWrap>
  );

  return (
    <ScreenWrap>
      <Header title="Pay Next Installment" onBack={goBack}/>
      <div className="px-5 pb-8">
        <Card className="mb-5">
          <Row label="Next installment" value={fmt(amount)} bold/>
          <Row label="Due date" value="May 10, 2026"/>
          <Row label="Remaining after payment" value={fmt(Math.max(0, POT_BALANCE-amount))}/>
        </Card>
        <p className="text-[13px] font-semibold text-hz-text mb-3">Payment Method</p>
        {S.methodSaved ? (
          <>
            <RadioCard selected={method==='saved'} onClick={()=>setMethod('saved')} aria-label="Use saved checking account ending 4521">
              <div className="flex items-center gap-3">

            </RadioCard>
            <RadioCard selected={method==='new'} onClick={()=>setMethod('new')} aria-label="Use a different payment method">
              <p className="text-[13px] text-hz-text">Use different method</p>

        {(method==='new' || !S.methodSaved) && (

    {date:'Oct 1', text:'Scholarship credit — $100.00 applied to your account', type:'aid'},
    {date:'Sep 10', text:'Returned payment fee — $50.00 charged', type:'alert'},
    {date:'Sep 1', text:'Financial Aid disbursement — $500.00 applied to your account', type:'aid'},
    {date:'Aug 25', text:'Study Abroad deposit — $1,000.00 (no due date assigned)', type:'balance'},
    {date:'Aug 20', text:'Housing Fall Semester — $2,800.00 charged', type:'balance'},
    {date:'Aug 15', text:'Fall Tuition and Technology Fee — $6,700.00 charged', type:'balance'},
  ],
};

// ─── App ──────────────────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = React.useState('home');
  const [S, setS] = React.useState(SCENARIO_STATE);
  const navStack = React.useRef([]);
  const nav    = (s) => { navStack.current.push(screen); setScreen(s); };
  const goBack = () => { const p = navStack.current.pop(); if (p) setScreen(p); };

  const screens = {
    'home':                <HomeScreen          nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'costs':               <CostsScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'print':               <PrintScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-now':             <PayNowScreen        nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'manage-ap':           <ManageAPScreen      nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'ap-pot':              <APPotScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'guest':               <GuestScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'manage-pot':          <ManagePotScreen     nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'change-dates-ob':     <ChangeDatesScreen   nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'change-autopay-ob':   <ChangeAutopayScreen nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-next-ob':         <PayNextScreen       nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'history':             <HistoryScreen       nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'account-details':     <AccountDetailsScreen nav={nav} goBack={goBack} S={S} setS={setS}/>,
  };

  const SCREEN_OPTIONS = [
    {v:'home',              l:'Home'},
    {v:'costs',             l:'View bill'},
    {v:'print',             l:'Print statement'},
    {v:'pay-now',           l:'Make a payment'},
    {v:'guest',             l:'Guest payment link'},
    {v:'manage-ap',         l:'Manage authorized parties'},
    {v:'ap-pot',            l:'AP pay over time plans'},
    {v:'manage-pot',        l:'Manage my plan'},
    {v:'change-dates-ob',   l:'Change payment dates'},
    {v:'change-autopay-ob', l:'Change autopay'},
    {v:'pay-next-ob',       l:'Pay next installment'},
    {v:'history',           l:'Payment history'},
    {v:'account-details',   l:'Account details'},
  ];

  return (
    <div className="min-h-screen bg-hz-bg flex items-center justify-center font-sans p-4">
      {/* Back to index link */}
      <a href="index.html" aria-label="Back to index"
        className="fixed top-4 left-4 z-50 bg-hz-card hover:bg-hz-cloud border border-[rgba(100,92,220,0.2)] text-hz-indigo text-[13px] font-medium px-3 py-2 rounded-hz-sm transition-colors shadow-sm">
        ← Back to index
      </a>

      {/* Screen selector (dev helper) */}
      <div className="fixed top-4 right-4 z-50">
        <label htmlFor="screen-jump" className="sr-only">Jump to screen</label>
        <div className="relative">
          <select id="screen-jump" value={screen} onChange={e => { navStack.current = []; setScreen(e.target.value); }}
            className="appearance-none bg-hz-card border border-[rgba(100,92,220,0.2)] text-hz-text text-[11px] rounded-hz-sm pl-2.5 pr-7 py-1.5 shadow-sm outline-none focus:border-hz-accent focus:ring-2 focus:ring-hz-accent/20 max-w-[220px] cursor-pointer transition-colors hover:border-hz-accent/50 font-medium"
            title="Jump to screen">
            <optgroup label="── 5b · Past Due + Mixed Due Dates">
              {SCREEN_OPTIONS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </optgroup>
          </select>
          <div className="pointer-events-none absolute inset-y-0 right-2 flex items-center">
            <svg width="11" height="11" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M3 5l4 4 4-4" stroke="#645CDC" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
        </div>
      </div>

      {/* Phone frame */}
      <div className="relative w-[390px] h-[844px] bg-hz-card overflow-hidden rounded-[44px] shadow-2xl border border-[rgba(100,92,220,0.18)] flex-shrink-0">
        {/* Notch */}
        <div aria-hidden="true" className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-7 bg-black rounded-b-2xl z-30"/>
        {/* Screen content */}
        <div className="absolute inset-0 pt-7">
          {screens[screen] || screens['home']}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
