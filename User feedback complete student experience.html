<div id="root"></div>
<script type="text/babel">

// ─── Financial constants ───────────────────────────────────────────────────
const TOTAL_CHARGES  = 8500;
const APPLIED_AID    = 2300;
const ANTICIPATED_AID= 1000;
const BALANCE_DUE    = 5200;
const POT_DOWN       = 520;
const NELNET_FEE     = 25;
const POT_DOWN_TOTAL = 545;
const POT_BALANCE    = 4655;
const TAKEN_USERNAMES= ['ajohnson2024','bmurphy','csmith2023','djones','ejackson'];

const fmt  = (n) => '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK = (n) => '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits:0});

// ─── Shared UI helpers ────────────────────────────────────────────────────
const Btn = ({children, onClick, className='', disabled=false, variant='primary', 'aria-label':ariaLabel}) => {
  const base = 'w-full py-3.5 rounded-hz-pill font-semibold text-[15px] transition-all active:scale-[0.97] ';
  const v = {
    primary: 'bg-hz-indigo text-white hover:opacity-90',
    ghost:   'bg-hz-cloud text-hz-indigo hover:opacity-90',
    outline: 'border border-[rgba(100,92,220,0.3)] text-hz-indigo hover:bg-hz-cloud',
    danger:  'bg-hz-danger text-white hover:opacity-90',
    success: 'bg-hz-teal text-white hover:opacity-90',
  };
  return (
    <button onClick={onClick} disabled={disabled} aria-label={ariaLabel}
      className={base + (v[variant]||v.primary) + ' ' + className + (disabled?' opacity-40 cursor-not-allowed':'')}>
      {children}
    </button>
  );
};

const Input = ({label, id, value, onChange, type='text', placeholder='', error='', hint='', className=''}) => {
  const inputId = id || (label ? label.toLowerCase().replace(/\s+/g,'-') : undefined);
  return (
    <div className={'mb-4 '+className}>
      {label && <label htmlFor={inputId} className="block text-xs font-semibold text-hz-muted mb-1">{label}</label>}
      <input id={inputId} type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        className={'w-full bg-white border rounded-hz-sm px-4 py-3 text-hz-text placeholder-hz-hint text-[15px] outline-none focus:border-hz-accent transition-colors '+(error?'border-hz-danger':'border-[rgba(100,92,220,0.14)]')} />
      {error && <p className="text-hz-danger text-xs mt-1" role="alert">{error}</p>}
      {hint  && <p className="text-hz-hint text-xs mt-1">{hint}</p>}
    </div>
  );
};

const Select = ({label, id, value, onChange, options, className=''}) => {
  const selectId = id || (label ? label.toLowerCase().replace(/\s+/g,'-') : undefined);
  return (
    <div className={'mb-4 '+className}>
      {label && <label htmlFor={selectId} className="block text-xs font-semibold text-hz-muted mb-1">{label}</label>}
      <div className="relative">
        <select id={selectId} value={value} onChange={e=>onChange(e.target.value)}
          className="w-full bg-hz-card border border-[rgba(100,92,220,0.2)] rounded-hz-sm px-4 py-3 pr-10 text-hz-text text-[14px] font-medium outline-none focus:border-hz-accent focus:ring-2 focus:ring-hz-accent/20 appearance-none cursor-pointer transition-colors">
          {options.map(o => <option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
        </select>
        <div className="pointer-events-none absolute inset-y-0 right-3 flex items-center">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M3 5l4 4 4-4" stroke="#645CDC" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
  );
};

const Card = ({children, className=''}) => (
  <div className={'bg-hz-card border border-[rgba(100,92,220,0.14)] rounded-hz p-4 '+className}>{children}</div>
);

const Divider = () => <div className="border-t border-[rgba(100,92,220,0.1)] my-3"/>;

const Row = ({label, value, sub, bold=false}) => (
  <div className="flex justify-between items-start py-1.5">
    <span className={'text-[13px] '+(bold?'text-hz-text font-semibold':'text-hz-muted')}>{label}</span>
    <div className="text-right">
      <span className={'text-[13px] '+(bold?'text-hz-text font-semibold':'text-hz-text')}>{value}</span>
      {sub && <p className="text-hz-hint text-[11px]">{sub}</p>}
    </div>
  </div>
);

const Badge = ({children, color='blue'}) => {
  const c = {
    blue:   'bg-hz-cloud text-hz-indigo',
    green:  'bg-hz-teal-bg text-hz-teal',
    amber:  'bg-hz-amber-bg text-hz-amber',
    red:    'bg-hz-danger-bg text-hz-danger',
    purple: 'bg-hz-cloud text-hz-accent',
  };
  return <span className={'inline-block px-2 py-0.5 rounded-hz-pill text-[11px] font-semibold '+(c[color]||c.blue)}>{children}</span>;
};

const Toggle = ({on, onChange, 'aria-label':ariaLabel}) => (
  <button onClick={()=>onChange(!on)} role="switch" aria-checked={on} aria-label={ariaLabel}
    className={'relative w-12 h-7 rounded-full transition-colors '+(on?'bg-hz-teal':'bg-[rgba(100,92,220,0.2)]')}>
    <span aria-hidden="true" className={'absolute top-1 w-5 h-5 bg-white rounded-full shadow transition-all '+(on?'left-6':'left-1')}/>
  </button>
);

const RadioCard = ({selected, onClick, children, className='', 'aria-label':ariaLabel}) => (
  <button onClick={onClick} aria-pressed={selected} aria-label={ariaLabel}
    className={'w-full text-left p-4 rounded-hz border transition-all mb-3 '+(selected?'border-hz-accent bg-hz-cloud':'border-[rgba(100,92,220,0.14)] bg-hz-card hover:border-hz-accent/40')+' '+className}>
    <div className="flex items-start gap-3">
      <div aria-hidden="true" className={'mt-0.5 w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 '+(selected?'border-hz-indigo':'border-hz-hint')}>
        {selected && <div className="w-2.5 h-2.5 rounded-full bg-hz-indigo"/>}
      </div>
      <div className="flex-1">{children}</div>
    </div>
  </button>
);

// ─── Web-within-phone chrome ──────────────────────────────────────────────
const BrowserBar = () => (
  <div className="bg-[#F1F3F4] border-b border-gray-200 px-3 py-1.5 flex items-center gap-1.5 flex-shrink-0">
    <svg aria-hidden="true" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#34A853" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <span className="text-[10px] text-gray-500 flex-1 text-center font-medium">pay.claude.edu</span>
  </div>
);

const PortalHeader = ({onAccountClick, showAccount=false}) => (
  <div className="bg-hz-indigo px-4 py-2 flex items-center justify-between flex-shrink-0">
    <div className="flex items-center gap-2">
      <div className="w-6 h-6 rounded-md bg-white/25 flex items-center justify-center">
        <span className="text-white font-black text-[11px]">CU</span>
      </div>
      <span className="text-[13px] font-semibold text-white">Claude University</span>
    </div>
    {showAccount && (
      <button onClick={onAccountClick} aria-label="Go to account settings"
        className="flex flex-col items-center gap-0.5 group">
        <div className="w-7 h-7 rounded-full bg-white/20 border border-white/30 flex items-center justify-center text-[11px] font-bold text-white group-hover:bg-white/30 transition-colors">AJ</div>
        <span className="text-[8px] text-white/60 font-medium uppercase tracking-wide">Account</span>
      </button>
    )}

);

const ScreenWrap = ({children, portal=true, showAccount=false, onAccountClick}) => (
  <div className="flex flex-col h-full overflow-hidden bg-hz-bg">
    {portal && <BrowserBar/>}
    {portal && <PortalHeader showAccount={showAccount} onAccountClick={onAccountClick}/>}
    <div className="flex-1 overflow-y-auto">
      {children}
    </div>
  </div>
);

const Header = ({title, onBack, right}) => (
  <div className="sticky top-0 bg-hz-card border-b border-[rgba(100,92,220,0.1)] px-4 py-3 flex items-center gap-3 z-10">
    {onBack && (
      <button onClick={onBack} aria-label="Go back"
        className="w-8 h-8 rounded-lg bg-hz-cloud flex items-center justify-center text-hz-indigo flex-shrink-0">
        <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    )}
    <p className="text-[15px] font-semibold text-hz-text flex-1">{title}</p>
    {right}
  </div>
);

// ─── Step progress bar ───────────────────────────────────────────────────
const STEP_LABELS = [
  'Agreements',
  'Security',
  "Who's Paying",
  'Insurance',
  'Payment',
  'Comms',
];

const StepBar = ({current, total=6}) => (
  <div className="bg-hz-card border-b border-[rgba(100,92,220,0.08)] px-4 py-2.5">
    <div className="flex items-center gap-1 mb-1.5">
      {Array.from({length:total}).map((_,i)=>{
        const done = i < current-1;
        const active = i === current-1;
        return (
          <React.Fragment key={i}>
            <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0
              ${done ? 'bg-hz-teal text-white' : active ? 'bg-hz-indigo text-white' : 'bg-hz-cloud text-hz-hint'}`}
              aria-label={`Step ${i+1} ${done?'completed':active?'current':'upcoming'}: ${STEP_LABELS[i]}`}>
              {done ? '✓' : i+1}
            </div>
            {i < total-1 && (
              <div className={`flex-1 h-0.5 ${i < current-1 ? 'bg-hz-teal' : 'bg-hz-cloud'}`} aria-hidden="true"/>
            )}
          </React.Fragment>
        );
      })}
    </div>
    <p className="text-[11px] text-hz-hint">Step {current} of {total} — <span className="text-hz-indigo font-semibold">{STEP_LABELS[current-1]}</span></p>
  </div>
);

const Toast = ({msg, show}) => (
  <div role="status" aria-live="polite"
    className={'fixed bottom-8 left-1/2 -translate-x-1/2 bg-hz-text text-white px-5 py-3 rounded-hz text-sm font-semibold shadow-xl transition-all duration-300 z-50 '+(show?'opacity-100 translate-y-0':'opacity-0 translate-y-4 pointer-events-none')}>
    {msg}
  </div>
);

// ─── ProtoIntroScreen ────────────────────────────────────────────────────
const ProtoIntroScreen = ({nav}) => (
  <ScreenWrap portal={false}>
  <div className="flex flex-col px-6 py-12 h-full">
    <div className="flex-1 flex flex-col justify-center">
      <div className="mb-6">
        <span className="text-[11px] font-bold tracking-widest uppercase text-hz-accent">Prototype</span>
      </div>
      <h1 className="text-2xl font-bold text-hz-text mb-4 leading-snug">Student Onboarding<br/>Complete Experience</h1>
      <p className="text-hz-muted text-[14px] leading-relaxed mb-6">
        You are a first-year student at <strong className="text-hz-text">Claude University</strong> receiving your first bill for Fall semester.
        You'll review your balance and set up how you'd like to pay.
      </p>
      <Card className="mb-6">
        <p className="text-[13px] font-semibold text-hz-text mb-2">Your scenario:</p>
        <ul className="text-[13px] text-hz-muted space-y-1.5">
          <li>• Tuition + fees: <strong className="text-hz-text">$8,500</strong></li>
          <li>• Applied aid (merit + Pell): <strong className="text-hz-text">−$2,300</strong></li>
          <li>• Anticipated aid (loan): <strong className="text-hz-text">−$1,000</strong></li>
          <li>• Balance due: <strong className="text-hz-teal">$5,200</strong> by May 1</li>
        </ul>
      </Card>
      <p className="text-hz-hint text-[12px] mb-8">This prototype covers account setup through the post-enrollment home screen. Click through all 25 screens.</p>
    </div>
    <Btn onClick={()=>nav('welcome')} aria-label="Begin setup">I understand — begin setup →</Btn>
  </div>
  </ScreenWrap>
);


// ─── WelcomeScreen ───────────────────────────────────────────────────────
const WELCOME_STEPS = [
  { n:1, icon:'📋', label:'Agreements',       desc:'Review & sign university agreements' },
  { n:2, icon:'🔒', label:'Security',         desc:'Set up your account security questions' },
  { n:3, icon:'👥', label:"Who's Paying",     desc:'Tell us who will be making payments' },
  { n:4, icon:'🛡️', label:'Insurance',        desc:'Review your tuition insurance option' },
  { n:5, icon:'💳', label:'Payment',          desc:'Pay in full, set up a plan, or decide later' },
  { n:6, icon:'📬', label:'Communications',   desc:'Choose what we contact you about' },
];

const WelcomeScreen = ({nav, goBack, S, setS}) => (
  <ScreenWrap>
    <div className="flex flex-col px-6 py-6 h-full overflow-y-auto">
      {/* Hero */}
      <div className="flex flex-col items-center text-center mb-6">
        <div className="relative mb-4">
          <div aria-hidden="true" className="absolute inset-0 rounded-full bg-hz-cloud blur-2xl scale-150"/>
          <div className="relative w-16 h-16 rounded-full bg-hz-cloud border border-hz-accent/30 flex items-center justify-center text-3xl">
            <span aria-hidden="true">🎓</span>
          </div>
        </div>
        <p className="text-hz-muted text-xs font-semibold tracking-widest uppercase mb-1">Welcome to</p>
        <h1 className="text-[22px] font-bold text-hz-text mb-1">Claude University</h1>
        <p className="text-hz-muted text-[12px]">Student Account Portal</p>
      </div>

      {/* School message */}
      <div className="bg-hz-cloud border border-hz-accent/20 rounded-hz-sm px-4 py-3 mb-6 text-center">
        <p className="text-hz-muted text-[12px] leading-relaxed italic">
          Claude University uses this application to process all student account payments. You are amazing — we love having you at our university!
        </p>
      </div>

      {/* Step preview */}
      <p className="text-[10px] font-bold uppercase tracking-widest text-hz-hint mb-3">What you'll set up today</p>
      <div className="flex flex-col gap-2 mb-6">
        {WELCOME_STEPS.map(step => (
          <div key={step.n} className="flex items-center gap-3 bg-hz-card rounded-hz-sm px-3 py-2.5 border border-hz-border">
            <div className="w-7 h-7 rounded-full bg-hz-cloud flex items-center justify-center text-[11px] font-bold text-hz-indigo flex-shrink-0">
              {step.n}
            </div>
            <div className="flex-1 min-w-0">
              <p className="text-[12px] font-semibold text-hz-text leading-none mb-0.5">{step.label}</p>
              <p className="text-[11px] text-hz-hint truncate">{step.desc}</p>
            </div>
            <span aria-hidden="true" className="text-base">{step.icon}</span>
          </div>
        ))}
      </div>

      {/* CTA */}
      <div className="mt-auto">
        <Btn onClick={()=>nav('agreements')} aria-label="Get started with account setup">Get started →</Btn>
      </div>
    </div>
  </ScreenWrap>
);


// ─── AgreementsScreen ────────────────────────────────────────────────────
const AgreementsScreen = ({nav, goBack, S, setS}) => {
  const [acknowledged, setAcknowledged] = React.useState([false, false, false]);
  const [sig, setSig] = React.useState('');
  const [sigChecked, setSigChecked] = React.useState(false);
  const today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  const allAcknowledged = acknowledged.every(Boolean);
  const canSign = allAcknowledged && sig.trim().length > 2 && sigChecked;

  // Which step is currently active (first unchecked, or sign step if all checked)
  const activeStep = allAcknowledged ? 3 : acknowledged.findIndex(v => !v);

  const acknowledge = (i) => setAcknowledged(prev => prev.map((v,j) => j===i ? true : v));

  const agreements = [
    {
      id:'housing',
      title:'Housing & Dorm Damages',
      body:`I understand that as a resident or potential resident of Claude University housing, I am financially responsible for any damages to university property attributed to my occupancy or my guests. Any damage assessments will be billed directly to my student account and are subject to the same payment terms and deadlines as all other university charges. I have the right to appeal a damage charge within 10 business days of receiving notice.`,
    },
    {
      id:'financial',
      title:'Student Financial Agreement',
      body:`By enrolling at Claude University, I accept full financial responsibility for all tuition, fees, housing charges, and any other amounts assessed to my student account. I agree to pay all balances by the published due dates for each term. I understand that unpaid balances may result in account holds that restrict registration, transcript requests, and graduation. I acknowledge that financial aid awards, if any, are applied to my account as an estimate and may be adjusted; I remain responsible for any remaining balance regardless of financial aid status. Delinquent accounts may be referred to a collection agency and I may be responsible for collection costs.`,
    },
    {
      id:'insurance',
      title:'Health Insurance',
      body:`Claude University requires all enrolled students to maintain qualifying health insurance coverage. I understand that if I do not provide proof of comparable alternative coverage through the university's annual waiver process, the university's student health insurance plan will be automatically enrolled and billed to my student account each academic year. This charge is non-refundable after the published waiver deadline. I confirm that I have read and understand this policy.`,
    },
  ];

  return (
    <ScreenWrap>
      <StepBar current={1}/>
      <div className="px-4 pt-4 pb-24 space-y-3">
        <div className="mb-1">
          <p className="text-[18px] font-bold text-hz-text">School agreements</p>
          <p className="text-[13px] text-hz-muted mt-1">Read and acknowledge each agreement to continue. A single signature covers all three.</p>
        </div>

        {agreements.map((a, i) => {
          const done = acknowledged[i];
          const open = activeStep === i;
          const locked = !done && !open;
          return (
            <div key={a.id} className={`rounded-hz border overflow-hidden transition-all ${
              done    ? 'border-hz-teal/40 bg-hz-card'
              : open  ? 'border-hz-accent/40 bg-hz-card'
                      : 'border-[rgba(100,92,220,0.1)] bg-hz-card opacity-50'
            }`}>
              {/* Header row */}
              <div className={`px-4 py-3 flex items-center gap-3 ${
                done ? 'bg-[#E1F5EE]' : open ? 'bg-hz-cloud' : 'bg-hz-bg'
              }`}>
                <div className={`w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 text-[11px] font-bold ${
                  done ? 'bg-hz-teal text-white' : open ? 'bg-hz-indigo text-white' : 'bg-[rgba(100,92,220,0.15)] text-hz-hint'
                }`}>
                  {done ? '✓' : i+1}
                </div>
                <p className={`text-[13px] font-semibold flex-1 ${done ? 'text-hz-teal' : open ? 'text-hz-text' : 'text-hz-hint'}`}>
                  {a.title}
                </p>
                {done && <span className="text-[10px] font-bold uppercase tracking-wide text-hz-teal">Done</span>}
                {locked && <span className="text-[10px] font-bold uppercase tracking-wide text-hz-hint">Upcoming</span>}
              </div>

              {/* Body — only shown when open */}
              {open && (
                <div className="px-4 pt-3 pb-4 space-y-3">
                  <div className="max-h-32 overflow-y-auto pr-1">
                    <p className="text-[12px] text-hz-muted leading-relaxed">{a.body}</p>
                  </div>
                  <div className="flex items-start gap-2.5 pt-1">
                    <input
                      type="checkbox"
                      id={`ack-${a.id}`}
                      checked={false}
                      onChange={()=>acknowledge(i)}
                      aria-label={`I have read and acknowledge the ${a.title}`}
                      className="mt-0.5 w-4 h-4 accent-hz-indigo flex-shrink-0 cursor-pointer"
                    />
                    <label htmlFor={`ack-${a.id}`} className="text-[12px] text-hz-muted leading-relaxed cursor-pointer">
                      I have read and acknowledge this agreement.
                    </label>
                  </div>
                </div>
              )}
            </div>
          );
        })}

        {/* E-signature — only appears after all three are acknowledged */}
        {allAcknowledged && (
          <div className="bg-hz-card border border-[rgba(100,92,220,0.2)] rounded-hz px-4 py-4 space-y-3">
            <div className="flex items-center gap-2 mb-1">
              <span aria-hidden="true" className="text-base">✍️</span>
              <p className="text-[13px] font-semibold text-hz-text">Electronic Signature</p>
            </div>
            <p className="text-[12px] text-hz-muted leading-relaxed">
              By typing your full legal name below, you confirm you have read and agree to all three agreements above. Legally binding under the ESIGN Act and UETA.
            </p>
            <div>
              <label htmlFor="sig-input" className="text-[12px] font-semibold text-hz-text block mb-1.5">
                Full legal name <span aria-hidden="true" className="text-hz-danger">*</span>
              </label>
              <input
                id="sig-input"
                type="text"
                value={sig}
                onChange={e=>setSig(e.target.value)}
                placeholder="e.g. Alex Johnson"
                aria-required="true"
                aria-label="Type your full legal name to sign"

  const toggleShow = (i) => setShowA(prev=>prev.map((v,j)=>j===i?!v:v));

  const usedQs = qs.map(x=>x.q).filter(Boolean);
  const available = (idx) => SECURITY_QUESTIONS.filter(q=>!usedQs.includes(q)||q===qs[idx].q);

  return (
    <ScreenWrap>
      <StepBar current={2}/>
      <div className="px-4 pt-4 pb-24 space-y-4">

                <select
                  id={`q-select-${i}`}
                  value={item.q}
                  onChange={e=>setQ(i,e.target.value)}
                  aria-required="true"
                  className="w-full bg-hz-card border border-[rgba(100,92,220,0.2)] rounded-hz-sm px-3 py-2.5 pr-10 text-[13px] font-medium text-hz-text appearance-none cursor-pointer focus:outline-none focus:border-hz-accent focus:ring-2 focus:ring-hz-accent/20 transition-colors">
                  <option value="">Select a question…</option>

                <div className="pointer-events-none absolute inset-y-0 right-3 flex items-center">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                    <path d="M3 5l4 4 4-4" stroke="#645CDC" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>
              </div>
            </div>
            {item.q && (
              <div>
                <label htmlFor={`q-answer-${i}`} className="text-[12px] font-semibold text-hz-text block mb-1.5">Your answer</label>
                <input id={`q-answer-${i}`} type="text" value={item.a}
                  onChange={e=>setA(i,e.target.value)}
                  placeholder="Enter your answer"
                  aria-required="true"
                  className="w-full border border-[rgba(100,92,220,0.2)] rounded-hz-sm px-3 py-2.5 text-[13px] text-hz-text focus:outline-none focus:border-hz-accent focus:ring-2 focus:ring-hz-accent/20 transition-colors"/>
              </div>
            )}
          </div>
        ))}

        {/* 🔖 Product note */}
        <div className="bg-hz-amber-bg border border-hz-amber/40 rounded-hz-sm px-3 py-2.5 flex gap-2">

          Save &amp; continue

// ─── InviteScreen ────────────────────────────────────────────────────────
const InviteScreen = ({nav, goBack, S, setS}) => {
  const [first, setFirst] = React.useState('');
  const [last,  setLast]  = React.useState('');
  const [email, setEmail] = React.useState('');
  const [rel,   setRel]   = React.useState('');
  const [sent,  setSent]  = React.useState([]);
  const [justSent, setJustSent] = React.useState(false);

  const canSend = first.trim() && email.includes('@');

  const send = () => {
    setSent(p=>[...p,{first,last,email,rel}]);
    setJustSent(true);
    setFirst(''); setLast(''); setEmail(''); setRel('');
  };

  const finish = () => {
    const skipped = sent.length === 0;
    setS(p=>({...p, skippedInvite: skipped, authPayers: sent}));
    nav('insurance');
  };

  return (
    <ScreenWrap>
      <Header title="Invite a Payer" onBack={goBack}/>
      <div className="px-5 pb-8">
        <p className="text-hz-muted text-[13px] mb-5">They'll receive an email with a secure link to set up their payment method.</p>
        {sent.length > 0 && (
          <div className="mb-4">
            {sent.map((p,i)=>(
              <div key={i} className="flex items-center gap-3 bg-hz-teal-bg border border-hz-teal/30 rounded-hz px-4 py-3 mb-2">
                <span aria-hidden="true" className="text-hz-teal text-lg">✓</span>
                <div>
                  <p className="text-[13px] font-semibold text-hz-text">{p.first} {p.last}</p>
                  <p className="text-[11px] text-hz-muted">{p.email}{p.rel ? ' · '+p.rel : ''}</p>
                </div>
              </div>
            ))}
          </div>
        )}
        {justSent && sent.length > 0 ? (
          <div className="text-center py-4 mb-4">
            <p className="text-hz-muted text-[13px] mb-4">Invite sent! Send another or continue.</p>
            <button onClick={()=>setJustSent(false)} aria-label="Invite another person"
              className="text-hz-indigo text-[13px] font-medium">+ Invite another person</button>
          </div>
        ) : (
          <>
            <div className="flex gap-3">
              <Input label="First name" id="invite-first" value={first} onChange={setFirst} placeholder="Jane" className="flex-1 mb-0"/>
              <Input label="Last name" id="invite-last" value={last} onChange={setLast} placeholder="Doe" className="flex-1 mb-0"/>
            </div>
            <div className="mb-4"/>
            <Input label="Email address" id="invite-email" value={email} onChange={setEmail} type="email" placeholder="jane@example.com"/>
            <Input label="Relationship (optional)" id="invite-rel" value={rel} onChange={setRel} placeholder="e.g. Parent, Guardian"/>
            <Btn onClick={send} disabled={!canSend} className="mb-3">Send Invite</Btn>
          </>
        )}
        <Divider/>
        <button onClick={finish} aria-label={sent.length > 0 ? 'Continue to next step' : 'Skip inviting a payer for now'}
          className="w-full text-center text-hz-hint text-[13px] py-2 hover:text-hz-muted transition-colors">
          {sent.length > 0 ? 'Continue →' : 'Skip for now'}
        </button>
      </div>
    </ScreenWrap>
  );
};

// ─── PotSetupScreen ───────────────────────────────────────────────────────
const PotSetupScreen = ({nav, goBack, S, setS}) => {
  const [step, setStep] = React.useState('A');
  const [freq, setFreq] = React.useState('');
  const [days, setDays] = React.useState([]);
  const [bwDate, setBwDate] = React.useState('');
  const [speed, setSpeed] = React.useState('');
  const [customAmt, setCustomAmt] = React.useState('');

  const maxPmts = freq==='monthly'?9:freq==='twice'?18:19;
  const minInstall = Math.ceil(POT_BALANCE / maxPmts * 100) / 100;
  const installAmt = speed==='spread' ? (POT_BALANCE/maxPmts) : (parseFloat(customAmt)||minInstall);
  const count = Math.ceil(POT_BALANCE / installAmt);
  const freqLabel = freq==='monthly'?'month':freq==='twice'?'half-month':'2 weeks';

  const MONTH_DAYS = Array.from({length:28},(_,i)=>i+1);
  const BW_DATES = ['Apr 4','Apr 18','May 2','May 16','May 30'];

  const toggleDay = (d) => {
    if (days.includes(d)) setDays(p=>p.filter(x=>x!==d));
    else if (days.length < 2) setDays(p=>[...p,d].sort((a,b)=>a-b));
  };

  const goToSpeed = () => {
    setS(p=>({...p, potFreq:freq, potDays:days, potBwDate:bwDate}));
    setStep('C');
  };

  const confirm = () => {
    setS(p=>({...p, potSpeed:speed, potInstall:installAmt, potCount:count, potFreqLabel:freqLabel, potMinInstall:minInstall}));
    nav('pot-confirm');
  };

  return (
    <ScreenWrap>
      <Header title="Pay Over Time Setup" onBack={step==='A'?goBack:()=>setStep(step==='C'?(freq==='biweekly'?'B2':'B1'):'A')}/>
      <div className="px-5 pb-8">
        {step === 'A' && (
          <>
            <p className="text-hz-muted text-[13px] mb-5">How often would you like to make payments?</p>
            {[{v:'monthly',l:'Monthly',d:'One payment per month, up to 9 payments'},
              {v:'twice',l:'Twice Monthly',d:'Two payments per month, up to 18 payments'},
              {v:'biweekly',l:'Every 2 Weeks',d:'Biweekly payments, up to 19 payments'}].map(o=>(
              <RadioCard key={o.v} selected={freq===o.v} onClick={()=>setFreq(o.v)} aria-label={o.l + ' — ' + o.d}>
                <p className="text-[14px] font-semibold text-hz-text">{o.l}</p>
                <p className="text-[12px] text-hz-muted mt-0.5">{o.d}</p>
              </RadioCard>
            ))}
            <Btn onClick={()=>setStep(freq==='biweekly'?'B2':'B1')} disabled={!freq}>Continue</Btn>
          </>
        )}
        {step === 'B1' && (
          <>
            <p className="text-hz-muted text-[13px] mb-2">
              {freq==='monthly' ? 'Which day of the month?' : 'Which two days of the month? (pick 2)'}
            </p>
            <div className="grid grid-cols-7 gap-1.5 mb-6" role="group" aria-label="Select payment day(s)">
              {MONTH_DAYS.map(d=>(
                <button key={d} onClick={()=>freq==='monthly'?(setDays([d])):(toggleDay(d))}
                  aria-pressed={days.includes(d)} aria-label={`Day ${d}`}
                  className={'w-full aspect-square rounded-hz-sm text-[13px] font-medium transition-all '+
                    (days.includes(d)?'bg-hz-indigo text-white':'bg-hz-cloud text-hz-text hover:bg-hz-cloud/70')+
                    (!days.includes(d) && days.length >= (freq==='monthly'?1:2) ? ' opacity-40' : '')}>
                  {d}
                </button>
              ))}
            </div>
            <Btn onClick={goToSpeed} disabled={freq==='monthly'?days.length<1:days.length<2}>Continue</Btn>
          </>
        )}
        {step === 'B2' && (
          <>
            <p className="text-hz-muted text-[13px] mb-4">Select your first payment date:</p>
            {BW_DATES.map(d=>(
              <RadioCard key={d} selected={bwDate===d} onClick={()=>setBwDate(d)} aria-label={`First payment on ${d}`}>
                <p className="text-[14px] text-hz-text">{d}</p>
              </RadioCard>
            ))}
            <Btn onClick={goToSpeed} disabled={!bwDate}>Continue</Btn>
          </>
        )}
        {step === 'C' && (
          <>
            <p className="text-hz-muted text-[13px] mb-4">Balance to finance: <strong className="text-hz-text">{fmt(POT_BALANCE)}</strong></p>
            <RadioCard selected={speed==='spread'} onClick={()=>setSpeed('spread')} aria-label={`Spread it out — ${maxPmts} payments of ${fmt(POT_BALANCE/maxPmts)}`}>
              <p className="text-[14px] font-semibold text-hz-text">Spread it out</p>
              <p className="text-[12px] text-hz-muted mt-0.5">{maxPmts} payments of {fmt(POT_BALANCE/maxPmts)} / {freqLabel}</p>
            </RadioCard>
            <RadioCard selected={speed==='fast'} onClick={()=>setSpeed('fast')} aria-label="Pay as quickly as possible with a custom installment amount">
              <p className="text-[14px] font-semibold text-hz-text">Pay as quickly as possible</p>
              <p className="text-[12px] text-hz-muted mt-0.5">Choose your installment amount (min {fmt(minInstall)})</p>
            </RadioCard>
            {speed === 'fast' && (
              <div className="mb-3">
                <Input label="Amount per payment" id="custom-installment" value={customAmt} onChange={setCustomAmt} placeholder={fmt(minInstall)}
                  hint={customAmt && parseFloat(customAmt)>=minInstall ? `${Math.ceil(POT_BALANCE/parseFloat(customAmt))} payments` : `Min ${fmt(minInstall)}`}/>
              </div>
            )}
            <Btn onClick={confirm} disabled={!speed||(speed==='fast'&&(!customAmt||parseFloat(customAmt)<minInstall))}>Continue</Btn>
          </>
        )}
      </div>
    </ScreenWrap>
  );
};

      <h2 className="text-xl font-bold text-hz-text mb-2">Dates Updated</h2>
      <p className="text-hz-muted text-[13px] mb-6">
        {mode==='all' ? `All future payments moved to day ${newDay} of each ${S.potFreqLabel||'month'}.` : `Payment ${specificPmt} rescheduled to ${specificDate}.`}
      </p>
      <Btn onClick={()=>nav('manage-pot')}>Return to Plan</Btn>
      </div>
    </ScreenWrap>
  );

  return (
    <ScreenWrap>
      <Header title="Change Payment Dates" onBack={goBack}/>
      <div className="px-5 pb-8">
        <p className="text-hz-muted text-[13px] mb-5">Would you like to change all future payments or just one?</p>
        <RadioCard selected={mode==='all'} onClick={()=>setMode('all')} aria-label="Change all future payments to a new day of the month">
          <p className="text-[14px] font-semibold text-hz-text">All future payments</p>
          <p className="text-[12px] text-hz-muted mt-0.5">Move to a new day of the month</p>
        </RadioCard>
        <RadioCard selected={mode==='one'} onClick={()=>setMode('one')} aria-label="Change one specific payment date">
          <p className="text-[14px] font-semibold text-hz-text">One specific payment</p>
          <p className="text-[12px] text-hz-muted mt-0.5">Reschedule a single upcoming payment</p>
        </RadioCard>
        {mode==='all' && (
          <Input label="New day of month" id="new-day" value={newDay} onChange={setNewDay} placeholder="e.g. 15" type="number"
            hint="1–28"/>
        )}
        {mode==='one' && (
          <>
            <Input label="Payment number" id="specific-pmt" value={specificPmt} onChange={setSpecificPmt} placeholder="e.g. 2" type="number"/>
            <Input label="New date" id="specific-date" value={specificDate} onChange={setSpecificDate} type="date"/>
          </>
        )}
        {mode && <Btn onClick={handleSave} disabled={mode==='all'?!newDay:(!specificPmt||!specificDate)}>Save Changes</Btn>}
      </div>
    </ScreenWrap>
  );
};


// ─── ChangeAutopayScreen ──────────────────────────────────────────────────
const ChangeAutopayScreen = ({nav, goBack, S, setS}) => {
  const [selected, setSelected] = React.useState('current');
  const [showAdd, setShowAdd] = React.useState(false);
  const [routing, setRouting] = React.useState('');
  const [acct, setAcct] = React.useState('');
  const [done, setDone] = React.useState(false);

  const handleSave = () => {
    if (showAdd && routing && acct) {
      setS(p=>({...p, methodSaved:true}));
    }
    setDone(true);
  };

  if (done) return (
    <ScreenWrap>
      <div className="flex flex-col items-center justify-center px-8 text-center py-8">
      <div aria-hidden="true" className="w-16 h-16 rounded-full bg-hz-teal-bg flex items-center justify-center text-3xl mb-4">✅</div>
      <h2 className="text-xl font-bold text-hz-text mb-2">Auto-Pay Updated</h2>
      <p className="text-hz-muted text-[13px] mb-6">Future installments will be drafted from your updated payment method.</p>
      <Btn onClick={()=>nav('manage-pot')}>Return to Plan</Btn>
      </div>
    </ScreenWrap>
  );

  return (
    <ScreenWrap>
      <Header title="Change Auto-Pay Method" onBack={goBack}/>
      <div className="px-5 pb-8">
        <p className="text-hz-muted text-[13px] mb-5">Select a payment method for future installments:</p>
        {S.methodSaved && (
          <RadioCard selected={selected==='current'} onClick={()=>{setSelected('current');setShowAdd(false);}} aria-label="Use current saved bank account Checking ending 4521">
            <div className="flex items-center gap-3">
              <span aria-hidden="true" className="text-lg">🏦</span>
              <div>
                <p className="text-[14px] font-semibold text-hz-text">Checking ••••4521</p>
                <p className="text-[12px] text-hz-muted">Chase Bank · ACH</p>
              </div>
            </div>
          </RadioCard>
        )}
        {!showAdd ? (
          <button onClick={()=>{setShowAdd(true);setSelected('new');}} aria-label="Add a new bank account"
            className="w-full text-left p-4 rounded-hz border border-dashed border-[rgba(100,92,220,0.3)] hover:border-hz-accent/60 transition-colors text-hz-indigo text-[13px] font-medium mb-6">
            + Add new bank account
          </button>
        ) : (
          <div className="mb-4">
            <p className="text-[13px] font-semibold text-hz-text mb-3">New Bank Account</p>
            <Input label="Routing number" id="autopay-routing" value={routing} onChange={setRouting} placeholder="9 digits"/>
            <Input label="Account number" id="autopay-acct" value={acct} onChange={setAcct} placeholder="Account number"/>
          </div>
        )}
        <Btn onClick={handleSave} disabled={selected==='new'&&(!routing||!acct)}>Save Method</Btn>
      </div>
    </ScreenWrap>
  );
};

// ─── PayNextScreen ────────────────────────────────────────────────────────
const PayNextScreen = ({nav, goBack, S, setS}) => {
  const [method, setMethod] = React.useState(S.methodSaved?'saved':'ach');
  const [routing, setRouting] = React.useState('');
  const [acct, setAcct] = React.useState('');
  const [done, setDone] = React.useState(false);

  const amount = S.potInstall || 517;
  const canPay = method==='saved' || (routing.length>=9 && acct.length>=8);

  const handlePay = () => {
    if (!S.methodSaved && routing && acct) setS(p=>({...p,methodSaved:true}));
    setDone(true);
  };

  if (done) return (
    <ScreenWrap>
      <div className="flex flex-col items-center justify-center px-8 text-center py-8">
      <div aria-hidden="true" className="w-16 h-16 rounded-full bg-hz-teal-bg flex items-center justify-center text-3xl mb-4">✅</div>
      <h2 className="text-xl font-bold text-hz-text mb-2">Payment Submitted!</h2>
      <p className="text-hz-muted text-[13px] mb-6">{fmt(amount)} installment payment submitted successfully.</p>
      <Btn onClick={()=>nav('manage-pot')}>Return to Plan</Btn>
      </div>
    </ScreenWrap>
  );

  return (
    <ScreenWrap>
      <Header title="Pay Next Installment" onBack={goBack}/>
      <div className="px-5 pb-8">
        <Card className="mb-5">
          <Row label="Next installment" value={fmt(amount)} bold/>
          <Row label="Due date" value="May 1, 2025"/>
          <Row label="Remaining after payment" value={fmt(Math.max(0, POT_BALANCE-amount))}/>
        </Card>
        <p className="text-[13px] font-semibold text-hz-text mb-3">Payment Method</p>
        {S.methodSaved ? (
          <>
            <RadioCard selected={method==='saved'} onClick={()=>setMethod('saved')} aria-label="Use saved checking account ending 4521">
              <div className="flex items-center gap-3">
                <span aria-hidden="true" className="text-lg">🏦</span>
                <div>
                  <p className="text-[13px] font-semibold text-hz-text">Checking ••••4521</p>
                  <p className="text-[11px] text-hz-muted">Chase Bank · ACH</p>
                </div>
              </div>
            </RadioCard>
            <RadioCard selected={method==='new'} onClick={()=>setMethod('new')} aria-label="Use a different payment method">
              <p className="text-[13px] text-hz-text">Use different method</p>
            </RadioCard>
          </>
        ) : null}
        {(method==='new' || !S.methodSaved) && (
          <>
            <Input label="Routing number" id="paynext-routing" value={routing} onChange={setRouting} placeholder="9 digits"/>
            <Input label="Account number" id="paynext-acct" value={acct} onChange={setAcct} placeholder="Account number"/>
          </>
        )}
        <Btn onClick={handlePay} disabled={!canPay} aria-label={`Pay ${fmt(amount)} installment`}>Pay {fmt(amount)}</Btn>
      </div>
    </ScreenWrap>
  );
};


// ─── AccountDetailsScreen ─────────────────────────────────────────────────
const AccountDetailsScreen = ({nav, goBack, S, setS}) => {
  const [commEmail, setCommEmail] = React.useState({payments:true, reminders:true, statements:true, alerts:true});
  const [commSms,   setCommSms]   = React.useState({payments:true, reminders:false, alerts:true});
  const [saved, setSaved] = React.useState(false);

  const save = () => { setSaved(true); setTimeout(()=>setSaved(false), 2200); };

  return (
    <ScreenWrap>
      <Header title="My Account" onBack={goBack}/>
      <div className="px-5 pb-8 space-y-4">

        {/* Profile */}
        <Card>
          <p className="text-[11px] font-bold uppercase tracking-widest text-hz-hint mb-3">Profile</p>
          <div className="space-y-3">
            <div className="flex justify-between items-center">
              <div><p className="text-[13px] font-medium text-hz-text">Alex Johnson</p><p className="text-[11px] text-hz-hint">Full name</p></div>
            </div>
            <Divider/>
            <div className="flex justify-between items-center">
              <div><p className="text-[13px] font-medium text-hz-text">ajohnson@student.claude.edu</p><p className="text-[11px] text-hz-hint">Email address</p></div>
            </div>
            <Divider/>
            <div className="flex justify-between items-center">
              <div><p className="text-[13px] font-medium text-hz-text">{S.hasPhone ? '(555) 867-5309' : 'Not set'}</p><p className="text-[11px] text-hz-hint">Mobile number</p></div>
              <button className="text-[12px] text-hz-accent font-medium" aria-label="Edit mobile number">Edit</button>
            </div>
            <Divider/>
            <div className="flex justify-between items-center">
              <div><p className="text-[13px] font-medium text-hz-text">1234567</p><p className="text-[11px] text-hz-hint">Student ID</p></div>
            </div>
          </div>
        </Card>

        {/* Email notifications */}
        <Card>
          <p className="text-[11px] font-bold uppercase tracking-widest text-hz-hint mb-1">Email Notifications</p>
          <p className="text-[12px] text-hz-muted mb-3">Choose what Claude University emails you about.</p>
          {[
            {k:'payments',   label:'Payment confirmations',    desc:'Receipts for every payment'},
            {k:'reminders',  label:'Payment reminders',        desc:'Upcoming due dates'},
            {k:'statements', label:'New billing statements',   desc:'When a new bill posts'},
            {k:'alerts',     label:'Account alerts',           desc:'Balance changes, holds'},
          ].map(item=>(
            <div key={item.k} className="flex justify-between items-center py-2.5 border-b border-[rgba(100,92,220,0.08)] last:border-0">
              <div>
                <p className="text-[13px] font-medium text-hz-text">{item.label}</p>
                <p className="text-[11px] text-hz-hint">{item.desc}</p>
              </div>
              <button role="switch" aria-checked={commEmail[item.k]}
                onClick={()=>setCommEmail(p=>({...p,[item.k]:!p[item.k]}))}
                aria-label={`Toggle email for ${item.label}`}
                className={`relative w-11 h-6 rounded-full transition-colors ${commEmail[item.k]?'bg-hz-teal':'bg-hz-cloud'}`}>
                <span className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all ${commEmail[item.k]?'left-[22px]':'left-0.5'}`}/>
              </button>
            </div>
          ))}
        </Card>

        {/* SMS notifications */}
        {S.hasPhone && (
          <Card>
            <p className="text-[11px] font-bold uppercase tracking-widest text-hz-hint mb-1">Text (SMS) Notifications</p>
            <p className="text-[12px] text-hz-muted mb-3">We'll only text for what you turn on.</p>
            {[
              {k:'payments', label:'Payment confirmations', desc:'Quick confirmation texts'},
              {k:'reminders',label:'Payment reminders',     desc:'Day-before reminders'},
              {k:'alerts',   label:'Urgent alerts',         desc:'Time-sensitive account issues'},
            ].map(item=>(
              <div key={item.k} className="flex justify-between items-center py-2.5 border-b border-[rgba(100,92,220,0.08)] last:border-0">
                <div>
                  <p className="text-[13px] font-medium text-hz-text">{item.label}</p>
                  <p className="text-[11px] text-hz-hint">{item.desc}</p>
                </div>
                <button role="switch" aria-checked={commSms[item.k]}
                  onClick={()=>setCommSms(p=>({...p,[item.k]:!p[item.k]}))}
                  aria-label={`Toggle SMS for ${item.label}`}
                  className={`relative w-11 h-6 rounded-full transition-colors ${commSms[item.k]?'bg-hz-teal':'bg-hz-cloud'}`}>
                  <span className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all ${commSms[item.k]?'left-[22px]':'left-0.5'}`}/>
                </button>
              </div>
            ))}
          </Card>
        )}

        <Btn onClick={save} variant="primary" aria-label="Save account changes">
          {saved ? '✓ Saved' : 'Save changes'}
        </Btn>

      </div>

  );
};


// ─── HistoryScreen ────────────────────────────────────────────────────────
const HistoryScreen = ({nav, goBack, S, setS}) => {
  const [tab, setTab] = React.useState('all');

  const allItems = [
    {type:'payment',  date:'Apr 14, 2025', desc:'Down payment + fee',        amt:'+'+fmt(POT_DOWN_TOTAL), color:'green', icon:'💳'},
    {type:'balance',  date:'Apr 12, 2025', desc:'Fall 2025 bill posted',     amt:'+'+fmt(TOTAL_CHARGES),  color:'amber', icon:'📋'},
    {type:'aid',      date:'Apr 10, 2025', desc:'Pell Grant applied',        amt:'−$1,100',               color:'green', icon:'🎓'},
    {type:'aid',      date:'Apr 10, 2025', desc:'Merit Scholarship applied', amt:'−$1,200',               color:'green', icon:'🏆'},
    {type:'comms',    date:'Apr 8,  2025', desc:'Welcome email sent',        amt:'',                      color:'blue',  icon:'✉️'},
    {type:'comms',    date:'Apr 8,  2025', desc:'Account created',           amt:'',                      color:'blue',  icon:'👤'},
  ];

  const filtered = tab==='all' ? allItems
    : tab==='payments' ? allItems.filter(i=>i.type==='payment')
    : tab==='balance'  ? allItems.filter(i=>i.type==='balance'||i.type==='aid')
    : allItems.filter(i=>i.type==='comms');

  const TABS = [{v:'all',l:'All'},{v:'payments',l:'Payments'},{v:'balance',l:'Balance'},{v:'comms',l:'Comms'}];

  return (
    <ScreenWrap>
      <Header title="Account History" onBack={goBack}/>
      <div className="px-5 pb-8">
        <div className="flex bg-hz-cloud rounded-hz p-1 mb-5" role="tablist">
          {TABS.map(t=>(
            <button key={t.v} onClick={()=>setTab(t.v)} role="tab" aria-selected={tab===t.v}
              className={'flex-1 py-1.5 rounded-hz-sm text-[12px] font-medium transition-all '+(tab===t.v?'bg-hz-indigo text-white':'text-hz-muted hover:text-hz-text')}>
              {t.l}
            </button>
          ))}
        </div>
        {filtered.length === 0 ? (
          <div className="text-center py-12 text-hz-hint text-[13px]">No items in this category</div>
        ) : (
          <div className="space-y-3" role="tabpanel">
            {filtered.map((item,i)=>(
              <Card key={i} className="flex items-center gap-3 p-3">
                <div className={`w-10 h-10 rounded-full flex items-center justify-center text-lg flex-shrink-0
                  ${item.color==='green'?'bg-hz-teal-bg':item.color==='amber'?'bg-hz-amber-bg':'bg-hz-cloud'}`}
                  aria-hidden="true">
                  {item.icon}
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-medium text-hz-text truncate">{item.desc}</p>
                  <p className="text-[11px] text-hz-hint">{item.date}</p>
                </div>
                {item.amt && (
                  <span className={`text-[13px] font-semibold flex-shrink-0 ${item.color==='green'?'text-hz-teal':item.color==='amber'?'text-hz-amber':'text-hz-text'}`}>
                    {item.amt}
                  </span>
                )}
              </Card>
            ))}
          </div>
        )}
      </div>
    </ScreenWrap>
  );
};


// ─── App ──────────────────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = React.useState('proto-intro');
  const [S, setS] = React.useState({
    tfa: '', payer: '', authPayers: [], methodSaved: false, methodType: 'ach',
    payPlan: '', potFreq: '', potDays: [], potBwDate: '', potSpeed: '',
    potInstall: 0, potCount: 0, potFreqLabel: 'month', potMinInstall: 0,
    skippedInvite: false, skippedMethod: false, hasPhone: false,
    insAccepted: false, insPremium: 162, insState: '', apActive: false,
  });
  const navStack = React.useRef([]);
  const nav    = (s) => { navStack.current.push(screen); setScreen(s); };
  const goBack = () => { const p = navStack.current.pop(); if (p) setScreen(p); };

  const screens = {
    'proto-intro':       <ProtoIntroScreen      nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'welcome':           <WelcomeScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'agreements':        <AgreementsScreen      nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'security-questions':<SecurityQuestionsScreen nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'contact':           <ContactScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'comms':             <CommsScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'payer':             <PayerScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'invite':            <InviteScreen          nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'insurance':         <InsuranceScreen       nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'howpay':            <HowPayScreen          nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pot':               <PotSetupScreen        nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pot-confirm':       <PotConfirmScreen      nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-confirm-full':  <PayConfirmFullScreen  nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-success':       <PaySuccessScreen      nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-sched':         <PaySchedScreen        nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'adj-settings':      <AdjSettingsScreen     nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'complete':          <CompleteScreen        nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'home':              <HomeScreen            nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'costs':             <CostsScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'print':             <PrintScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-now':           <PayNowScreen          nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'guest':             <GuestScreen           nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'manage-pot':        <ManagePotScreen       nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'change-dates-ob':   <ChangeDatesScreen     nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'change-autopay-ob': <ChangeAutopayScreen   nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'pay-next-ob':       <PayNextScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'history':           <HistoryScreen         nav={nav} goBack={goBack} S={S} setS={setS}/>,
    'account-details':   <AccountDetailsScreen  nav={nav} goBack={goBack} S={S} setS={setS}/>,
  };

  return (
    <div className="min-h-screen bg-hz-bg flex items-center justify-center font-sans p-4">
      {/* Home button */}
      <a href="/" aria-label="Go to home page"
        className="fixed top-4 left-4 z-50 bg-hz-card hover:bg-hz-cloud border border-[rgba(100,92,220,0.2)] text-hz-indigo text-[13px] font-medium px-3 py-2 rounded-hz-sm transition-colors shadow-sm">
        ← Home
      </a>

      {/* Screen selector (dev helper) */}
      <div className="fixed top-4 right-4 z-50">
        <label htmlFor="screen-jump" className="sr-only">Jump to screen</label>
        <select id="screen-jump"
          value={screen}
          onChange={e => { navStack.current = []; setScreen(e.target.value); }}
          className="bg-hz-card border border-[rgba(100,92,220,0.2)] text-hz-text text-[11px] rounded-hz-sm px-2 py-1.5 shadow-sm outline-none focus:border-hz-accent max-w-[160px]"
          title="Jump to screen">
          {Object.keys(screens).map(s => <option key={s} value={s}>{s}</option>)}
        </select>
      </div>

      {/* Phone frame */}
      <div className="relative w-[390px] h-[844px] bg-hz-card overflow-hidden rounded-[44px] shadow-2xl border border-[rgba(100,92,220,0.18)] flex-shrink-0">
        {/* Notch */}
        <div aria-hidden="true" className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-7 bg-black rounded-b-2xl z-30"/>
        {/* Screen content */}
        <div className="absolute inset-0 pt-7">
          {screens[screen] || screens['proto-intro']}
        </div>
      </div>

    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
